// ─── SUPABASE CONFIG ──────────────────────────────────────────────────────────
const SUPABASE_URL = ""; // pega aquí tu Project URL
const SUPABASE_KEY = ""; // pega aquí tu Anon Key
const SUPABASE_BUCKET = "workly-archivos";

// Cliente Supabase mínimo (sin SDK, fetch nativo)
const supa = {
  storage: {
    async list(obraKey) {
      if (!SUPABASE_URL || !SUPABASE_KEY) return { data: [], error: "Sin configurar" };
      const r = await fetch(`${SUPABASE_URL}/storage/v1/object/list/${SUPABASE_BUCKET}`, {
        method: "POST",
        headers: { "Content-Type": "application/json", "Authorization": `Bearer ${SUPABASE_KEY}`, "apikey": SUPABASE_KEY },
        body: JSON.stringify({ prefix: obraKey + "/", limit: 100, offset: 0 }),
      });
      const data = await r.json();
      return { data: Array.isArray(data) ? data : [], error: null };
    },
    async upload(obraKey, file) {
      if (!SUPABASE_URL || !SUPABASE_KEY) return { error: "Sin configurar" };
      const path = `${obraKey}/${Date.now()}_${file.name}`;
      const r = await fetch(`${SUPABASE_URL}/storage/v1/object/${SUPABASE_BUCKET}/${path}`, {
        method: "POST",
        headers: { "Authorization": `Bearer ${SUPABASE_KEY}`, "apikey": SUPABASE_KEY, "Content-Type": file.type || "application/octet-stream", "x-upsert": "false" },
        body: file,
      });
      const data = await r.json();
      return data.error ? { error: data.error } : { data: { path }, error: null };
    },
    async remove(path) {
      if (!SUPABASE_URL || !SUPABASE_KEY) return { error: "Sin configurar" };
      const r = await fetch(`${SUPABASE_URL}/storage/v1/object/${SUPABASE_BUCKET}`, {
        method: "DELETE",
        headers: { "Content-Type": "application/json", "Authorization": `Bearer ${SUPABASE_KEY}`, "apikey": SUPABASE_KEY },
        body: JSON.stringify({ prefixes: [path] }),
      });
      return { error: r.ok ? null : "Error al eliminar" };
    },
    publicUrl(path) {
      return `${SUPABASE_URL}/storage/v1/object/public/${SUPABASE_BUCKET}/${path}`;
    }
  }
};

function getDeviceId(){
  let id=localStorage.getItem("wk_device_id");
  if(!id){id="dev_"+Math.random().toString(36).slice(2)+Date.now().toString(36);localStorage.setItem("wk_device_id",id);}
  return id;
}
const normObra = o => (o||"").toLowerCase().replace(/[^a-z0-9]/g,"").trim();
const obraKey  = o => (o||"").toLowerCase().replace(/[^a-z0-9_-]/g,"_").trim().slice(0,80);
const workerInitials = w => w.split(/\s+/).map(p=>p[0]||"").join("").toUpperCase().slice(0,2);
const pc = (v,t) => t>0 ? ((v/t)*100).toFixed(1) : 0;
const fmtShort = f => { if(!f)return""; const p=f.split("-"); const mn=["","Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"]; return `${p[2]} ${mn[+p[1]]||""}`; };
const today = () => new Date().toISOString().split("T")[0];
const isSunday = f => new Date(f+"T12:00:00").getDay()===0;
const isSat    = f => new Date(f+"T12:00:00").getDay()===6;
const isFri    = f => new Date(f+"T12:00:00").getDay()===5;
function isFestivo(f,festivos){ if(isSunday(f))return true; return festivos.some(x=>x.fecha===f); }
function getHT(e,festivos){
  if(e.tipoOverride)return e.tipoOverride;
  if(isFestivo(e.fecha,festivos))return"f";
  if(isSat(e.fecha))return"s";
  return e.horas<=(isFri(e.fecha)?6:9)?"n":"e";
}

let _okeys=null;
function obraColor(obra,allObras){
  if(!_okeys||_okeys.length===0){_okeys=[...new Set((allObras||[]).map(o=>normObra(o)))].sort();}
  const i=_okeys.indexOf(normObra(obra));
  return OC[i<0?0:i%OC.length];
}
function workerColor(w,workers){return WC[workers.indexOf(w)%WC.length]||WC[0];}
const ADM_RULES=[/isdin/i,/lurdes/i,/monja/i];
function isAdminObra(obra,overrides){const k=normObra(obra);if(overrides[k]===true)return true;if(overrides[k]===false)return false;return ADM_RULES.some(r=>r.test(obra));}
function isAdminEntry(e,overrides){if(e.subobra)return true;return isAdminObra(e.obra,overrides);}

function loadState(){
  try{
    let data=JSON.parse(localStorage.getItem("wk_data")||"null");
    if(!data)data=[...INITIAL_DATA];
    let festivos=JSON.parse(localStorage.getItem("wk_fest")||"[]");
    FESTIVOS_2026.forEach(f=>{if(!festivos.some(x=>x.fecha===f.fecha))festivos.push(f);});
    festivos.sort((a,b)=>a.fecha.localeCompare(b.fecha));
    let adminOverrides=JSON.parse(localStorage.getItem("wk_adm")||"{}");
    let session=JSON.parse(localStorage.getItem("wk_session")||"null");
    if(session&&session.name===ADMIN_NAME&&!session.isAdmin)session={...session,isAdmin:true};
    return{
      data,festivos,adminOverrides,
      fichajes:JSON.parse(localStorage.getItem("wk_fichajes")||"[]"),
      accounts:JSON.parse(localStorage.getItem("wk_accounts")||"[]"),
      ausencias:JSON.parse(localStorage.getItem("wk_ausencias")||"[]"),
      session,
    };
  }catch(e){return{data:[...INITIAL_DATA],festivos:[],adminOverrides:{},fichajes:[],accounts:[],ausencias:[],session:null};}
}

function LoginScreen({accounts,onLogin}){
  const [step,setStep]=useState("select"); // select | pin | blocked
  const [selected,setSelected]=useState(null);
  const [showPicker,setShowPicker]=useState(false);
  const [pinErr,setPinErr]=useState("");

  function handleSelect(name){
    setShowPicker(false);
    const acc=accounts.find(a=>a.name===name);
    const devId=getDeviceId();
    if(acc&&acc.deviceId&&acc.deviceId!==devId){setSelected(name);setStep("blocked");return;}
    setSelected(name);setPinErr("");setStep("pin");
  }
  function handlePin(pin){
    const isAdmin=selected===ADMIN_NAME&&pin===ADMIN_PIN;
    const acc=accounts.find(a=>a.name===selected);
    if(isAdmin||acc?.pin===pin){
      onLogin({name:selected,isAdmin:isAdmin||selected===ADMIN_NAME,pin});

  const totalH=mesActual.reduce((s,e)=>s+e.horas,0);
  const semana=[];for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);semana.push(d.toISOString().split("T")[0]);}
  const hSemana=data.filter(e=>semana.includes(e.fecha)).reduce((s,e)=>s+e.horas,0);

function NuevoParte({data,session,festivos,onSave,prefill,toast}){
  const allWorkers=["JCM","Txema","Javi ESE2","Carlos Camacho","Jimmy Jazz S2","Manja","Paco Ortega","Gustavo"];
  const allObras=[...new Set(data.map(e=>e.obra))].sort();

  const [trabajador,setTrabajador]=useState(prefill?.trabajador||(session.isAdmin?"JCM":session.name));
  const [fecha,setFecha]=useState(prefill?.fecha||today());
  const [horas,setHoras]=useState(prefill?.horas||"9");
  const [obra,setObra]=useState(prefill?.obra||"");
  const [subobra,setSubobra]=useState(prefill?.subobra||"");
  const [notas,setNotas]=useState(prefill?.notas||"");
  const [tipoOverride,setTipoOverride]=useState(prefill?.tipoOverride||"");
  const [obraInput,setObraInput]=useState(prefill?.obra||"");
  const [showObraSug,setShowObraSug]=useState(false);

  const obraSugs=obraInput.length>0?allObras.filter(o=>o.toLowerCase().includes(obraInput.toLowerCase())).slice(0,6):[];
  const subobraSugs=allSubobras.filter(s=>!subobra||s.toLowerCase().includes(subobra.toLowerCase())).slice(0,4);

  // Alerta duplicado
  const isDuplicate=data.some(e=>e.trabajador===trabajador&&e.fecha===fecha&&e.obra===(obra||obraInput)&&((!e.subobra&&!subobra)||(e.subobra===subobra)));

  function handleSave(){
    const obraFinal=obra||obraInput.trim();
    if(!obraFinal){toast("Indica la obra","error");return;}
    if(!horas||isNaN(+horas)||+horas<=0){toast("Horas inválidas","error");return;}
    if(isDuplicate&&!confirm("¿Entrada duplicada? ¿Guardar igualmente?"))return;
    onSave({trabajador,fecha,horas:+horas,obra:obraFinal,subobra:subobra.trim(),notas:notas.trim(),tipoOverride:tipoOverride||undefined});

  const ht=getHT({fecha,horas:+horas,tipoOverride},festivos);
  const lbl={fontFamily:T.sans,fontWeight:700,fontSize:12,color:T.text2,textTransform:"uppercase",letterSpacing:".06em",marginBottom:5,display:"block"};
  const inp={width:"100%",padding:"11px 14px",borderRadius:12,border:`1px solid ${T.border}`,background:T.bg2,fontFamily:T.sans,fontSize:14,color:T.text,outline:"none"};

  return(
    <div style={{paddingBottom:100}}>
      <Header title="Nuevo parte"/>
      <div style={{padding:"16px 16px 0",display:"flex",flexDirection:"column",gap:14}}>
        {isDuplicate&&<div style={{background:T.orangeDim,border:`1px solid rgba(201,122,46,.3)`,borderRadius:12,padding:"10px 14px",fontFamily:T.sans,fontSize:13,color:T.orange,fontWeight:600}}>⚠️ Posible duplicado detectado</div>}
        {session.isAdmin&&(
          <div>
            <label style={lbl}>Trabajador</label>
            <select value={trabajador} onChange={e=>setTrabajador(e.target.value)} style={{...inp}}>
              {allWorkers.map(w=><option key={w} value={w}>{w}</option>)}
            </select>
          </div>
        )}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <div>
            <label style={lbl}>Fecha</label>
            <input type="date" value={fecha} onChange={e=>setFecha(e.target.value)} style={inp}/>
          </div>
          <div>
            <label style={lbl}>Horas <HTBadge type={ht}/></label>
            <input type="number" value={horas} onChange={e=>setHoras(e.target.value)} step="0.5" min="0.5" max="24" style={inp}/>
          </div>
        </div>
        <div style={{position:"relative"}}>
          <label style={lbl}>Obra</label>
          <input value={obraInput} onChange={e=>{setObraInput(e.target.value);setObra("");setShowObraSug(true);}} onFocus={()=>setShowObraSug(true)} onBlur={()=>setTimeout(()=>setShowObraSug(false),150)} placeholder="Nombre de la obra..." style={inp}/>
          {showObraSug&&obraSugs.length>0&&(
            <div style={{position:"absolute",top:"100%",left:0,right:0,background:T.bg2,border:`1px solid ${T.border}`,borderRadius:12,zIndex:200,boxShadow:T.shadowM,overflow:"hidden",marginTop:4}}>
              {obraSugs.map(o=>(
                <div key={o} onMouseDown={()=>{setObraInput(o);setObra(o);setShowObraSug(false);}} style={{padding:"10px 14px",fontFamily:T.sans,fontSize:13,color:T.text,cursor:"pointer",borderBottom:`1px solid ${T.border}`}}>{o}</div>
              ))}
            </div>

        <div>
          <label style={lbl}>Subobra / Partida <span style={{fontWeight:400,color:T.text3}}>(opcional)</span></label>

// ─── QUICK INPUT (WhatsApp parser) ────────────────────────────────────────────
function QuickInput({data,session,festivos,onSaveMulti,toast}){
  const [text,setText]=useState("");
  const [parsed,setParsed]=useState([]);
  const [err,setErr]=useState("");
  const allWorkers=["JCM","Txema","Javi ESE2","Carlos Camacho","Jimmy Jazz S2","Manja","Paco Ortega","Gustavo"];

  function parse(){
    setErr("");
    const lines=text.split("\n").map(l=>l.trim()).filter(l=>l);
    const results=[];
    const dateRe=/\b(\d{1,2})[\/\-](\d{1,2})(?:[\/\-](\d{2,4}))?\b/;
    const horasRe=/(\d+(?:[.,]\d+)?)\s*h/i;
    for(const line of lines){
      let fecha=today();
      const dm=line.match(dateRe);
      if(dm){const d=+dm[1],m=+dm[2],y=dm[3]?+dm[3]:new Date().getFullYear();fecha=`${y<100?2000+y:y}-${String(m).padStart(2,"0")}-${String(d).padStart(2,"0")}`;}
      const hm=line.match(horasRe);
      const horas=hm?+hm[1].replace(",","."):9;
      let trabajador=session.isAdmin?"":session.name;
      if(session.isAdmin){for(const w of allWorkers){if(line.toLowerCase().includes(w.toLowerCase())){trabajador=w;break;}}}
      const obraMatch=line.match(/obra[:\s]+([^,\n]+)/i)||line.match(/-\s*([A-ZÀ-Ú][^,\n0-9]+)/);
      const obra=obraMatch?obraMatch[1].trim():"";
      if(!trabajador||!obra)continue;
      results.push({trabajador,fecha,horas,obra,subobra:"",notas:"",_line:line});
    }
    if(results.length===0){setErr("No se detectaron entradas válidas");return;}
    setParsed(results);
  }

  function handleSave(){
    onSaveMulti(parsed);
    setText("");setParsed([]);
  }

  return(
    <div style={{paddingBottom:100}}>
      <Header title="Entrada rápida" sub="Pega texto de WhatsApp"/>
      <div style={{padding:"16px 16px 0"}}>
        <textarea value={text} onChange={e=>setText(e.target.value)} rows={8} placeholder={"Pega aquí el texto del grupo de WhatsApp...\n\nEjemplo:\n03/03 Txema obra: Carles Riba 3h\n03/03 Javi obra: Av. Diagonal 9h"} style={{width:"100%",padding:"12px 14px",borderRadius:14,border:`1px solid ${T.border}`,background:T.bg2,fontFamily:T.mono,fontSize:12,color:T.text,outline:"none",resize:"vertical"}}/>
        {err&&<div style={{color:T.red,fontFamily:T.sans,fontSize:13,marginTop:6,fontWeight:600}}>{err}</div>}
        <Btn onClick={parse} style={{width:"100%",marginTop:10}} variant="secondary">Analizar texto</Btn>
        {parsed.length>0&&(
          <>
            <div style={{fontFamily:T.sans,fontWeight:700,fontSize:13,color:T.text2,margin:"14px 0 8px",textTransform:"uppercase",letterSpacing:".06em"}}>{parsed.length} entradas detectadas</div>
            <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:12}}>
              {parsed.map((e,i)=>(
                <div key={i} style={{background:T.bg2,borderRadius:10,padding:"9px 12px",border:`1px solid ${T.border}`}}>
                  <div style={{fontFamily:T.sans,fontSize:12,fontWeight:700,color:T.text}}>{e.trabajador} · {e.obra}</div>
                  <div style={{fontFamily:T.sans,fontSize:11,color:T.text2}}>{e.fecha} · {e.horas}h</div>
                </div>
              ))}
            </div>
            <Btn onClick={handleSave} style={{width:"100%"}}>Guardar {parsed.length} entradas</Btn>
          </>
        )}
      </div>
    </div>
  );
}

  );
}

// ─── ARCHIVOS SUPABASE ────────────────────────────────────────────────────────
function ArchivosObra({obraName}){
  const key=obraKey(obraName);
  const [files,setFiles]=useState([]);
  const [loading,setLoading]=useState(false);
  const [uploading,setUploading]=useState(false);
  const [err,setErr]=useState("");
  const configured=!!(SUPABASE_URL&&SUPABASE_KEY);

  useEffect(()=>{
    if(!configured)return;
    setLoading(true);
    supa.storage.list(key).then(({data})=>{setFiles(data||[]);setLoading(false);}).catch(()=>setLoading(false));
  },[key]);

  async function handleUpload(e){
    const file=e.target.files[0];if(!file)return;
    setUploading(true);setErr("");
    const {error}=await supa.storage.upload(key,file);
    if(error){setErr("Error al subir: "+error);setUploading(false);return;}
    const {data}=await supa.storage.list(key);
    setFiles(data||[]);setUploading(false);
  }

  async function handleDelete(path){
    if(!confirm("¿Eliminar archivo?"))return;
    await supa.storage.remove(path);
    setFiles(f=>f.filter(x=>x.name!==path.split("/").pop()));
  }

  if(!configured)return(
    <div style={{background:T.bg3,borderRadius:12,padding:"12px 14px",fontFamily:T.sans,fontSize:13,color:T.text2}}>
      Supabase no configurado — los archivos por obra no están disponibles.
    </div>
  );

  return(
    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
        <span style={{fontFamily:T.sans,fontWeight:700,fontSize:12,color:T.text2,textTransform:"uppercase",letterSpacing:".06em"}}>Archivos y fotos</span>
        <label style={{background:T.goldDim,border:`1px solid ${T.goldBorder}`,borderRadius:10,padding:"5px 12px",fontFamily:T.sans,fontSize:12,fontWeight:700,color:T.goldDark,cursor:"pointer"}}>
          {uploading?"Subiendo...":"+ Subir"}
          <input type="file" style={{display:"none"}} onChange={handleUpload} accept="image/*,.pdf,.doc,.docx,.xls,.xlsx"/>
        </label>
      </div>
      {err&&<div style={{color:T.red,fontFamily:T.sans,fontSize:12,marginBottom:8}}>{err}</div>}
      {loading&&<div style={{fontFamily:T.sans,fontSize:13,color:T.text3}}>Cargando...</div>}
      {!loading&&files.length===0&&<div style={{fontFamily:T.sans,fontSize:13,color:T.text3}}>Sin archivos</div>}
      <div style={{display:"flex",flexDirection:"column",gap:6}}>
        {files.map(f=>{
          const path=`${key}/${f.name}`;
          const url=supa.storage.publicUrl(path);
          const isImg=/\.(jpg|jpeg|png|gif|webp)$/i.test(f.name);
          return(
            <div key={f.name} style={{background:T.bg3,borderRadius:10,padding:"9px 12px",display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:18}}>{isImg?"🖼":"📄"}</span>
              <a href={url} target="_blank" rel="noopener noreferrer" style={{flex:1,fontFamily:T.sans,fontSize:12,color:T.blue,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{f.name}</a>
              <button onClick={()=>handleDelete(path)} style={{background:"none",border:"none",cursor:"pointer",color:T.red,fontSize:16,padding:"0 4px"}}>×</button>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── SUBOBRA GROUP (PDF por subobra) ─────────────────────────────────────────
function SubobraGroup({obraName,subobra,entries,festivos,adminOverrides,obrasMeta,setObrasMeta}){
  const [open,setOpen]=useState(false);
  const [showPDFForm,setShowPDFForm]=useState(false);
  const total=entries.reduce((s,e)=>s+e.horas,0);
  const workers=[...new Set(entries.map(e=>e.trabajador))];
  const metaKey=obraKey(obraName);
  const meta=(obrasMeta&&obrasMeta[metaKey])||{};

  // Rango de fechas automático
  const fechas=entries.map(e=>e.fecha).sort();
  const fechaIni=fechas[0]||"";
  const fechaFin=fechas[fechas.length-1]||"";

  function PDFForm(){
    const [dir,setDir]=useState(meta.direccion||"");
    const [trabajos,setTrabajos]=useState("");
    const [materiales,setMateriales]=useState("");

    function handleGenerar(){
      // Guardar dirección si se rellenó
      if(dir&&dir!==meta.direccion&&setObrasMeta){
        const upd={...obrasMeta,[metaKey]:{...meta,direccion:dir}};
        setObrasMeta(upd);localStorage.setItem("wk_obras_meta",JSON.stringify(upd));
      }
      generarPDF(dir,trabajos,materiales);
      setShowPDFForm(false);
    }

    const inp={width:"100%",padding:"10px 14px",borderRadius:12,border:`1px solid ${T.border}`,background:T.bg,fontFamily:T.sans,fontSize:14,color:T.text,outline:"none"};
    const lbl={fontFamily:T.sans,fontWeight:700,fontSize:12,color:T.text2,textTransform:"uppercase",letterSpacing:".06em",marginBottom:5,display:"block"};
    return(
      <Modal title="Datos del parte" onClose={()=>setShowPDFForm(false)}>
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          <div style={{background:T.bg3,borderRadius:12,padding:"10px 14px",fontFamily:T.sans,fontSize:12,color:T.text2}}>
            <strong style={{color:T.text}}>{obraName}{subobra?` · ${subobra}`:""}</strong><br/>
            Período: {fechaIni} → {fechaFin} · {total}h · {entries.length} partes
          </div>
          <div>
            <label style={lbl}>Dirección de la obra</label>
            <input value={dir} onChange={e=>setDir(e.target.value)} placeholder="Calle, número, ciudad..." style={inp}/>
          </div>
          <div>
            <label style={lbl}>Trabajos realizados</label>
            <textarea value={trabajos} onChange={e=>setTrabajos(e.target.value)} rows={3} placeholder="Describe los trabajos realizados..." style={{...inp,resize:"vertical"}}/>
          </div>
          <div>
            <label style={lbl}>Materiales utilizados</label>
            <textarea value={materiales} onChange={e=>setMateriales(e.target.value)} rows={3} placeholder="Lista de materiales..." style={{...inp,resize:"vertical"}}/>
          </div>
          <Btn onClick={handleGenerar} style={{width:"100%"}}>🖨 Generar PDF</Btn>
        </div>
      </Modal>
    );
  }

  function generarPDF(dir,trabajos,materiales){
    const grouped={};
    entries.forEach(e=>{if(!grouped[e.trabajador])grouped[e.trabajador]=[];grouped[e.trabajador].push(e);});
    const css=`
      *{box-sizing:border-box;}
      body{font-family:Arial,Helvetica,sans-serif;font-size:12px;color:#111;margin:0;padding:0;}
      .header{background:#1a1612;color:#fff;padding:18px 28px;display:flex;justify-content:space-between;align-items:flex-start;}
      .htitle{font-size:20px;font-weight:bold;letter-spacing:-.01em;margin-bottom:3px;}
      .hsub{font-size:11px;opacity:.6;}
      .hdate{font-size:11px;opacity:.5;text-align:right;margin-top:4px;}
      .content{padding:22px 28px;}
      .infobox{background:#f5f0e8;border-radius:8px;padding:14px 16px;margin-bottom:18px;display:grid;grid-template-columns:1fr 1fr;gap:10px;}
      .irow{display:flex;flex-direction:column;gap:2px;}
      .ilabel{font-size:10px;font-weight:bold;text-transform:uppercase;letter-spacing:.06em;color:#7a6e5f;}
      .ivalue{font-size:13px;color:#1a1612;font-weight:500;}
      .ivalue.full{grid-column:1/-1;}
      .section{margin-bottom:18px;}
      .shead{background:#eee9df;border-left:4px solid #c9a84c;padding:8px 14px;font-weight:bold;font-size:13px;margin-bottom:0;display:flex;justify-content:space-between;align-items:center;}
      .shead span{font-weight:normal;font-size:11px;color:#7a6e5f;}
      table{width:100%;border-collapse:collapse;font-size:11px;}
      th{background:#f5f0e8;padding:6px 10px;text-align:left;font-weight:bold;color:#7a6e5f;text-transform:uppercase;font-size:10px;letter-spacing:.04em;}
      td{padding:7px 10px;border-bottom:1px solid #eee9df;color:#1a1612;}
      tr:last-child td{border-bottom:none;}
      .totrow td{font-weight:bold;background:#f5f0e8;border-top:2px solid #c9a84c;}
      .textblock{background:#faf8f3;border:1px solid #eee9df;border-radius:8px;padding:12px 14px;font-size:12px;line-height:1.6;white-space:pre-wrap;margin-top:6px;}
      .footer{margin-top:28px;padding-top:14px;border-top:2px solid #eee9df;display:flex;justify-content:space-between;font-size:10px;color:#b5a898;}
    `;
    const totalWorkers=workers.length;
    const html=`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Parte ${obraName}</title><style>${css}</style></head><body>
      <div class="header">
        <div>
          <div class="htitle">RIBASESEDOS · ${obraName}${subobra?` · ${subobra}`:""}</div>
          <div class="hsub">Parte de trabajo${dir?` · ${dir}`:""}</div>
        </div>
        <div class="hdate">${new Date().toLocaleDateString("es-ES",{day:"2-digit",month:"2-digit",year:"numeric"})}</div>
      </div>
      <div class="content">
        <div class="infobox">
          <div class="irow"><span class="ilabel">Obra</span><span class="ivalue">${obraName}</span></div>
          ${subobra?`<div class="irow"><span class="ilabel">Partida / Subobra</span><span class="ivalue">${subobra}</span></div>`:""}
          <div class="irow"><span class="ilabel">Período</span><span class="ivalue">${fechaIni} → ${fechaFin}</span></div>
          <div class="irow"><span class="ilabel">Total horas</span><span class="ivalue" style="color:#a8863a;font-weight:bold;font-size:15px;">${total}h</span></div>
          <div class="irow"><span class="ilabel">Trabajadores</span><span class="ivalue">${totalWorkers}</span></div>
          <div class="irow"><span class="ilabel">Partes</span><span class="ivalue">${entries.length}</span></div>
          ${dir?`<div class="irow" style="grid-column:1/-1"><span class="ilabel">Dirección</span><span class="ivalue">${dir}</span></div>`:""}
        </div>

        ${trabajos?`<div class="section"><div class="shead">Trabajos realizados</div><div class="textblock">${trabajos}</div></div>`:""}
        ${materiales?`<div class="section"><div class="shead">Materiales utilizados</div><div class="textblock">${materiales}</div></div>`:""}

        ${Object.entries(grouped).map(([w,es])=>{
          const wTotal=es.reduce((s,e)=>s+e.horas,0);
          return`<div class="section">
            <div class="shead">${w} <span>${wTotal}h · ${es.length} parte${es.length!==1?"s":""}</span></div>
            <table>
              <tr><th>Fecha</th><th>Horas</th><th>Tipo</th><th>Notas</th></tr>
              ${[...es].sort((a,b)=>a.fecha.localeCompare(b.fecha)).map(e=>`<tr><td>${e.fecha}</td><td style="font-weight:bold;">${e.horas}h</td><td>${getHT(e,festivos)==="n"?"Normal":getHT(e,festivos)==="e"?"Extra":getHT(e,festivos)==="f"?"Festivo":"Sábado"}</td><td style="color:#7a6e5f;">${e.notas||"—"}</td></tr>`).join("")}
            </table>
          </div>`;
        }).join("")}

        <table><tr class="totrow"><td colspan="3" style="font-size:13px;">TOTAL HORAS</td><td style="font-size:15px;color:#a8863a;">${total}h</td></tr></table>

        <div class="footer">
          <span>Ribasesedos · Grup Ese Dos</span>
          <span>Generado: ${new Date().toLocaleString("es-ES")}</span>
        </div>
      </div>
    </body></html>`;

    // Descarga directa como blob (funciona en móvil)
    const blob=new Blob([html],{type:"text/html;charset=utf-8"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;
    a.download=`Parte_${obraName.replace(/[^a-zA-Z0-9]/g,"_")}${subobra?"_"+subobra.replace(/[^a-zA-Z0-9]/g,"_"):""}_${fechaIni}.html`;
    document.body.appendChild(a);a.click();
    setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},1000);
  }

  return(
    <>
    <div style={{background:T.bg2,borderRadius:14,border:`1px solid ${T.border}`,marginBottom:10,overflow:"hidden",boxShadow:T.shadow}}>
      <div onClick={()=>setOpen(o=>!o)} style={{padding:"12px 16px",display:"flex",alignItems:"center",gap:12,cursor:"pointer"}}>
        <div style={{flex:1}}>
          <div style={{fontFamily:T.sans,fontWeight:800,fontSize:14,color:T.text}}>{subobra||"General"}</div>
          <div style={{fontFamily:T.sans,fontSize:12,color:T.text2}}>{workers.length} trabajadores · {entries.length} partes</div>
        </div>
        <div style={{fontFamily:T.display,fontSize:18,fontWeight:900,color:T.goldDark}}>{total}h</div>
        <span style={{color:T.text3,fontSize:14,transform:open?"rotate(180deg)":"none",transition:"transform .2s"}}>▼</span>
      </div>
      {open&&(
        <div style={{borderTop:`1px solid ${T.border}`,padding:"12px 16px"}}>
          <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:12}}>
            {entries.map(e=>(
              <div key={e.id} style={{display:"flex",alignItems:"center",gap:10,padding:"7px 10px",background:T.bg3,borderRadius:10}}>
                <Avatar name={e.trabajador} size={28}/>
                <div style={{flex:1}}>
                  <div style={{fontFamily:T.sans,fontSize:12,fontWeight:700,color:T.text}}>{e.trabajador}</div>
                  <div style={{fontFamily:T.sans,fontSize:11,color:T.text2}}>{e.fecha}</div>
                </div>
                <div style={{fontFamily:T.mono,fontSize:13,fontWeight:700,color:T.text}}>{e.horas}h</div>
                <HTBadge type={getHT(e,festivos)}/>
              </div>
            ))}
          </div>
          <Btn variant="secondary" small onClick={()=>setShowPDFForm(true)} style={{width:"100%"}}>🖨 Generar PDF parte</Btn>
        </div>
      )}
    </div>
    {showPDFForm&&<PDFForm/>}
    </>
  );
}

// ─── WORKER MODAL ─────────────────────────────────────────────────────────────
function WorkerModal({workerName,data,festivos,adminOverrides,session,ausencias,onClose}){
  const allWorkers=["JCM","Txema","Javi ESE2","Carlos Camacho","Jimmy Jazz S2","Manja","Paco Ortega","Gustavo"];
  const wData=data.filter(e=>e.trabajador===workerName);
  const totalH=wData.reduce((s,e)=>s+e.horas,0);
  const now=new Date();const yr=now.getFullYear(),mo=now.getMonth();
  const mesMio=wData.filter(e=>{const d=new Date(e.fecha+"T12:00:00");return d.getFullYear()===yr&&d.getMonth()===mo;});
  const hMes=mesMio.reduce((s,e)=>s+e.horas,0);

  function generatePDF(){
    const css=`body{font-family:Arial,sans-serif;font-size:12px;margin:0;padding:0;}
      .header{background:#1a1612;color:#fff;padding:16px 24px;}
      .title{font-size:18px;font-weight:bold;}
      .content{padding:20px 24px;}
      table{width:100%;border-collapse:collapse;}
      th{background:#f5f0e8;padding:6px 8px;text-align:left;font-size:11px;}
      td{padding:6px 8px;border-bottom:1px solid #eee;font-size:11px;}
      .total{font-weight:bold;background:#f5f0e8;}`;
    const html=`<!DOCTYPE html><html><head><meta charset="UTF-8"><style>${css}</style></head><body>
      <div class="header"><div class="title">RIBASESEDOS · ${workerName}</div><div style="font-size:11px;opacity:.6;margin-top:4px;">Informe de horas · ${new Date().toLocaleDateString("es-ES")}</div></div>
      <div class="content">
      <table><tr><th>Fecha</th><th>Obra</th><th>Subobra</th><th>Horas</th><th>Tipo</th><th>Notas</th></tr>
      ${[...wData].sort((a,b)=>a.fecha.localeCompare(b.fecha)).map(e=>`<tr><td>${e.fecha}</td><td>${e.obra}</td><td>${e.subobra||""}</td><td>${e.horas}h</td><td>${getHT(e,festivos)}</td><td>${e.notas||""}</td></tr>`).join("")}
      <tr class="total"><td colspan="3">TOTAL</td><td>${totalH}h</td><td colspan="2"></td></tr>
      </table></div></body></html>`;
    const w2=window.open("","_blank","width=800,height=600");
    w2.document.write(html);w2.document.close();w2.print();
  }

  return(
    <Modal title={workerName} onClose={onClose}>
      <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:16,paddingBottom:14,borderBottom:`1px solid ${T.border}`}}>

        </div>
      </div>
      <div style={{display:"flex",gap:8,marginBottom:14}}>
        <StatBox label="Horas mes" value={`${hMes}h`} color={T.goldDark}/>
        <StatBox label="Total" value={`${totalH}h`}/>
        <StatBox label="Obras mes" value={[...new Set(mesMio.map(e=>e.obra))].length}/>
      </div>
      <Section title="Obras (mes actual)">
        <div style={{display:"flex",flexDirection:"column",gap:6}}>
          {[...new Set(mesMio.map(e=>e.obra))].map(o=>{
            const hO=mesMio.filter(e=>e.obra===o).reduce((s,e)=>s+e.horas,0);

      </Section>

        <Section title="Últimas ausencias">
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {ausW.map((a,i)=>(
              <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 12px",background:T.bg3,borderRadius:10}}>

// ─── CALENDAR VIEW ────────────────────────────────────────────────────────────
function CalendarView({data,festivos,session,ausencias,onSelectParte}){
  const [cur,setCur]=useState(()=>{const n=new Date();return{y:n.getFullYear(),m:n.getMonth()};});
  const allWorkers=["JCM","Txema","Javi ESE2","Carlos Camacho","Jimmy Jazz S2","Manja","Paco Ortega","Gustavo"];
  const [fW,setFW]=useState(session.isAdmin?"todos":session.name);

  const firstDay=new Date(cur.y,cur.m,1).getDay();
  const daysInMonth=new Date(cur.y,cur.m+1,0).getDate();
  const offset=(firstDay+6)%7; // lunes=0
  const cells=Array(offset).fill(null).concat([...Array(daysInMonth)].map((_,i)=>i+1));
  while(cells.length%7!==0)cells.push(null);

  const mnArr=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
  const dias=["L","M","X","J","V","S","D"];

  function cellData(d){
    if(!d)return null;
    const f=`${cur.y}-${String(cur.m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const entries=data.filter(e=>e.fecha===f&&(fW==="todos"||e.trabajador===fW));
    const fest=festivos.find(x=>x.fecha===f);
    const isSun=new Date(f+"T12:00:00").getDay()===0;
    const ausDay=(ausencias||[]).filter(a=>a.estado==="aprobada"&&a.fechaInicio<=f&&(a.fechaFin||a.fechaInicio)>=f&&(fW==="todos"||a.trabajador===fW));
    return{f,entries,fest,isSun,ausDay};
  }

  return(
    <div style={{paddingBottom:80}}>
      <Header title="Calendario"
        right={
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <button onClick={()=>setCur(c=>{let m=c.m-1,y=c.y;if(m<0){m=11;y--;}return{y,m};})} style={{background:T.bg3,border:"none",borderRadius:8,width:30,height:30,cursor:"pointer",fontSize:16}}>←</button>
            <button onClick={()=>setCur(c=>{let m=c.m+1,y=c.y;if(m>11){m=0;y++;}return{y,m};})} style={{background:T.bg3,border:"none",borderRadius:8,width:30,height:30,cursor:"pointer",fontSize:16}}>→</button>
          </div>
        }
        sub={`${mnArr[cur.m]} ${cur.y}`}
      />
      {session.isAdmin&&(
        <div style={{padding:"8px 14px 0",display:"flex",gap:6,overflowX:"auto",paddingBottom:6}}>
          <Pill label="Todos" active={fW==="todos"} onClick={()=>setFW("todos")}/>
          {allWorkers.map((w,i)=><Pill key={w} label={w.split(" ")[0]} active={fW===w} onClick={()=>setFW(w)} color={WC[i%WC.length]}/>)}
        </div>
      )}
      <div style={{padding:"8px 10px 0"}}>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:4}}>
          {dias.map(d=><div key={d} style={{textAlign:"center",fontFamily:T.sans,fontSize:10,fontWeight:700,color:T.text2,padding:"4px 0"}}>{d}</div>)}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2}}>
          {cells.map((d,i)=>{
            const cd=cellData(d);
            if(!cd)return<div key={i}/>;
            const isToday=cd.f===today();
            const totalH=cd.entries.reduce((s,e)=>s+e.horas,0);
            const hasFest=cd.fest||cd.isSun;
            return(
              <div key={i} onClick={()=>{}} style={{minHeight:52,borderRadius:10,padding:"4px 5px",background:isToday?T.goldDim:hasFest?T.redDim:T.bg2,border:`1px solid ${isToday?T.gold:hasFest?"rgba(192,57,43,.15)":T.border}`,cursor:"default",position:"relative"}}>
                <div style={{fontFamily:T.sans,fontSize:11,fontWeight:isToday?900:600,color:isToday?T.goldDark:hasFest?T.red:T.text}}>{d}</div>
                {totalH>0&&<div style={{fontFamily:T.mono,fontSize:10,fontWeight:800,color:T.goldDark,marginTop:2}}>{totalH}h</div>}
                {cd.ausDay.length>0&&<div style={{fontSize:8,color:T.orange,marginTop:1}}>📅×{cd.ausDay.length}</div>}
                {cd.fest&&<div style={{fontSize:8,color:T.red,marginTop:1,lineHeight:1.1,overflow:"hidden"}}>{cd.fest.nombre.slice(0,10)}</div>}
                {cd.entries.length>0&&(
                  <div style={{display:"flex",gap:1,flexWrap:"wrap",marginTop:2}}>
                    {cd.entries.slice(0,4).map((e,j)=>(
                      <div key={j} style={{width:6,height:6,borderRadius:"50%",background:WC[allWorkers.indexOf(e.trabajador)%WC.length]}}/>
                    ))}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ─── FICHAJE SCREEN ───────────────────────────────────────────────────────────
function FichajeScreen({session,fichajes,setFichajes,toast}){
  const [loading,setLoading]=useState(false);
  const myF=(fichajes||[]).filter(f=>f.trabajador===session.name).slice(-10).reverse();
  const lastEntry=myF[0];
  const isOpen=lastEntry&&!lastEntry.salida;

  async function getLocation(){
    return new Promise((res,rej)=>navigator.geolocation.getCurrentPosition(p=>res({lat:p.coords.latitude,lng:p.coords.longitude,acc:p.coords.accuracy}),rej,{timeout:8000}));
  }

  async function handleFichar(){
    setLoading(true);
    try{
      let loc=null;
      try{loc=await getLocation();}catch(e){loc=null;}
      if(isOpen){
        const upd=(fichajes||[]).map(f=>f.id===lastEntry.id?{...f,salida:new Date().toISOString(),locSalida:loc}:f);
        setFichajes(upd);localStorage.setItem("wk_fichajes",JSON.stringify(upd));
        toast("Salida registrada");
      } else {
        const nuevo={id:Date.now(),trabajador:session.name,entrada:new Date().toISOString(),locEntrada:loc,salida:null};
        const upd=[...fichajes,nuevo];
        setFichajes(upd);localStorage.setItem("wk_fichajes",JSON.stringify(upd));
        toast("Entrada registrada");
      }
    }catch(e){toast("Error al fichar","error");}
    setLoading(false);
  }

  function duracion(entrada,salida){
    const ms=(new Date(salida||new Date())-new Date(entrada));
    const h=Math.floor(ms/3600000);const m=Math.floor((ms%3600000)/60000);
    return`${h}h ${m}m`;
  }

  return(
    <div style={{paddingBottom:80}}>
      <Header title="Fichaje" sub={session.name}/>
      <div style={{padding:"24px 20px",display:"flex",flexDirection:"column",alignItems:"center",gap:20}}>
        <div style={{width:140,height:140,borderRadius:"50%",background:isOpen?T.greenDim:T.bg2,border:`3px solid ${isOpen?T.green:T.border}`,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",boxShadow:T.shadowM}}>
          <div style={{fontSize:36}}>{isOpen?"🟢":"⭕"}</div>
          <div style={{fontFamily:T.sans,fontWeight:700,fontSize:13,color:isOpen?T.green:T.text2,marginTop:4}}>{isOpen?"En obra":"Sin fichar"}</div>
          {isOpen&&<div style={{fontFamily:T.mono,fontSize:11,color:T.green,marginTop:2}}>{duracion(lastEntry.entrada,null)}</div>}
        </div>
        <Btn onClick={handleFichar} disabled={loading} style={{width:"100%",maxWidth:280,background:isOpen?T.red:T.green}}>
          {loading?"Procesando...":(isOpen?"Registrar salida":"Registrar entrada")}
        </Btn>
        <div style={{width:"100%",maxWidth:400}}>
          <div style={{fontFamily:T.sans,fontWeight:700,fontSize:12,color:T.text2,textTransform:"uppercase",letterSpacing:".06em",marginBottom:8}}>Últimos fichajes</div>
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {myF.map(f=>(
              <div key={f.id} style={{background:T.bg2,borderRadius:12,padding:"10px 14px",border:`1px solid ${T.border}`}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span style={{fontFamily:T.sans,fontSize:12,fontWeight:700,color:T.text}}>🟢 {new Date(f.entrada).toLocaleString("es-ES",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"})}</span>
                  {f.locEntrada&&<span style={{fontFamily:T.sans,fontSize:10,color:T.blue}}>📍</span>}
                </div>
                {f.salida&&(
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:4}}>
                    <span style={{fontFamily:T.sans,fontSize:12,color:T.text2}}>🔴 {new Date(f.salida).toLocaleString("es-ES",{hour:"2-digit",minute:"2-digit"})}</span>
                    <span style={{fontFamily:T.mono,fontSize:12,fontWeight:700,color:T.goldDark}}>{duracion(f.entrada,f.salida)}</span>
                  </div>
                )}
                {!f.salida&&<div style={{fontFamily:T.sans,fontSize:11,color:T.green,marginTop:4}}>En curso · {duracion(f.entrada,null)}</div>}
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── CONFIG / ADMIN PANEL ─────────────────────────────────────────────────────
function ConfigScreen({session,festivos,setFestivos,adminOverrides,setAdminOverrides,data,setData,accounts,setAccounts,toast,onLogout}){
  const allWorkers=["JCM","Txema","Javi ESE2","Carlos Camacho","Jimmy Jazz S2","Manja","Paco Ortega","Gustavo"];
  const [tab,setTab]=useState(session.isAdmin?"festivos":"backup");
  const [nuevaFecha,setNuevaFecha]=useState("");
  const [nuevaNombre,setNuevaNombre]=useState("");
  const [showWorkerCfg,setShowWorkerCfg]=useState(false);
  const [selWorker,setSelWorker]=useState(null);
  const [newPin,setNewPin]=useState("");
  const [newPhone,setNewPhone]=useState("");

  function addFestivo(){
    if(!nuevaFecha){toast("Indica la fecha","error");return;}
    if(festivos.some(f=>f.fecha===nuevaFecha)){toast("Ya existe","warning");return;}
    const upd=[...festivos,{fecha:nuevaFecha,nombre:nuevaNombre||"Festivo"}].sort((a,b)=>a.fecha.localeCompare(b.fecha));
    setFestivos(upd);localStorage.setItem("wk_fest",JSON.stringify(upd));
    setNuevaFecha("");setNuevaNombre("");toast("Festivo añadido");
  }
  function removeFestivo(f){
    const upd=festivos.filter(x=>x.fecha!==f.fecha);
    setFestivos(upd);localStorage.setItem("wk_fest",JSON.stringify(upd));
  }
  function exportBackup(){
    const bk={data,festivos,adminOverrides,accounts,ausencias:JSON.parse(localStorage.getItem("wk_ausencias")||"[]"),fichajes:JSON.parse(localStorage.getItem("wk_fichajes")||"[]"),exportedAt:new Date().toISOString(),version:3};
    const blob=new Blob([JSON.stringify(bk,null,2)],{type:"application/json"});
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`workly_backup_${today()}.json`;a.click();
    toast("Backup exportado");
  }
  function importBackup(e){
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const bk=JSON.parse(ev.target.result);
        if(!bk.data||!Array.isArray(bk.data)){toast("Archivo inválido","error");return;}
        if(!confirm(`¿Importar backup de ${bk.exportedAt||"fecha desconocida"}? Se reemplazarán todos los datos.`))return;
        localStorage.setItem("wk_data",JSON.stringify(bk.data));
        localStorage.setItem("wk_fest",JSON.stringify(bk.festivos||[]));
        localStorage.setItem("wk_adm",JSON.stringify(bk.adminOverrides||{}));
        localStorage.setItem("wk_accounts",JSON.stringify(bk.accounts||[]));
        if(bk.ausencias)localStorage.setItem("wk_ausencias",JSON.stringify(bk.ausencias));
        if(bk.fichajes)localStorage.setItem("wk_fichajes",JSON.stringify(bk.fichajes));
        toast("Backup importado — recarga la página");
        setTimeout(()=>window.location.reload(),1500);
      }catch(err){toast("Error al parsear el backup","error");}
    };
    reader.readAsText(file);
  }
  function saveWorkerCfg(){
    if(!selWorker)return;
    let upd=[...accounts];
    const idx=upd.findIndex(a=>a.name===selWorker);
    if(idx>=0){if(newPin)upd[idx]={...upd[idx],pin:newPin};if(newPhone!==undefined)upd[idx]={...upd[idx],phone:newPhone};}
    else{upd.push({name:selWorker,pin:newPin||"0000",phone:newPhone,deviceId:null});}
    setAccounts(upd);localStorage.setItem("wk_accounts",JSON.stringify(upd));
    toast("Trabajador actualizado");setShowWorkerCfg(false);setNewPin("");setNewPhone("");setSelWorker(null);
  }
  function unbindDevice(w){
    const upd=accounts.map(a=>a.name===w?{...a,deviceId:null}:a);
    setAccounts(upd);localStorage.setItem("wk_accounts",JSON.stringify(upd));
    toast("Dispositivo desvinculado");
  }

  const inp={width:"100%",padding:"10px 14px",borderRadius:12,border:`1px solid ${T.border}`,background:T.bg2,fontFamily:T.sans,fontSize:14,color:T.text,outline:"none"};
  const lbl={fontFamily:T.sans,fontWeight:700,fontSize:12,color:T.text2,textTransform:"uppercase",letterSpacing:".06em",marginBottom:5,display:"block"};

  return(
    <div style={{paddingBottom:80}}>
      <Header title="Configuración"/>
      {session.isAdmin&&(
        <div style={{padding:"10px 14px 0",display:"flex",gap:6,overflowX:"auto",flexWrap:"wrap"}}>
          {["festivos","obras","trabajadores","backup"].map(t=>(
            <Pill key={t} label={t.charAt(0).toUpperCase()+t.slice(1)} active={tab===t} onClick={()=>setTab(t)}/>
          ))}
        </div>
      )}
      <div style={{padding:"14px 14px 0"}}>
        {(tab==="backup"||!session.isAdmin)&&(
          <Section title="Backup de datos">
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              <Btn variant="secondary" style={{width:"100%"}} onClick={exportBackup}>📤 Exportar backup JSON</Btn>
              <label style={{display:"block",width:"100%"}}>
                <div style={{padding:"13px 20px",borderRadius:12,background:T.bg3,border:`1px solid ${T.border}`,fontFamily:T.sans,fontWeight:700,fontSize:15,color:T.text,textAlign:"center",cursor:"pointer"}}>📥 Importar backup JSON</div>
                <input type="file" accept=".json" style={{display:"none"}} onChange={importBackup}/>
              </label>
              <div style={{fontFamily:T.sans,fontSize:12,color:T.text3}}>El backup incluye todos los partes, festivos, cuentas y ausencias. <strong>Importar reemplaza todos los datos actuales.</strong></div>
            </div>
          </Section>
        )}
        {tab==="festivos"&&session.isAdmin&&(
          <Section title="Festivos">
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
              <input type="date" value={nuevaFecha} onChange={e=>setNuevaFecha(e.target.value)} style={inp}/>
              <input value={nuevaNombre} onChange={e=>setNuevaNombre(e.target.value)} placeholder="Nombre" style={inp}/>
            </div>
            <Btn variant="secondary" small style={{width:"100%",marginBottom:12}} onClick={addFestivo}>+ Añadir festivo</Btn>
            <div style={{display:"flex",flexDirection:"column",gap:4}}>
              {festivos.map(f=>(
                <div key={f.fecha} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 12px",background:T.bg2,borderRadius:10,border:`1px solid ${T.border}`}}>
                  <span style={{fontFamily:T.mono,fontSize:12,color:T.text,flex:0,whiteSpace:"nowrap"}}>{f.fecha}</span>
                  <span style={{fontFamily:T.sans,fontSize:12,color:T.text,flex:1}}>{f.nombre}</span>
                  <button onClick={()=>removeFestivo(f)} style={{background:"none",border:"none",cursor:"pointer",color:T.red,fontSize:16,padding:"0 4px"}}>×</button>
                </div>
              ))}
            </div>
          </Section>
        )}
        {tab==="obras"&&session.isAdmin&&(
          <Section title="Override tipo hora por obra">
            <div style={{fontFamily:T.sans,fontSize:12,color:T.text2,marginBottom:10}}>Fuerza que una obra se trate como Admin o Trabajo</div>
            {[...new Set(data.map(e=>e.obra))].sort().map(o=>{
              const k=normObra(o);
              const cur=adminOverrides[k];
              return(
                <div key={o} style={{display:"flex",alignItems:"center",gap:8,marginBottom:6,padding:"8px 12px",background:T.bg2,borderRadius:10,border:`1px solid ${T.border}`}}>
                  <span style={{fontFamily:T.sans,fontSize:12,color:T.text,flex:1}}>{o}</span>
                  {[undefined,true,false].map((v,i)=>(
                    <button key={i} onClick={()=>{const upd={...adminOverrides};if(v===undefined)delete upd[k];else upd[k]=v;setAdminOverrides(upd);localStorage.setItem("wk_adm",JSON.stringify(upd));}} style={{padding:"3px 8px",borderRadius:8,border:`1px solid ${cur===v?T.gold:T.border}`,background:cur===v?T.goldDim:"transparent",fontFamily:T.sans,fontSize:10,fontWeight:700,color:cur===v?T.goldDark:T.text2,cursor:"pointer"}}>
                      {v===undefined?"Auto":v===true?"Admin":"Trabajo"}
                    </button>
                  ))}
                </div>
              );
            })}
          </Section>
        )}
        {tab==="trabajadores"&&session.isAdmin&&(
          <Section title="Cuentas trabajadores">
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {allWorkers.filter(w=>w!==ADMIN_NAME).map((w,i)=>{
                const acc=accounts.find(a=>a.name===w);
                return(
                  <div key={w} style={{background:T.bg2,borderRadius:12,padding:"12px 14px",border:`1px solid ${T.border}`}}>
                    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:acc?.deviceId?8:0}}>
                      <Avatar name={w} size={34} color={WC[i%WC.length]}/>
                      <div style={{flex:1}}>
                        <div style={{fontFamily:T.sans,fontWeight:700,fontSize:13,color:T.text}}>{w}</div>
                        <div style={{fontFamily:T.sans,fontSize:11,color:T.text2}}>PIN: {acc?.pin||"sin PIN"} {acc?.phone?`· 📱 ${acc.phone}`:""}</div>
                      </div>
                      <Btn variant="secondary" small onClick={()=>{setSelWorker(w);setNewPin(acc?.pin||"");setNewPhone(acc?.phone||"");setShowWorkerCfg(true);}}>Editar</Btn>
                    </div>
                    {acc?.deviceId&&(
                      <div style={{display:"flex",alignItems:"center",gap:8,marginTop:6,padding:"6px 10px",background:T.bg3,borderRadius:8}}>
                        <span style={{fontFamily:T.sans,fontSize:11,color:T.text2,flex:1}}>🔒 Dispositivo vinculado</span>
                        <button onClick={()=>unbindDevice(w)} style={{background:"none",border:"none",cursor:"pointer",fontFamily:T.sans,fontSize:11,color:T.red,fontWeight:700}}>Desvincular</button>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          </Section>
        )}
        {!session.isAdmin&&(
          <div style={{marginTop:16}}>
            <Btn variant="danger" style={{width:"100%"}} onClick={onLogout}>Cerrar sesión</Btn>
          </div>
        )}
      </div>
      {showWorkerCfg&&selWorker&&(
        <Modal title={`Editar: ${selWorker}`} onClose={()=>setShowWorkerCfg(false)}>
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            <div><label style={lbl}>Nuevo PIN (4 dígitos)</label><input value={newPin} onChange={e=>setNewPin(e.target.value.replace(/\D/,"").slice(0,4))} placeholder="0000" style={inp} maxLength={4} type="tel"/></div>
            <div><label style={lbl}>Teléfono (para WhatsApp)</label><input value={newPhone} onChange={e=>setNewPhone(e.target.value)} placeholder="+34 600 000 000" style={inp} type="tel"/></div>
            <Btn onClick={saveWorkerCfg} style={{width:"100%"}}>Guardar</Btn>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ─── APP ROOT ─────────────────────────────────────────────────────────────────
function App(){
  const init=loadState();
  const [data,setDataRaw]=useState(init.data);
  const [festivos,setFestivosRaw]=useState(init.festivos);
  const [adminOverrides,setAdminOverridesRaw]=useState(init.adminOverrides);
  const [fichajes,setFichajesRaw]=useState(init.fichajes);
  const [accounts,setAccountsRaw]=useState(init.accounts);
  const [ausencias,setAusenciasRaw]=useState(init.ausencias);
  const [obrasMeta,setObrasMetaRaw]=useState(()=>{try{return JSON.parse(localStorage.getItem("wk_obras_meta")||"{}");}catch(e){return{};}});
  const [session,setSession]=useState(init.session);
  const [tab,setTab]=useState("dashboard");
  const [modalObra,setModalObra]=useState(null);
  const [modalWorker,setModalWorker]=useState(null);
  const [modalParte,setModalParte]=useState(null);
  const [editParte,setEditParte]=useState(null);
  const [prefillNuevo,setPrefillNuevo]=useState(null);
  const [showQuick,setShowQuick]=useState(false);
  const [showFichaje,setShowFichaje]=useState(false);
  const [showResumenPDF,setShowResumenPDF]=useState(false);
  const [toastShow,toastEl]=useToast();

  function setData(v){setDataRaw(v);localStorage.setItem("wk_data",JSON.stringify(v));}
  function setFestivos(v){setFestivosRaw(v);localStorage.setItem("wk_fest",JSON.stringify(v));}
  function setAdminOverrides(v){setAdminOverridesRaw(v);localStorage.setItem("wk_adm",JSON.stringify(v));}
  function setFichajes(v){setFichajesRaw(v);localStorage.setItem("wk_fichajes",JSON.stringify(v));}
  function setAccounts(v){setAccountsRaw(v);localStorage.setItem("wk_accounts",JSON.stringify(v));}
  function setAusencias(v){setAusenciasRaw(v);localStorage.setItem("wk_ausencias",JSON.stringify(v));}
  function setObrasMeta(v){setObrasMetaRaw(v);localStorage.setItem("wk_obras_meta",JSON.stringify(v));}

  function handleLogin(s){
    setSession(s);localStorage.setItem("wk_session",JSON.stringify(s));
    setTab(s.isAdmin?"dashboard":"miperfil");
  }
  function handleLogout(){
    setSession(null);localStorage.removeItem("wk_session");setTab("dashboard");
  }

  function handleSaveParte(e){
    if(editParte){
      const upd=data.map(x=>x.id===editParte.id?{...editParte,...e}:x);
      setData(upd);toastShow("Parte actualizado");setEditParte(null);setModalParte(null);
    } else {
      const newId=Math.max(0,...data.map(x=>x.id))+1;
      const upd=[...data,{...e,id:newId}];
      setData(upd);toastShow("Parte guardado");
    }
    setTab("partes");setPrefillNuevo(null);
  }
  function handleSaveMulti(entries){
    const maxId=Math.max(0,...data.map(x=>x.id));
    const newEntries=entries.map((e,i)=>({...e,id:maxId+i+1}));
    setData([...data,...newEntries]);
    toastShow(`${newEntries.length} partes guardados`);setShowQuick(false);setTab("partes");
  }
  function handleDeleteParte(id){
    setData(data.filter(e=>e.id!==id));toastShow("Parte eliminado","warning");setModalParte(null);
  }

  function generateResumenPDF(){
    const now=new Date();const yr=now.getFullYear(),mo=now.getMonth();
    const mesData=data.filter(e=>{const d=new Date(e.fecha+"T12:00:00");return d.getFullYear()===yr&&d.getMonth()===mo;});
    const allW=["JCM","Txema","Javi ESE2","Carlos Camacho","Jimmy Jazz S2","Manja","Paco Ortega","Gustavo"];
    const mnArr=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
    const css=`body{font-family:Arial,sans-serif;font-size:12px;margin:0;padding:0;}
      .header{background:#1a1612;color:#fff;padding:16px 24px;display:flex;justify-content:space-between;}
      .title{font-size:18px;font-weight:bold;}.sub{font-size:11px;opacity:.6;margin-top:2px;}
      .content{padding:20px 24px;}.section{margin-bottom:16px;}
      .shead{background:#f5f0e8;border-left:4px solid #c9a84c;padding:8px 12px;font-weight:bold;font-size:13px;margin-bottom:6px;}
      table{width:100%;border-collapse:collapse;font-size:11px;}
      th{background:#eee9df;padding:6px 8px;text-align:left;font-weight:bold;}
      td{padding:6px 8px;border-bottom:1px solid #eee;}.total{font-weight:bold;background:#f5f0e8;}`;
    const html=`<!DOCTYPE html><html><head><meta charset="UTF-8"><style>${css}</style></head><body>
      <div class="header"><div><div class="title">RIBASESEDOS · Resumen mensual</div><div class="sub">${mnArr[mo]} ${yr}</div></div><div style="text-align:right;font-size:11px;opacity:.6;">${new Date().toLocaleDateString("es-ES")}</div></div>
      <div class="content">
      ${allW.map(w=>{
        const we=mesData.filter(e=>e.trabajador===w);if(we.length===0)return"";
        const th=we.reduce((s,e)=>s+e.horas,0);
        return`<div class="section"><div class="shead">${w} · ${th}h</div><table><tr><th>Fecha</th><th>Obra</th><th>Subobra</th><th>Horas</th><th>Tipo</th></tr>${[...we].sort((a,b)=>a.fecha.localeCompare(b.fecha)).map(e=>`<tr><td>${e.fecha}</td><td>${e.obra}</td><td>${e.subobra||""}</td><td>${e.horas}h</td><td>${getHT(e,festivos)}</td></tr>`).join("")}</table></div>`;
      }).join("")}
      </div></body></html>`;
    const w2=window.open("","_blank","width=900,height=700");w2.document.write(html);w2.document.close();w2.print();
  }

  if(!session){return(<><LoginScreen accounts={accounts} onLogin={handleLogin}/>{toastEl}</>);}

  const sortedData=[...data].sort((a,b)=>b.fecha.localeCompare(a.fecha)||b.id-a.id);
  const commonProps={data:sortedData,festivos,session,adminOverrides,ausencias,fichajes,accounts};

  function renderTab(){
    if(showQuick)return<QuickInput {...commonProps} onSaveMulti={handleSaveMulti} toast={toastShow}/>;
    if(showFichaje)return<FichajeScreen session={session} fichajes={fichajes} setFichajes={setFichajes} toast={toastShow}/>;

    switch(tab){
      case"dashboard":return<Dashboard {...commonProps} setTab={t=>{setShowQuick(false);setShowFichaje(false);setTab(t);}} onSelectWorker={w=>setModalWorker(w)} onSelectObra={o=>setModalObra(o)}/>;
      case"miperfil":return<MiPerfil {...commonProps} onLogout={handleLogout}/>;
      case"partes":return<PartesList {...commonProps} onSelectParte={p=>{setModalParte(p);setEditParte(null);}} onSelectWorker={w=>setModalWorker(w)} onSelectObra={o=>setModalObra(o)}/>;
      case"nuevo":return<NuevoParte {...commonProps} onSave={handleSaveParte} prefill={prefillNuevo} toast={toastShow}/>;
      case"ausencias":return<AusenciasScreen session={session} ausencias={ausencias} setAusencias={setAusencias} toast={toastShow}/>;
      case"equipo":return<EquipoList {...commonProps} onSelectWorker={w=>setModalWorker(w)}/>;
      case"obras":return<ObrasList data={sortedData} session={session} onSelectObra={o=>setModalObra(o)}/>;
      case"cal":return<CalendarView {...commonProps} onSelectParte={p=>setModalParte(p)}/>;
      case"cfg":return<ConfigScreen {...commonProps} setFestivos={setFestivos} setAdminOverrides={setAdminOverrides} setData={setData} setAccounts={setAccounts} toast={toastShow} onLogout={handleLogout}/>;
      default:return null;
    }
  }

  return(
    <div style={{maxWidth:520,margin:"0 auto",minHeight:"100vh",background:T.bg,position:"relative"}}>
      {renderTab()}
      {session.isAdmin&&tab==="partes"&&(
        <div style={{position:"fixed",bottom:70,right:16,display:"flex",flexDirection:"column",gap:8,zIndex:90}}>
          <button onClick={()=>{setShowQuick(q=>!q);setShowFichaje(false);}} style={{background:T.bg2,border:`1px solid ${T.border}`,borderRadius:12,padding:"8px 14px",fontFamily:T.sans,fontSize:12,fontWeight:700,color:T.text,cursor:"pointer",boxShadow:T.shadowM}}>⚡ Quick</button>
          <button onClick={generateResumenPDF} style={{background:T.bg2,border:`1px solid ${T.border}`,borderRadius:12,padding:"8px 14px",fontFamily:T.sans,fontSize:12,fontWeight:700,color:T.text,cursor:"pointer",boxShadow:T.shadowM}}>🖨 PDF Mes</button>
        </div>
      )}
      {session.isAdmin&&tab==="dashboard"&&(
        <div style={{position:"fixed",bottom:70,right:16,zIndex:90}}>
          <button onClick={()=>{setShowFichaje(f=>!f);setShowQuick(false);}} style={{background:T.bg2,border:`1px solid ${T.border}`,borderRadius:12,padding:"8px 14px",fontFamily:T.sans,fontSize:12,fontWeight:700,color:T.text,cursor:"pointer",boxShadow:T.shadowM}}>🕐 Fichaje</button>
        </div>
      )}
      <NavBar tab={showQuick?"partes":showFichaje?"dashboard":tab} setTab={t=>{setShowQuick(false);setShowFichaje(false);setTab(t);}} isAdmin={session.isAdmin} ausencias={ausencias}/>
      {modalObra&&<ObraModal obraName={modalObra} data={sortedData} festivos={festivos} adminOverrides={adminOverrides} session={session} onClose={()=>setModalObra(null)} obrasMeta={obrasMeta} setObrasMeta={setObrasMeta}/>}
      {modalWorker&&<WorkerModal workerName={modalWorker} data={sortedData} festivos={festivos} adminOverrides={adminOverrides} session={session} ausencias={ausencias} onClose={()=>setModalWorker(null)}/>}
      {modalParte&&!editParte&&<ParteModal parte={modalParte} data={sortedData} festivos={festivos} session={session} onClose={()=>setModalParte(null)} onDelete={handleDeleteParte} onEdit={p=>{setEditParte(p);setModalParte(null);setTab("nuevo");setPrefillNuevo(p);}}/>}
      {toastEl}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
