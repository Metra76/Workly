function SplashScreen({totalH,totalPartes,obrasActivas,workersActivos,yr,mo,onDone}){
  const [progress,setProgress]=useState(0);
  const mnArr=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
  React.useEffect(()=>{
    const start=Date.now();
    const duration=3000;
    const raf=()=>{
      const elapsed=Date.now()-start;
      const pct=Math.min(100,(elapsed/duration)*100);
      setProgress(pct);
      if(pct<100)requestAnimationFrame(raf);
      else onDone();
    };
    requestAnimationFrame(raf);
  },[]);
  return(
    <div style={{minHeight:"100vh",background:T.bgDark,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:32}}>
      <div style={{width:"100%",maxWidth:420}}>
        <div style={{display:"flex",justifyContent:"center",marginBottom:32}}>
          <div style={{display:"inline-flex",flexDirection:"column",alignItems:"center",border:"3px solid rgba(255,255,255,0.9)",borderRadius:6,padding:"12px 24px"}}>
            <div style={{fontFamily:"'Outfit',sans-serif",fontSize:32,fontWeight:900,color:"#fff",letterSpacing:".05em",lineHeight:1}}>ESE</div>
            <div style={{fontFamily:"'Outfit',sans-serif",fontSize:32,fontWeight:900,color:"#fff",letterSpacing:".05em",lineHeight:1}}>DOS</div>
          </div>
        </div>
        <div style={{textAlign:"center",marginBottom:36}}>
          <div style={{fontFamily:T.sans,fontSize:12,color:"rgba(255,255,255,.5)",letterSpacing:".1em",textTransform:"uppercase",marginBottom:6}}>Workly · Gestión</div>
          <div style={{fontFamily:T.display,fontSize:36,fontWeight:900,color:"#fff",letterSpacing:"-.02em"}}>{mnArr[mo]} {yr}</div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:36}}>
          {[
            {l:"Horas este mes",v:totalH+"h"},
            {l:"Partes registrados",v:totalPartes},
            {l:"Obras activas",v:obrasActivas},
            {l:"Trabajadores activos",v:workersActivos},
          ].map(s=>(
            <div key={s.l} style={{background:"rgba(255,255,255,.08)",borderRadius:16,padding:"18px 16px",border:"1px solid rgba(255,255,255,.12)"}}>
              <div style={{fontFamily:T.sans,fontSize:10,color:"rgba(255,255,255,.5)",textTransform:"uppercase",letterSpacing:".06em",marginBottom:4}}>{s.l}</div>
              <div style={{fontFamily:T.display,fontSize:28,fontWeight:900,color:"#fff"}}>{s.v}</div>
            </div>
          ))}
        </div>
        {/* Barra de progreso */}
        <div style={{background:"rgba(255,255,255,.15)",borderRadius:99,height:4,marginBottom:16,overflow:"hidden"}}>
          <div style={{height:"100%",width:progress+"%",background:"#fff",borderRadius:99,transition:"width .05s linear"}}/>
        </div>
        <button onClick={onDone} style={{width:"100%",padding:"14px",borderRadius:16,border:"1px solid rgba(255,255,255,.3)",background:"transparent",fontFamily:T.sans,fontSize:14,fontWeight:600,color:"rgba(255,255,255,.7)",cursor:"pointer"}}>
          Entrar ahora →
        </button>
      </div>
    </div>
  );
}

function App(){
  const init=loadState();
  const [data,setDataRaw]=useState(init.data);
  const [festivos,setFestivosRaw]=useState(init.festivos);
  const [adminOverrides,setAdminOverridesRaw]=useState(init.adminOverrides);
  const [fichajes,setFichajesRaw]=useState(init.fichajes);
  const [accounts,setAccountsRaw]=useState(init.accounts);
  const [ausencias,setAusenciasRaw]=useState(init.ausencias);
  const [obrasMeta,setObrasMetaRaw]=useState(()=>{try{return JSON.parse(localStorage.getItem("wk_obras_meta")||"{}");}catch(e){return{};}});
  const [session,setSession]=useState(init.session);
  const [tab,setTab]=useState("dashboard");
  const [modalObra,setModalObra]=useState(null);
  const [modalWorker,setModalWorker]=useState(null);
  const [modalParte,setModalParte]=useState(null);
  const [editParte,setEditParte]=useState(null);
  const [prefillNuevo,setPrefillNuevo]=useState(null);
  const [showQuick,setShowQuick]=useState(false);
  const [showParteFormal,setShowParteFormal]=useState(false);
  const [showFichaje,setShowFichaje]=useState(false);
  const [showResumenPDF,setShowResumenPDF]=useState(false);
  const [showCfg,setShowCfg]=useState(false);
  const [showSplash,setShowSplash]=useState(true);
  React.useEffect(()=>{
    const t=setTimeout(()=>setShowSplash(false),3000);
    return()=>clearTimeout(t);
  },[]);
  const [pdfMes,setPdfMes]=useState(()=>{const n=new Date();return`${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,"0")}`;});
  const [pdfWorker,setPdfWorker]=useState("todos");
  const [toastShow,toastEl]=useToast();

  function setData(v){setDataRaw(v);localStorage.setItem("wk_data",JSON.stringify(v));}
  function setFestivos(v){setFestivosRaw(v);localStorage.setItem("wk_fest",JSON.stringify(v));}
  function setAdminOverrides(v){setAdminOverridesRaw(v);localStorage.setItem("wk_adm",JSON.stringify(v));}
  function setFichajes(v){setFichajesRaw(v);localStorage.setItem("wk_fichajes",JSON.stringify(v));}
  function setAccounts(v){setAccountsRaw(v);localStorage.setItem("wk_accounts",JSON.stringify(v));}
  function setAusencias(v){setAusenciasRaw(v);localStorage.setItem("wk_ausencias",JSON.stringify(v));}
  function setObrasMeta(v){setObrasMetaRaw(v);localStorage.setItem("wk_obras_meta",JSON.stringify(v));}

  function handleLogin(s){
    setSession(s);localStorage.setItem("wk_session",JSON.stringify(s));
    setTab(s.isAdmin?"dashboard":"miperfil");
  }
  function handleLogout(){
    setSession(null);localStorage.removeItem("wk_session");setTab("dashboard");
  }

  function handleSaveParte(e){
    if(editParte){
      const upd=data.map(x=>x.id===editParte.id?{...editParte,...e}:x);
      setData(upd);toastShow("Parte actualizado");setEditParte(null);setModalParte(null);
    } else {
      const newId=Math.max(0,...data.map(x=>x.id))+1;
      const upd=[...data,{...e,id:newId}];
      setData(upd);toastShow("Parte guardado");
    }
    setTab("partes");setPrefillNuevo(null);
  }
  function handleSaveMulti(entries){
    const maxId=Math.max(0,...data.map(x=>x.id));
    const newEntries=entries.map((e,i)=>({...e,id:maxId+i+1}));
    setData([...data,...newEntries]);
    toastShow(`${newEntries.length} partes guardados`);setShowQuick(false);setTab("partes");
  }
  function handleDeleteParte(id){
    setData(data.filter(e=>e.id!==id));toastShow("Parte eliminado","warning");setModalParte(null);
  }

  function generateResumenPDF(pdfMes,pdfWorker){
    const [yr,mo]=pdfMes.split("-").map(Number);
    const moIdx=mo-1;
    const allW=["JCM","Txema","Javi ESE2","Carlos Camacho","Jimmy Jazz S2","Manja","Paco Ortega","Gustavo"];
    const workers=pdfWorker==="todos"?allW:[pdfWorker];
    const mesData=data.filter(e=>{const d=new Date(e.fecha+"T12:00:00");return d.getFullYear()===yr&&d.getMonth()===moIdx;});
    const mnArr=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
    const {jsPDF}=window.jspdf;
    const doc=new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
    const W=210,PL=15,PR=15,CW=W-PL-PR;
    doc.setFillColor(26,71,184);doc.rect(0,0,W,22,"F");
    doc.setTextColor(255,255,255);doc.setFontSize(14);doc.setFont("helvetica","bold");
    doc.text("RIBASESEDOS · Resumen mensual",PL,10);
    doc.setFontSize(9);doc.setFont("helvetica","normal");
    const workerLabel=pdfWorker==="todos"?"Todos los trabajadores":nombrePDF(pdfWorker);
    doc.text(`${mnArr[moIdx]} ${yr} · ${workerLabel}`,PL,16);
    doc.text(new Date().toLocaleDateString("es-ES"),W-PR,16,{align:"right"});
    let y=28;
    workers.forEach(w=>{
      const we=mesData.filter(e=>e.trabajador===w);if(we.length===0)return;
      const th=we.reduce((s,e)=>s+e.horas,0);
      if(y>240){doc.addPage();y=15;}
      doc.setFillColor(224,232,248);doc.rect(PL,y,CW,8,"F");
      doc.setDrawColor(26,71,184);doc.setLineWidth(0.8);doc.line(PL,y,PL,y+8);
      doc.setTextColor(26,22,18);doc.setFontSize(10);doc.setFont("helvetica","bold");
      doc.text(nombrePDF(w),PL+5,y+5.5);
      doc.setTextColor(26,71,184);doc.text(th+"h",W-PR,y+5.5,{align:"right"});
      y+=8;
      const rows=[...we].sort((a,b)=>a.fecha.localeCompare(b.fecha)).map(e=>[e.fecha,e.obra,e.subobra||"",e.horas+"h",getHT(e,festivos)==="n"?"Normal":getHT(e,festivos)==="e"?"Extra":getHT(e,festivos)==="f"?"Festivo":"Sábado"]);
      doc.autoTable({
        startY:y,head:[["Fecha","Obra","Subobra","Horas","Tipo"]],body:rows,
        margin:{left:PL,right:PR},
        styles:{fontSize:8,cellPadding:2,textColor:[26,22,18]},
        headStyles:{fillColor:[224,232,248],textColor:[26,71,184],fontStyle:"bold",fontSize:7},
      });
      y=doc.lastAutoTable.finalY+6;
    });
    const nombreFichero=`Resumen_${mnArr[moIdx]}_${yr}${pdfWorker!=="todos"?"_"+nombrePDF(pdfWorker):""}.pdf`;
    mostrarPDF(doc.output("blob"), nombreFichero);
  }

  if(showSplash){
    const now=new Date();const yr=now.getFullYear(),mo=now.getMonth();
    const mesData=data.filter(e=>{const d=new Date(e.fecha+"T12:00:00");return d.getFullYear()===yr&&d.getMonth()===mo;});
    const totalH=mesData.reduce((s,e)=>s+e.horas,0);
    const obrasActivas=[...new Set(mesData.map(e=>e.obra))].length;
    const workersActivos=[...new Set(mesData.map(e=>e.trabajador))].length;
    const totalPartes=mesData.length;
    return <SplashScreen totalH={totalH} totalPartes={totalPartes} obrasActivas={obrasActivas} workersActivos={workersActivos} yr={yr} mo={mo} onDone={()=>setShowSplash(false)}/>;
  }

  if(!session){return(<><LoginScreen accounts={accounts} onLogin={handleLogin}/>{toastEl}</>);}

  const sortedData=[...data].sort((a,b)=>b.fecha.localeCompare(a.fecha)||b.id-a.id);
  const commonProps={data:sortedData,festivos,session,adminOverrides,ausencias,fichajes,accounts};

  function renderTab(){
    if(showQuick)return<QuickInput {...commonProps} onSaveMulti={handleSaveMulti} toast={toastShow}/>;
    if(showParteFormal)return<ParteFormaScreen data={sortedData} festivos={festivos} obrasMeta={obrasMeta} setObrasMeta={setObrasMeta} onClose={()=>setShowParteFormal(false)} toast={toastShow}/>;
    if(showFichaje)return<FichajeScreen session={session} fichajes={fichajes} setFichajes={setFichajes} toast={toastShow}/>;

    switch(tab){
      case"dashboard":return<Dashboard {...commonProps} setTab={t=>{setShowQuick(false);setShowFichaje(false);setTab(t);}} onSelectWorker={w=>setModalWorker(w)} onSelectObra={o=>setModalObra(o)}/>;
      case"miperfil":return<MiPerfil {...commonProps} onLogout={handleLogout}/>;
      case"partes":return<PartesList {...commonProps} onSelectParte={p=>{setModalParte(p);setEditParte(null);}} onSelectWorker={w=>setModalWorker(w)} onSelectObra={o=>setModalObra(o)}/>;
      case"nuevo":return<NuevoParte obrasMeta={obrasMeta} {...commonProps} onSave={handleSaveParte} prefill={prefillNuevo} toast={toastShow}/>;
      case"fichar":return<FicharScreen {...commonProps} onSave={handleSaveParte} toast={toastShow} obrasMeta={obrasMeta}/>;
      case"equipo":return<EquipoList {...commonProps} onSelectWorker={w=>setModalWorker(w)}/>;
      case"obras":return<ObrasList obrasMeta={obrasMeta} data={sortedData} session={session} onSelectObra={o=>setModalObra(o)}/>;
      case"cal":return<CalendarView {...commonProps} ausencias={ausencias} setAusencias={setAusencias} onSelectParte={p=>setModalParte(p)} toast={toastShow}/>;
      case"trastero":return<TrasteroScreen session={session}/>;
      default:return null;
    }
  }

  return(
    <div id="app-shell" style={{maxWidth:1400,width:"100%",minHeight:"100vh",background:T.bg,position:"relative"}}>
      <div id="main-content">
      {renderTab()}
      {session.isAdmin&&tab==="partes"&&!showParteFormal&&(
        <div style={{position:"fixed",bottom:70,right:16,display:"flex",flexDirection:"column",gap:8,zIndex:90}}>
          <button onClick={()=>{setShowParteFormal(true);setShowQuick(false);setShowFichaje(false);}} style={{background:T.bg2,border:`1px solid ${T.border}`,borderRadius:12,padding:"8px 14px",fontFamily:T.sans,fontSize:12,fontWeight:700,color:T.text,cursor:"pointer",boxShadow:T.shadowM}}>📄 Parte PDF</button>
          <button onClick={()=>setShowResumenPDF(true)} style={{background:T.bg2,border:`1px solid ${T.border}`,borderRadius:12,padding:"8px 14px",fontFamily:T.sans,fontSize:12,fontWeight:700,color:T.text,cursor:"pointer",boxShadow:T.shadowM}}>🖨 PDF Mes</button>
        </div>
      )}
      {session.isAdmin&&tab==="dashboard"&&(
        <div style={{position:"fixed",bottom:70,right:16,zIndex:90}}>
          <button onClick={()=>{setShowFichaje(f=>!f);setShowQuick(false);}} style={{background:T.bg2,border:`1px solid ${T.border}`,borderRadius:12,padding:"8px 14px",fontFamily:T.sans,fontSize:12,fontWeight:700,color:T.text,cursor:"pointer",boxShadow:T.shadowM}}>🕐 Fichaje</button>
        </div>
      )}
      <NavBar tab={showQuick?"partes":showFichaje?"dashboard":tab} setTab={t=>{setShowQuick(false);setShowFichaje(false);setTab(t);}} isAdmin={session.isAdmin} onOpenCfg={()=>setShowCfg(true)}/>
      </div>{/* end main-content */}
      {showCfg&&(
        <div style={{position:"fixed",inset:0,background:"rgba(15,33,55,0.6)",zIndex:1000,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={e=>{if(e.target===e.currentTarget)setShowCfg(false);}}>
          <div style={{background:T.bg2,borderRadius:"20px 20px 0 0",width:"100%",maxWidth:900,maxHeight:"92vh",overflowY:"auto",boxShadow:T.shadowL,paddingBottom:"env(safe-area-inset-bottom,16px)"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"18px 20px 12px",borderBottom:`1px solid ${T.border}`,position:"sticky",top:0,background:T.bg2,zIndex:1}}>
              <span style={{fontFamily:T.display,fontWeight:900,fontSize:18,color:T.text}}>Configuración</span>
              <button onClick={()=>setShowCfg(false)} style={{background:T.bg3,border:"none",borderRadius:8,width:30,height:30,cursor:"pointer",fontSize:16,color:T.text2}}>✕</button>
            </div>
            <div style={{padding:"0 0 16px"}}>
              <ConfigScreen {...commonProps} setFestivos={setFestivos} setAdminOverrides={setAdminOverrides} setData={setData} setAccounts={setAccounts} toast={toastShow} onLogout={()=>{handleLogout();setShowCfg(false);}}/>
            </div>
          </div>
        </div>
      )}
      {modalObra&&<ObraModal obraName={modalObra} data={sortedData} festivos={festivos} adminOverrides={adminOverrides} session={session} onClose={()=>setModalObra(null)} obrasMeta={obrasMeta} setObrasMeta={setObrasMeta}/>}
      {modalWorker&&<WorkerModal workerName={modalWorker} data={sortedData} festivos={festivos} adminOverrides={adminOverrides} session={session} ausencias={ausencias} onClose={()=>setModalWorker(null)}/>}
      {modalParte&&!editParte&&<ParteModal parte={modalParte} data={sortedData} festivos={festivos} session={session} onClose={()=>setModalParte(null)} onDelete={handleDeleteParte} onEdit={p=>{setEditParte(p);setModalParte(null);setTab("nuevo");setPrefillNuevo(p);}}/>}
      {showResumenPDF&&(
        <div style={{position:"fixed",inset:0,background:"rgba(13,31,45,0.6)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:24}} onClick={e=>{if(e.target===e.currentTarget)setShowResumenPDF(false);}}>
          <div style={{background:T.bg2,borderRadius:20,width:"100%",maxWidth:400,boxShadow:T.shadowL,overflow:"hidden"}}>
            <div style={{background:T.bgDark,padding:"20px 24px"}}>
              <div style={{fontFamily:T.display,fontSize:20,fontWeight:900,color:"#fff"}}>PDF Resumen mensual</div>
              <div style={{fontFamily:T.sans,fontSize:12,color:"rgba(255,255,255,.6)",marginTop:4}}>Selecciona mes y trabajador</div>
            </div>
            <div style={{padding:"20px 24px",display:"flex",flexDirection:"column",gap:16}}>
              <div>
                <div style={{fontFamily:T.sans,fontWeight:700,fontSize:11,color:T.text2,textTransform:"uppercase",letterSpacing:".06em",marginBottom:6}}>Mes</div>
                <input type="month" value={pdfMes} onChange={e=>setPdfMes(e.target.value)} style={{width:"100%",padding:"10px 14px",borderRadius:12,border:`1px solid ${T.border}`,background:T.bg,fontFamily:T.sans,fontSize:14,color:T.text,outline:"none"}}/>
              </div>
              <div>
                <div style={{fontFamily:T.sans,fontWeight:700,fontSize:11,color:T.text2,textTransform:"uppercase",letterSpacing:".06em",marginBottom:6}}>Trabajador</div>
                <select value={pdfWorker} onChange={e=>setPdfWorker(e.target.value)} style={{width:"100%",padding:"10px 14px",borderRadius:12,border:`1px solid ${T.border}`,background:T.bg,fontFamily:T.sans,fontSize:14,color:T.text,outline:"none"}}>
                  <option value="todos">Todos los trabajadores</option>
                  {["JCM","Txema","Javi ESE2","Carlos Camacho","Jimmy Jazz S2","Manja","Paco Ortega","Gustavo"].map(w=><option key={w} value={w}>{w}</option>)}
                </select>
              </div>
              <div style={{display:"flex",gap:10,marginTop:4}}>
                <button onClick={()=>setShowResumenPDF(false)} style={{flex:1,padding:"11px",borderRadius:12,border:`1px solid ${T.border}`,background:"transparent",fontFamily:T.sans,fontSize:14,fontWeight:600,color:T.text2,cursor:"pointer"}}>Cancelar</button>
                <button onClick={()=>{generateResumenPDF(pdfMes,pdfWorker);setShowResumenPDF(false);}} style={{flex:2,padding:"11px",borderRadius:12,border:"none",background:T.bgDark,fontFamily:T.sans,fontSize:14,fontWeight:700,color:"#fff",cursor:"pointer"}}>Generar PDF</button>
              </div>
            </div>
          </div>
        </div>
      )}
      {toastEl}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
