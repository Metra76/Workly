// Cliente Supabase mínimo (sin SDK, fetch nativo)
const supa = {
  storage: {
    async list(obraKey) {
      if (!SUPABASE_URL || !SUPABASE_KEY) return { data: [], error: "Sin configurar" };
      const r = await fetch(`${SUPABASE_URL}/storage/v1/object/list/${SUPABASE_BUCKET}`, {
        method: "POST",
        headers: { "Content-Type": "application/json", "Authorization": `Bearer ${SUPABASE_KEY}`, "apikey": SUPABASE_KEY },
        body: JSON.stringify({ prefix: obraKey + "/", limit: 100, offset: 0 }),
      });
      const data = await r.json();
      return { data: Array.isArray(data) ? data : [], error: null };
    },
    async upload(obraKey, file) {
      if (!SUPABASE_URL || !SUPABASE_KEY) return { error: "Sin configurar" };
      const path = `${obraKey}/${Date.now()}_${file.name}`;
      const r = await fetch(`${SUPABASE_URL}/storage/v1/object/${SUPABASE_BUCKET}/${path}`, {
        method: "POST",
        headers: { "Authorization": `Bearer ${SUPABASE_KEY}`, "apikey": SUPABASE_KEY, "Content-Type": file.type || "application/octet-stream", "x-upsert": "false" },
        body: file,
      });
      const data = await r.json();
      return data.error ? { error: data.error } : { data: { path }, error: null };
    },
    async remove(path) {
      if (!SUPABASE_URL || !SUPABASE_KEY) return { error: "Sin configurar" };
      const r = await fetch(`${SUPABASE_URL}/storage/v1/object/${SUPABASE_BUCKET}`, {
        method: "DELETE",
        headers: { "Content-Type": "application/json", "Authorization": `Bearer ${SUPABASE_KEY}`, "apikey": SUPABASE_KEY },
        body: JSON.stringify({ prefixes: [path] }),
      });
      return { error: r.ok ? null : "Error al eliminar" };
    },
    publicUrl(path) {
      return `${SUPABASE_URL}/storage/v1/object/public/${SUPABASE_BUCKET}/${path}`;
    }
  }
};

const today = () => new Date().toISOString().split("T")[0];
const isSunday = f => new Date(f+"T12:00:00").getDay()===0;
const isSat    = f => new Date(f+"T12:00:00").getDay()===6;
const isFri    = f => new Date(f+"T12:00:00").getDay()===5;
function isFestivo(f,festivos){ if(isSunday(f))return true; return festivos.some(x=>x.fecha===f); }
function getHT(e,festivos){
  if(e.tipoOverride)return e.tipoOverride;
  if(isFestivo(e.fecha,festivos))return"f";
  if(isSat(e.fecha))return"s";
  return e.horas<=(isFri(e.fecha)?6:9)?"n":"e";
}

function useDesktop(){
  const [desk,setDesk]=React.useState(window.innerWidth>=700);
  React.useEffect(()=>{
    const fn=()=>setDesk(window.innerWidth>=700);
    window.addEventListener("resize",fn);

  },[]);
  return desk;
}

function mostrarPDF(pdfBlob, nombre){
  const pdfUrl=URL.createObjectURL(pdfBlob);
  // Overlay con iframe — Safari renderiza PDFs inline y el botón 📤 nativo funciona
  const overlay=document.createElement("div");
  overlay.style.cssText="position:fixed;top:0;left:0;width:100%;height:100%;z-index:99999;display:flex;flex-direction:column;background:#000;";
  const bar=document.createElement("div");
  bar.style.cssText="background:#1a1612;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;gap:10px;";
  const title=document.createElement("span");
  title.textContent=nombre||"Parte de trabajo";
  title.style.cssText="font-family:Arial;font-weight:700;font-size:13px;color:#fff;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;";
  const btnDown=document.createElement("a");
  btnDown.textContent="⬇ Descargar";
  btnDown.href=pdfUrl;
  btnDown.download=((nombre||"parte").replace(/[·\s]+/g,"_").replace(/_+/g,"_"))+".pdf";
  btnDown.style.cssText="background:#c9a84c;color:#1a1612;border:none;border-radius:8px;padding:8px 14px;font-size:14px;font-weight:700;cursor:pointer;font-family:Arial;flex-shrink:0;text-decoration:none;";
  const btnClose=document.createElement("button");
  btnClose.textContent="✕ Cerrar";
  btnClose.style.cssText="background:rgba(255,255,255,.15);color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:14px;font-weight:700;cursor:pointer;font-family:Arial;flex-shrink:0;";
  btnClose.onclick=()=>{document.body.removeChild(overlay);URL.revokeObjectURL(pdfUrl);};
  bar.appendChild(title);bar.appendChild(btnDown);bar.appendChild(btnClose);
  const ifr=document.createElement("iframe");
  ifr.src=pdfUrl;
  ifr.style.cssText="flex:1;border:none;width:100%;background:#fff;";
  overlay.appendChild(bar);overlay.appendChild(ifr);
  document.body.appendChild(overlay);
}

const NOMBRE_PDF={"JCM":"Juan","Javi ESE2":"Javi","Jimmy Jazz S2":"Jimmy"};
function nombrePDF(n){return NOMBRE_PDF[n]||n;}

function generarPDFSimple(obraName,subobra,dir,operarios,fechas,horasStr,trabajos,materiales){
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
  const W=210,PL=20,PR=20,CW=W-PL-PR;
  let y=0;

  // Header
  doc.setFillColor(26,22,18);doc.rect(0,0,W,22,"F");
  doc.setTextColor(255,255,255);doc.setFontSize(14);doc.setFont("helvetica","bold");
  doc.text("RIBASESEDOS — Parte de Trabajo",PL,10);
  doc.setFontSize(8);doc.setFont("helvetica","normal");
  doc.text(new Date().toLocaleDateString("es-ES"),W-PR,16,{align:"right"});
  y=32;

  // Línea separadora dorada
  doc.setDrawColor(201,168,76);doc.setLineWidth(0.5);doc.line(PL,y-4,W-PR,y-4);

  function addField(label, value){
    if(!value)return;
    if(y>270){doc.addPage();y=20;}
    doc.setTextColor(122,110,95);doc.setFontSize(8);doc.setFont("helvetica","bold");
    doc.text(label.toUpperCase()+":",PL,y);
    doc.setTextColor(26,22,18);doc.setFontSize(10);doc.setFont("helvetica","normal");
    const lines=doc.splitTextToSize(value,CW);
    lines.forEach((l,i)=>{
      if(i>0&&y>270){doc.addPage();y=20;}
      doc.text(l,PL+(i===0?28:0),y+(i===0?0:5));
      if(i>0)y+=5;
    });
    y+=8;
  }

  function addSection(title, text){
    if(!text)return;
    if(y>260){doc.addPage();y=20;}
    // Cabecera sección
    doc.setFillColor(238,233,223);doc.rect(PL,y-4,CW,8,"F");
    doc.setDrawColor(201,168,76);doc.setLineWidth(0.8);doc.line(PL,y-4,PL,y+4);
    doc.setTextColor(26,22,18);doc.setFontSize(10);doc.setFont("helvetica","bold");
    doc.text(title,PL+4,y+1);
    y+=10;
    doc.setFont("helvetica","normal");doc.setFontSize(9);doc.setTextColor(40,35,30);
    const lines=doc.splitTextToSize(text,CW);
    lines.forEach(l=>{
      if(y>270){doc.addPage();y=20;}
      doc.text(l,PL,y);y+=5.5;
    });
    y+=6;
  }

  addField("Cliente",obraName+(subobra?" — "+subobra:""));
  addField("Dirección",dir);
  addField("Operarios",operarios);

  // Fechas en vertical + horas desglosadas
  const fechasList=fechas.split(" y ");
  if(y>260){doc.addPage();y=20;}
  doc.setTextColor(122,110,95);doc.setFontSize(8);doc.setFont("helvetica","bold");
  doc.text("FECHAS Y HORAS:",PL,y);
  y+=6;
  doc.setTextColor(26,22,18);doc.setFontSize(9);doc.setFont("helvetica","normal");
  // Extraer desglose por día del horasStr
  const partes=horasStr.split(" — ");
  const totalPart=partes[0]||horasStr;
  const detalleParts=partes[1]?partes[1].split(" + "):[];
  fechasList.forEach((f,i)=>{
    if(y>270){doc.addPage();y=20;}
    const detalle=detalleParts[i]||"";
    doc.text("• "+f+(detalle?" · "+detalle:""),PL+4,y);
    y+=5.5;
  });
  doc.setFont("helvetica","bold");doc.setTextColor(168,134,58);
  doc.text("Total: "+totalPart,PL+4,y);
  y+=9;
  doc.setFont("helvetica","normal");doc.setTextColor(26,22,18);

  addSection("Trabajos realizados",trabajos);
  addSection("Materiales utilizados",materiales);

  // Footer
  if(y>270){doc.addPage();y=20;}
  doc.setDrawColor(238,233,223);doc.setLineWidth(0.5);doc.line(PL,y+4,W-PR,y+4);
  doc.setTextColor(181,168,152);doc.setFontSize(8);doc.setFont("helvetica","normal");
  doc.text("Ribasesedos · Grup Ese Dos",PL,y+10);
  doc.text("Generado: "+new Date().toLocaleString("es-ES"),W-PR,y+10,{align:"right"});

  mostrarPDF(doc.output("blob"),"Parte "+obraName);
}

function generarJsPDF(obraName,subobra,dir,trabajos,materiales,entries,fechaIni,fechaFin,total,festivos){
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
  const W=210,PL=15,PR=15,CW=W-PL-PR;
  let y=0;

  // Header negro
  doc.setFillColor(26,22,18);
  doc.rect(0,0,W,22,"F");
  doc.setTextColor(255,255,255);
  doc.setFontSize(14);doc.setFont("helvetica","bold");
  doc.text("RIBASESEDOS · "+obraName+(subobra?" · "+subobra:""),PL,10);
  doc.setFontSize(8);doc.setFont("helvetica","normal");
  doc.text("Parte de trabajo"+(dir?" · "+dir:""),PL,16);
  doc.text(new Date().toLocaleDateString("es-ES"),W-PR,16,{align:"right"});
  y=28;

  // Infobox
  doc.setFillColor(245,240,232);
  doc.roundedRect(PL,y,CW,18,2,2,"F");
  doc.setTextColor(122,110,95);doc.setFontSize(7);doc.setFont("helvetica","bold");
  const cols=subobra?4:3;
  const cw=CW/cols;
  const labels=["OBRA","PERÍODO","TOTAL HORAS"];
  const vals=[obraName,fechaIni+" → "+fechaFin,total+"h"];
  if(subobra){labels.splice(1,0,"PARTIDA");vals.splice(1,0,subobra);}
  labels.forEach((l,i)=>{
    doc.text(l,PL+cw*i+3,y+5);
    doc.setTextColor(26,22,18);doc.setFontSize(i===(subobra?2:2)?10:9);doc.setFont("helvetica","bold");
    if(i===labels.indexOf("TOTAL HORAS")){doc.setTextColor(168,134,58);}
    doc.text(vals[i],PL+cw*i+3,y+12);
    doc.setTextColor(122,110,95);doc.setFontSize(7);doc.setFont("helvetica","bold");
  });
  if(dir){
    y+=20;
    doc.setFillColor(245,240,232);
    doc.roundedRect(PL,y,CW,10,2,2,"F");
    doc.setTextColor(122,110,95);doc.setFontSize(7);doc.setFont("helvetica","bold");
    doc.text("DIRECCIÓN",PL+3,y+4);
    doc.setTextColor(26,22,18);doc.setFontSize(9);doc.setFont("helvetica","normal");
    doc.text(dir,PL+3,y+9);
  }
  y+=22;

  // Trabajos y materiales
  function textBlock(title,text){
    if(!text)return;
    doc.setFillColor(238,233,223);
    doc.rect(PL,y,4,7,"F");
    doc.setTextColor(26,22,18);doc.setFontSize(10);doc.setFont("helvetica","bold");
    doc.text(title,PL+7,y+5);
    y+=9;
    const lines=doc.splitTextToSize(text,CW);
    doc.setFontSize(9);doc.setFont("helvetica","normal");
    doc.setTextColor(60,50,40);
    lines.forEach(l=>{
      if(y>270){doc.addPage();y=15;}
      doc.text(l,PL,y);y+=5;
    });
    y+=4;
  }
  textBlock("Trabajos realizados",trabajos);
  textBlock("Materiales utilizados",materiales);

  // Tabla por trabajador
  const grouped={};
  entries.forEach(e=>{if(!grouped[e.trabajador])grouped[e.trabajador]=[];grouped[e.trabajador].push(e);});
  Object.entries(grouped).forEach(([w,es])=>{
    if(y>250){doc.addPage();y=15;}
    const wTotal=es.reduce((s,e)=>s+e.horas,0);
    // Cabecera trabajador
    doc.setFillColor(238,233,223);
    doc.rect(PL,y,CW,8,"F");
    doc.setDrawColor(201,168,76);doc.setLineWidth(0.8);
    doc.line(PL,y,PL,y+8);
    doc.setTextColor(26,22,18);doc.setFontSize(10);doc.setFont("helvetica","bold");
    doc.text(nombrePDF(w),PL+5,y+5.5);
    doc.setTextColor(122,110,95);doc.setFontSize(8);doc.setFont("helvetica","normal");
    doc.text(wTotal+"h · "+es.length+" parte"+(es.length!==1?"s":""),W-PR,y+5.5,{align:"right"});
    y+=8;
    const rows=[...es].sort((a,b)=>a.fecha.localeCompare(b.fecha)).map(e=>[
      e.fecha,
      e.horas+"h",
      getHT(e,festivos)==="n"?"Normal":getHT(e,festivos)==="e"?"Extra":getHT(e,festivos)==="f"?"Festivo":"Sábado",
      e.notas||"—"
    ]);
    doc.autoTable({
      startY:y,head:[["Fecha","Horas","Tipo","Notas"]],body:rows,
      margin:{left:PL,right:PR},
      styles:{fontSize:9,cellPadding:2.5,textColor:[26,22,18]},
      headStyles:{fillColor:[245,240,232],textColor:[122,110,95],fontStyle:"bold",fontSize:8},
      alternateRowStyles:{fillColor:[250,248,243]},
      tableLineColor:[238,233,223],tableLineWidth:0.1,
    });
    y=doc.lastAutoTable.finalY+6;
  });

  // Total
  if(y>260){doc.addPage();y=15;}
  doc.setFillColor(245,240,232);
  doc.rect(PL,y,CW,8,"F");
  doc.setDrawColor(201,168,76);doc.setLineWidth(1);
  doc.line(PL,y,W-PR,y);
  doc.setTextColor(26,22,18);doc.setFontSize(10);doc.setFont("helvetica","bold");
  doc.text("TOTAL HORAS",PL+3,y+5.5);
  doc.setTextColor(168,134,58);doc.setFontSize(12);
  doc.text(total+"h",W-PR,y+5.5,{align:"right"});
  y+=14;

  // Footer
  doc.setTextColor(181,168,152);doc.setFontSize(8);doc.setFont("helvetica","normal");
  doc.text("Ribasesedos · Grup Ese Dos",PL,y);
  doc.text("Generado: "+new Date().toLocaleString("es-ES"),W-PR,y,{align:"right"});

  // Abrir PDF en nueva pestaña / Safari lo muestra inline
  const pdfBlob=doc.output("blob");
  mostrarPDF(pdfBlob, "Parte "+obraName+(subobra?" · "+subobra:""));
}

function loadState(){
  try{
    let data=JSON.parse(localStorage.getItem("wk_data")||"null");
    if(!data)data=[...INITIAL_DATA];
    let festivos=JSON.parse(localStorage.getItem("wk_fest")||"[]");
    FESTIVOS_2026.forEach(f=>{if(!festivos.some(x=>x.fecha===f.fecha))festivos.push(f);});
    festivos.sort((a,b)=>a.fecha.localeCompare(b.fecha));
    let adminOverrides=JSON.parse(localStorage.getItem("wk_adm")||"{}");
    let session=JSON.parse(localStorage.getItem("wk_session")||"null");
    if(session&&session.name===ADMIN_NAME&&!session.isAdmin)session={...session,isAdmin:true};
    return{
      data,festivos,adminOverrides,
      fichajes:JSON.parse(localStorage.getItem("wk_fichajes")||"[]"),
      accounts:JSON.parse(localStorage.getItem("wk_accounts")||"[]"),
      ausencias:JSON.parse(localStorage.getItem("wk_ausencias")||"[]"),
      session,
    };
  }catch(e){return{data:[...INITIAL_DATA],festivos:[],adminOverrides:{},fichajes:[],accounts:[],ausencias:[],session:null};}
}

// ─── PARTE FORMAL ─────────────────────────────────────────────────────────────
function ParteFormaScreen({data,festivos,obrasMeta,setObrasMeta,onClose,toast}){
  const allObras=[...new Set(data.map(e=>e.obra))].sort();
  const allWorkers=["JCM","Txema","Javi ESE2","Carlos Camacho","Jimmy Jazz S2","Manja","Paco Ortega","Gustavo"];
  const [modo,setModo]=useState("workly"); // "workly" | "libre"

  // Campos comunes
  const [obraInput,setObraInput]=useState("");
  const [obra,setObra]=useState("");
  const [showObraSugs,setShowObraSugs]=useState(false);
  const [subobra,setSubobra]=useState("");
  const [fechaIni,setFechaIni]=useState("");
  const [fechaFin,setFechaFin]=useState(today());
  const [dir,setDir]=useState("");
  const [trabajos,setTrabajos]=useState("");
  const [materiales,setMateriales]=useState("");

  // Campos modo libre
  const [libWorkers,setLibWorkers]=useState([{trabajador:"JCM",fecha:today(),horas:8,notas:""}]);

  const obraFinal=obra||obraInput.trim();
  const obraSugs=obraInput.length>0?allObras.filter(o=>o.toLowerCase().includes(obraInput.toLowerCase())).slice(0,6):[];
  const allSubobras=[...new Set(data.filter(e=>e.obra===obraFinal).map(e=>e.subobra).filter(Boolean))];

  function selectObra(o){
    setObra(o);setObraInput(o);setShowObraSugs(false);
    const mk=obraKey(o);
    const meta=(obrasMeta&&obrasMeta[mk])||{};
    if(meta.direccion)setDir(meta.direccion);
    const oEntries=data.filter(e=>e.obra===o).sort((a,b)=>a.fecha.localeCompare(b.fecha));
    if(oEntries.length>0)setFechaIni(oEntries[0].fecha);
  }

  // Entradas modo Workly
  const entries=data.filter(e=>{
    if(e.obra!==obraFinal)return false;
    if(subobra&&e.subobra!==subobra)return false;
    if(fechaIni&&e.fecha<fechaIni)return false;
    if(fechaFin&&e.fecha>fechaFin)return false;
    return true;
  });
  const total=entries.reduce((s,e)=>s+e.horas,0);

  // Entradas modo libre
  const libreEntries=libWorkers.map(w=>({...w,obra:obraFinal,subobra,tipoOverride:undefined}));
  const libreTotal=libWorkers.reduce((s,w)=>s+Number(w.horas||0),0);

  function handleGenerar(){
    if(!obraFinal){toast("Indica el nombre de la obra","error");return;}
    if(dir&&setObrasMeta){
      const mk=obraKey(obraFinal);
      const meta=(obrasMeta&&obrasMeta[mk])||{};
      if(dir!==meta.direccion){
        const upd={...obrasMeta,[mk]:{...meta,direccion:dir}};
        setObrasMeta(upd);localStorage.setItem("wk_obras_meta",JSON.stringify(upd));
      }
    }
    if(modo==="workly"){
      if(entries.length===0){toast("No hay partes en ese período","error");return;}
      const operarios=[...new Set(entries.map(e=>e.trabajador))].map(nombrePDF).join(" / ");
      const fechasUnicas=[...new Set(entries.map(e=>e.fecha))].sort();
      const fechasStr=fechasUnicas.map(f=>new Date(f+"T12:00:00").toLocaleDateString("es-ES",{day:"2-digit",month:"2-digit",year:"numeric"})).join(" y ");
      const horasPorDia=fechasUnicas.map(f=>{
        const h=entries.filter(e=>e.fecha===f).reduce((s,e)=>s+e.horas,0);
        const fLabel=new Date(f+"T12:00:00").toLocaleDateString("es-ES",{day:"2-digit",month:"2-digit"});
        return h+"h ("+fLabel+")";
      });
      const horasStr=total+"h totales"+(horasPorDia.length>1?" — "+horasPorDia.join(" + "):"");
      generarPDFSimple(obraFinal,subobra,dir,operarios,fechasStr,horasStr,trabajos,materiales);
    } else {
      if(libWorkers.length===0){toast("Añade al menos un trabajador","error");return;}
      const operarios=[...new Set(libWorkers.map(w=>w.trabajador))].map(nombrePDF).join(" / ");
      const fechasUnicas=[...new Set(libWorkers.map(w=>w.fecha))].sort();
      const fechasStr=fechasUnicas.map(f=>new Date(f+"T12:00:00").toLocaleDateString("es-ES",{day:"2-digit",month:"2-digit",year:"numeric"})).join(" y ");
      const horasPorDia=fechasUnicas.map(f=>{
        const h=libWorkers.filter(w=>w.fecha===f).reduce((s,w)=>s+Number(w.horas||0),0);
        const fLabel=new Date(f+"T12:00:00").toLocaleDateString("es-ES",{day:"2-digit",month:"2-digit"});
        return h+"h ("+fLabel+")";
      });
      const horasStr=libreTotal+"h totales"+(horasPorDia.length>1?" — "+horasPorDia.join(" + "):"");
      generarPDFSimple(obraFinal,subobra,dir,operarios,fechasStr,horasStr,trabajos,materiales);
    }
    toast("PDF generado");
  }

  const inp={width:"100%",padding:"13px 14px",borderRadius:14,border:`1px solid ${T.border}`,background:T.bg2,fontFamily:T.sans,fontSize:14,color:T.text,outline:"none"};
  const lbl={fontFamily:T.sans,fontWeight:700,fontSize:11,color:T.text2,textTransform:"uppercase",letterSpacing:".06em",marginBottom:6,display:"block"};

  return(
    <div style={{paddingBottom:100}}>
      <Header title="Parte PDF" sub="Genera PDF para cliente" onBack={onClose}/>
      <div style={{padding:"16px 16px 0",display:"flex",flexDirection:"column",gap:16}}>

        {/* Selector de modo */}
        <div style={{display:"flex",gap:8}}>
          {[["workly","📊 Desde Workly"],["libre","✏️ Parte nuevo"]].map(([m,l])=>(
            <button key={m} onClick={()=>setModo(m)} style={{flex:1,padding:"10px 8px",borderRadius:12,border:`1px solid ${modo===m?T.goldBorder:T.border}`,background:modo===m?T.goldDim:T.bg3,fontFamily:T.sans,fontSize:13,fontWeight:modo===m?700:500,color:modo===m?T.goldDark:T.text2,cursor:"pointer"}}>{l}</button>
          ))}
        </div>

        {/* Obra */}
        <div style={{position:"relative"}}>
          <label style={lbl}>Obra</label>
          <input value={obra||obraInput} onChange={e=>{setObraInput(e.target.value);setObra("");setShowObraSugs(true);}} onFocus={()=>setShowObraSugs(true)} placeholder={modo==="workly"?"Buscar obra existente...":"Nombre de la obra..."} style={{...inp}}/>
          {showObraSugs&&obraSugs.length>0&&(
            <div style={{position:"absolute",top:"100%",left:0,right:0,background:T.bg2,border:`1px solid ${T.border}`,borderRadius:12,zIndex:50,boxShadow:T.shadowM,overflow:"hidden",marginTop:4}}>
              {obraSugs.map(o=>(
                <div key={o} onClick={()=>selectObra(o)} style={{padding:"11px 14px",fontFamily:T.sans,fontSize:14,color:T.text,cursor:"pointer",borderBottom:`1px solid ${T.border}`}}>{o}</div>
              ))}
            </div>
          )}
        </div>

        {/* Subobra */}
        <div>
          <label style={lbl}>Subobra / Partida <span style={{fontWeight:400,textTransform:"none"}}>(opcional)</span></label>
          <input value={subobra} onChange={e=>setSubobra(e.target.value)} list="sf-subobra-list" placeholder="Opcional..." style={{...inp}}/>
          <datalist id="sf-subobra-list">{allSubobras.map(s=><option key={s} value={s}/>)}</datalist>
        </div>

        {/* Período */}
        <div style={{display:"flex",gap:10}}>
          <div style={{flex:1}}>
            <label style={lbl}>Desde</label>
            <input type="date" value={fechaIni} onChange={e=>setFechaIni(e.target.value)} style={{...inp}}/>
          </div>
          <div style={{flex:1}}>
            <label style={lbl}>Hasta</label>
            <input type="date" value={fechaFin} onChange={e=>setFechaFin(e.target.value)} style={{...inp}}/>
          </div>
        </div>

        {/* Resumen modo Workly */}
        {modo==="workly"&&obraFinal&&(
          <div style={{background:entries.length>0?T.goldDim:T.bg3,border:`1px solid ${entries.length>0?T.goldBorder:T.border}`,borderRadius:12,padding:"12px 14px",fontFamily:T.sans,fontSize:13,color:entries.length>0?T.goldDark:T.text3,fontWeight:600}}>
            {entries.length>0?`${entries.length} partes · ${total}h · ${[...new Set(entries.map(e=>e.trabajador))].length} trabajadores`:"Sin partes en este período"}
          </div>
        )}

        {/* Filas de trabajadores modo libre */}
        {modo==="libre"&&(
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <label style={{...lbl,marginBottom:0}}>Trabajadores</label>
              <button onClick={()=>setLibWorkers(w=>[...w,{trabajador:"JCM",fecha:today(),horas:8,notas:""}])} style={{background:T.goldDim,border:`1px solid ${T.goldBorder}`,borderRadius:8,padding:"4px 12px",fontFamily:T.sans,fontSize:12,fontWeight:700,color:T.goldDark,cursor:"pointer"}}>+ Añadir</button>
            </div>
            {libWorkers.map((w,i)=>(
              <div key={i} style={{background:T.bg3,borderRadius:12,padding:"10px 12px",border:`1px solid ${T.border}`,display:"flex",flexDirection:"column",gap:8}}>
                <div style={{display:"flex",gap:8}}>
                  <select value={w.trabajador} onChange={e=>{const u=[...libWorkers];u[i]={...u[i],trabajador:e.target.value};setLibWorkers(u);}} style={{...inp,flex:2,padding:"8px 10px",fontSize:13}}>
                    {allWorkers.map(aw=><option key={aw} value={aw}>{aw}</option>)}
                  </select>
                  <input type="date" value={w.fecha} onChange={e=>{const u=[...libWorkers];u[i]={...u[i],fecha:e.target.value};setLibWorkers(u);}} style={{...inp,flex:2,padding:"8px 10px",fontSize:13}}/>
                  <input type="number" value={w.horas} onChange={e=>{const u=[...libWorkers];u[i]={...u[i],horas:+e.target.value};setLibWorkers(u);}} style={{...inp,flex:1,padding:"8px 6px",fontSize:13,textAlign:"center"}} min="0.5" max="24" step="0.5"/>
                  <button onClick={()=>setLibWorkers(w=>w.filter((_,j)=>j!==i))} style={{background:"none",border:"none",color:T.red,fontSize:18,cursor:"pointer",flexShrink:0,padding:"0 4px"}}>×</button>
                </div>
                <input value={w.notas} onChange={e=>{const u=[...libWorkers];u[i]={...u[i],notas:e.target.value};setLibWorkers(u);}} placeholder="Notas (opcional)..." style={{...inp,padding:"8px 10px",fontSize:13}}/>
              </div>
            ))}
            {libWorkers.length>0&&<div style={{fontFamily:T.sans,fontSize:13,color:T.goldDark,fontWeight:700,textAlign:"right"}}>Total: {libreTotal}h</div>}
          </div>
        )}

        {/* Dirección */}
        <div>
          <label style={lbl}>Dirección <span style={{fontWeight:400,textTransform:"none"}}>(opcional)</span></label>
          <input value={dir} onChange={e=>setDir(e.target.value)} placeholder="Av. de la Llum 12, Barcelona..." style={{...inp}}/>
        </div>

        {/* Trabajos */}
        <div>
          <label style={lbl}>Trabajos realizados <span style={{fontWeight:400,textTransform:"none"}}>(opcional)</span></label>
          <textarea value={trabajos} onChange={e=>setTrabajos(e.target.value)} rows={3} placeholder="Descripción de los trabajos..." style={{...inp,resize:"vertical"}}/>
        </div>

        {/* Materiales */}
        <div>
          <label style={lbl}>Materiales utilizados <span style={{fontWeight:400,textTransform:"none"}}>(opcional)</span></label>
          <textarea value={materiales} onChange={e=>setMateriales(e.target.value)} rows={3} placeholder="Lista de materiales..." style={{...inp,resize:"vertical"}}/>
        </div>

        <Btn onClick={handleGenerar} style={{width:"100%",padding:"16px",fontSize:16,marginTop:4}}>
          🖨 Generar PDF parte
        </Btn>
      </div>
    </div>
  );
}

  // LAYOUT MÓVIL: original
  return(
    <div style={{paddingBottom:80}}>
      {header}
      <div style={{padding:"18px 16px 0"}}>
        {pendientes.length>0&&(

            <span style={{fontSize:20}}>⚠️</span>
            <div>
              <div style={{fontFamily:T.sans,fontWeight:700,fontSize:13,color:T.orange}}>{pendientes.length} ausencia{pendientes.length>1?"s":""} pendiente{pendientes.length>1?"s":""}</div>

            </div>
          </div>
        )}
        <Section title="Equipo activo este mes" action={<button onClick={()=>setTab("equipo")} style={{background:"none",border:"none",fontFamily:T.sans,fontSize:11,color:T.goldDark,cursor:"pointer",fontWeight:700}}>Ver todo →</button>}>

        </Section>
        <Section title="Obras activas" action={<button onClick={()=>setTab("obras")} style={{background:"none",border:"none",fontFamily:T.sans,fontSize:11,color:T.goldDark,cursor:"pointer",fontWeight:700}}>Ver todo →</button>}>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {obrasActivasSorted.slice(0,5).map(o=>{
              const hO=mesActual.filter(e=>e.obra===o).reduce((s,e)=>s+e.horas,0);

function MiPerfil({session,data,festivos,ausencias,onLogout}){
  const allWorkers=["JCM","Txema","Javi ESE2","Carlos Camacho","Jimmy Jazz S2","Manja","Paco Ortega","Gustavo"];
  const myData=data.filter(e=>e.trabajador===session.name);
  const now=new Date();const yr=now.getFullYear(),mo=now.getMonth();
  const mesMio=myData.filter(e=>{const d=new Date(e.fecha+"T12:00:00");return d.getFullYear()===yr&&d.getMonth()===mo;});
  const totalMes=mesMio.reduce((s,e)=>s+e.horas,0);
  const semana=[];for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);semana.push(d.toISOString().split("T")[0]);}
  const hSem=myData.filter(e=>semana.includes(e.fecha)).reduce((s,e)=>s+e.horas,0);
  const totalGlobal=myData.reduce((s,e)=>s+e.horas,0);
  const misObras=[...new Set(mesMio.map(e=>e.obra))];
  const misAusencias=(ausencias||[]).filter(a=>a.trabajador===session.name).slice(-5).reverse();
  const mnArr=["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
  return(
    <div style={{paddingBottom:80}}>
      <div style={{background:T.bgDark,padding:"28px 20px 24px",display:"flex",flexDirection:"column",alignItems:"center"}}>
        <Avatar name={session.name} size={64} color={WC[workerIdx(session.name)%WC.length]}/>
        <div style={{fontFamily:T.display,fontSize:22,fontWeight:900,color:"#fff",marginTop:10}}>{session.name}</div>
        <div style={{fontFamily:T.sans,fontSize:12,color:"rgba(255,255,255,.45)",marginTop:2}}>Trabajador · Grup Ese Dos</div>
      </div>
      <div style={{padding:"16px 16px 0"}}>
        <div style={{display:"flex",gap:8,marginBottom:16}}>
          <StatBox label={`Horas ${mnArr[mo]}`} value={`${totalMes}h`} color={T.goldDark}/>
          <StatBox label="Esta semana" value={`${hSem}h`}/>
          <StatBox label="Total" value={`${totalGlobal}h`}/>
        </div>
        <Section title={`Obras este mes (${misObras.length})`}>
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {misObras.map(o=>{
              const hO=mesMio.filter(e=>e.obra===o).reduce((s,e)=>s+e.horas,0);
              return(
                <div key={o} style={{background:T.bg2,borderRadius:10,padding:"9px 14px",border:`1px solid ${T.border}`,display:"flex",alignItems:"center",gap:10}}>
                  <div style={{width:8,height:8,borderRadius:"50%",background:obraColor(o,[])}}/>
                  <span style={{fontFamily:T.sans,fontSize:13,fontWeight:600,color:T.text,flex:1}}>{o}</span>
                  <span style={{fontFamily:T.mono,fontSize:13,fontWeight:700,color:T.text}}>{hO}h</span>
                </div>
              );
            })}
          </div>
        </Section>
        <Section title="Últimas entradas">
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {[...myData].sort((a,b)=>b.fecha.localeCompare(a.fecha)||b.id-a.id).slice(0,6).map(e=>(
              <div key={e.id} style={{background:T.bg2,borderRadius:10,padding:"9px 12px",border:`1px solid ${T.border}`,display:"flex",alignItems:"center",gap:10}}>
                <div style={{flex:1}}>
                  <div style={{fontFamily:T.sans,fontSize:12,fontWeight:700,color:T.text}}>{e.obra}{e.subobra?` / ${e.subobra}`:""}</div>
                  <div style={{fontFamily:T.sans,fontSize:11,color:T.text2}}>{fmtShort(e.fecha)}</div>
                </div>
                <div style={{fontFamily:T.mono,fontSize:13,fontWeight:700,color:T.text}}>{e.horas}h</div>
                <HTBadge type={getHT(e,festivos)}/>
              </div>
            ))}
          </div>
        </Section>
        {misAusencias.length>0&&(
          <Section title="Mis ausencias">
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              {misAusencias.map((a,i)=>(
                <div key={i} style={{background:T.bg2,borderRadius:10,padding:"9px 12px",border:`1px solid ${T.border}`,display:"flex",alignItems:"center",gap:10}}>
                  <div style={{flex:1}}>
                    <div style={{fontFamily:T.sans,fontSize:12,fontWeight:700,color:T.text}}>{a.tipo==="vacaciones"?"Vacaciones":a.tipo==="fiesta"?"Día festivo":"Permiso"}</div>
                    <div style={{fontFamily:T.sans,fontSize:11,color:T.text2}}>{a.fechaInicio}{a.fechaFin&&a.fechaFin!==a.fechaInicio?` → ${a.fechaFin}`:""}</div>
                  </div>
                  <span style={{fontFamily:T.sans,fontSize:11,fontWeight:700,color:a.estado==="aprobada"?T.green:a.estado==="rechazada"?T.red:T.orange,background:a.estado==="aprobada"?T.greenDim:a.estado==="rechazada"?T.redDim:T.orangeDim,padding:"3px 8px",borderRadius:10}}>{a.estado}</span>
                </div>
              ))}
            </div>
          </Section>
        )}
        <Btn variant="danger" style={{width:"100%",marginTop:8}} onClick={onLogout}>Cerrar sesión</Btn>
      </div>
    </div>
  );
}

// ─── PARTES LIST ─────────────────────────────────────────────────────────────
function PartesList({data,festivos,session,onSelectParte,onSelectWorker,onSelectObra}){
  const desk=useDesktop();
  const allWorkers=["JCM","Txema","Javi ESE2","Carlos Camacho","Jimmy Jazz S2","Manja","Paco Ortega","Gustavo"];
  const allObras=[...new Set(data.map(e=>e.obra))].sort();
  const [fW,setFW]=useState("todos");
  const [fO,setFO]=useState("todas");
  const [search,setSearch]=useState("");
  const [soloNuevos,setSoloNuevos]=useState(false);

  const myPartes=session.isAdmin?data:data.filter(e=>e.trabajador===session.name);
  const maxId=Math.max(...INITIAL_DATA.map(e=>e.id));

  let filtered=myPartes;
  if(soloNuevos)filtered=filtered.filter(e=>e.id>maxId);
  if(fW!=="todos")filtered=filtered.filter(e=>e.trabajador===fW);
  if(fO!=="todas")filtered=filtered.filter(e=>e.obra===fO);
  if(search.trim())filtered=filtered.filter(e=>(e.obra+e.trabajador+(e.subobra||"")+(e.notas||"")).toLowerCase().includes(search.toLowerCase()));
  filtered=[...filtered].sort((a,b)=>b.fecha.localeCompare(a.fecha)||b.id-a.id);

  const totalH=filtered.reduce((s,e)=>s+e.horas,0);
  const workers=session.isAdmin?allWorkers:[session.name];
  const obras=[...new Set(myPartes.map(e=>e.obra))].sort();

  const lista=(
    <div style={{display:"flex",flexDirection:"column",gap:6}}>
      {filtered.map(e=>(
        <div key={e.id} onClick={()=>onSelectParte(e)} style={{background:T.bg2,borderRadius:12,padding:"10px 14px",border:`1px solid ${T.border}`,display:"flex",alignItems:"center",gap:10,cursor:"pointer",boxShadow:T.shadow}}>
          <Avatar name={e.trabajador} size={34} color={WC[workerIdx(e.trabajador)%WC.length]}/>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontFamily:T.sans,fontSize:13,fontWeight:700,color:T.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{session.isAdmin?e.trabajador+" · ":""}<span style={{color:obraColor(e.obra,allObras)}}>{e.obra}</span>{e.subobra?` / ${e.subobra}`:""}</div>
            <div style={{fontFamily:T.sans,fontSize:11,color:T.text2,display:"flex",gap:6,alignItems:"center"}}>
              <span>{fmtShort(e.fecha)}</span>
              <HTBadge type={getHT(e,festivos)}/>
              {e.notas&&<span style={{color:T.text3}}>📝</span>}
            </div>
          </div>
          <div style={{fontFamily:T.mono,fontSize:15,fontWeight:800,color:T.text,flexShrink:0}}>{e.horas}h</div>
        </div>
      ))}
      {filtered.length===0&&<div style={{textAlign:"center",padding:"40px 20px",fontFamily:T.sans,color:T.text3}}>Sin resultados</div>}
    </div>
  );

  if(desk){
    return(
      <div>
        <Header title="Partes" sub={`${filtered.length} entradas · ${totalH}h`}/>
        <div style={{display:"grid",gridTemplateColumns:"260px 1fr",gap:20,padding:"16px 24px 32px",alignItems:"start"}}>
          {/* Panel filtros */}
          <div style={{background:T.bg2,borderRadius:16,padding:"18px 16px",border:`1px solid ${T.border}`,boxShadow:T.shadow,position:"sticky",top:16,transform:"translateZ(0)",isolation:"isolate"}}>
            <div style={{fontFamily:T.sans,fontWeight:700,fontSize:12,color:T.text2,textTransform:"uppercase",letterSpacing:".06em",marginBottom:10}}>Buscar</div>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Obra, trabajador..." style={{width:"100%",padding:"9px 12px",borderRadius:10,border:`1px solid ${T.border}`,background:T.bg,fontFamily:T.sans,fontSize:13,color:T.text,outline:"none",marginBottom:14}}/>
            {session.isAdmin&&(
              <>
                <div style={{fontFamily:T.sans,fontWeight:700,fontSize:12,color:T.text2,textTransform:"uppercase",letterSpacing:".06em",marginBottom:8}}>Trabajador</div>
                <div style={{display:"flex",flexDirection:"column",gap:4,marginBottom:14}}>
                  {["todos",...workers].map(w=>(
                    <button key={w} onClick={()=>setFW(w)} style={{width:"100%",textAlign:"left",padding:"7px 10px",borderRadius:8,border:"none",background:fW===w?T.goldDim:"transparent",fontFamily:T.sans,fontSize:13,fontWeight:fW===w?700:400,color:fW===w?T.goldDark:T.text,cursor:"pointer"}}>
                      {w==="todos"?"Todos":w}
                    </button>
                  ))}
                </div>
              </>
            )}

function NuevoParte({data,session,festivos,onSave,prefill,toast,obrasMeta}){

        {session.isAdmin&&(
          <div>
            <label style={lbl}>Trabajador</label>
            <select value={trabajador} onChange={e=>setTrabajador(e.target.value)} style={{...inp}}>

          </div>
        )}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <div>

        <div style={{position:"relative"}}>

          {showObraSug&&obraSugs.length>0&&(

      </div>
    </div>

// ─── QUICK INPUT (WhatsApp parser) ────────────────────────────────────────────
function QuickInput({data,session,festivos,onSaveMulti,toast}){
  const [text,setText]=useState("");
  const [parsed,setParsed]=useState([]);
  const [err,setErr]=useState("");
  const allWorkers=["JCM","Txema","Javi ESE2","Carlos Camacho","Jimmy Jazz S2","Manja","Paco Ortega","Gustavo"];

  function parse(){
    setErr("");
    const lines=text.split("\n").map(l=>l.trim()).filter(l=>l);
    const results=[];
    const dateRe=/\b(\d{1,2})[\/\-](\d{1,2})(?:[\/\-](\d{2,4}))?\b/;
    const horasRe=/(\d+(?:[.,]\d+)?)\s*h/i;
    for(const line of lines){
      let fecha=today();
      const dm=line.match(dateRe);
      if(dm){const d=+dm[1],m=+dm[2],y=dm[3]?+dm[3]:new Date().getFullYear();fecha=`${y<100?2000+y:y}-${String(m).padStart(2,"0")}-${String(d).padStart(2,"0")}`;}
      const hm=line.match(horasRe);
      const horas=hm?+hm[1].replace(",","."):9;
      let trabajador=session.isAdmin?"":session.name;
      if(session.isAdmin){for(const w of allWorkers){if(line.toLowerCase().includes(w.toLowerCase())){trabajador=w;break;}}}
      const obraMatch=line.match(/obra[:\s]+([^,\n]+)/i)||line.match(/-\s*([A-ZÀ-Ú][^,\n0-9]+)/);
      const obra=obraMatch?obraMatch[1].trim():"";
      if(!trabajador||!obra)continue;
      results.push({trabajador,fecha,horas,obra,subobra:"",notas:"",_line:line});
    }
    if(results.length===0){setErr("No se detectaron entradas válidas");return;}
    setParsed(results);
  }

  const [soloNuevos,setSoloNuevos]=useState(false);

  function isDup(e){return data.some(x=>x.trabajador===e.trabajador&&x.fecha===e.fecha&&x.obra===e.obra&&((!x.subobra&&!e.subobra)||(x.subobra===e.subobra)));}

  function handleSave(){
    const toSave=soloNuevos?parsed.filter(e=>!isDup(e)):parsed;
    const dups=parsed.filter(e=>isDup(e));
    if(!soloNuevos&&dups.length>0&&!confirm(`Hay ${dups.length} entrada${dups.length>1?"s":""} duplicada${dups.length>1?"s":""}. ¿Guardar igualmente?`))return;
    onSaveMulti(toSave);
    setText("");setParsed([]);
  }

  return(
    <div style={{paddingBottom:100}}>
      <Header title="Entrada rápida" sub="Pega texto de WhatsApp"/>
      <div style={{padding:"16px 16px 0"}}>
        <textarea value={text} onChange={e=>setText(e.target.value)} rows={8} placeholder={"Pega aquí el texto del grupo de WhatsApp...\n\nEjemplo:\n03/03 Txema obra: Carles Riba 3h\n03/03 Javi obra: Av. Diagonal 9h"} style={{width:"100%",padding:"12px 14px",borderRadius:14,border:`1px solid ${T.border}`,background:T.bg2,fontFamily:T.mono,fontSize:12,color:T.text,outline:"none",resize:"vertical"}}/>
        {err&&<div style={{color:T.red,fontFamily:T.sans,fontSize:13,marginTop:6,fontWeight:600}}>{err}</div>}
        <Btn onClick={parse} style={{width:"100%",marginTop:10}} variant="secondary">Analizar texto</Btn>
        {parsed.length>0&&(()=>{
          const numDups=parsed.filter(e=>isDup(e)).length;
          const numNuevos=parsed.length-numDups;
          return(
          <>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",margin:"14px 0 8px"}}>
              <span style={{fontFamily:T.sans,fontWeight:700,fontSize:13,color:T.text2,textTransform:"uppercase",letterSpacing:".06em"}}>{parsed.length} entradas detectadas</span>
              {numDups>0&&<button onClick={()=>setSoloNuevos(s=>!s)} style={{background:soloNuevos?T.goldDim:"transparent",border:`1px solid ${soloNuevos?T.goldBorder:T.border}`,borderRadius:8,padding:"4px 10px",fontFamily:T.sans,fontSize:11,fontWeight:700,color:soloNuevos?T.goldDark:T.text2,cursor:"pointer"}}>Solo nuevos ({numNuevos})</button>}
            </div>
            {numDups>0&&<div style={{background:T.orangeDim,border:`1px solid rgba(201,122,46,.3)`,borderRadius:10,padding:"8px 12px",fontFamily:T.sans,fontSize:12,color:T.orange,fontWeight:600,marginBottom:8}}>⚠️ {numDups} duplicado{numDups>1?"s":""} detectado{numDups>1?"s":""}</div>}
            <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:12}}>
              {parsed.map((e,i)=>{
                const dup=isDup(e);
                if(soloNuevos&&dup)return null;
                return(
                <div key={i} style={{background:dup?T.orangeDim:T.bg2,borderRadius:10,padding:"9px 12px",border:`1px solid ${dup?"rgba(201,122,46,.3)":T.border}`,opacity:dup&&soloNuevos?0.4:1}}>
                  <div style={{fontFamily:T.sans,fontSize:12,fontWeight:700,color:T.text,display:"flex",justifyContent:"space-between"}}>
                    <span>{e.trabajador} · {e.obra}</span>
                    {dup&&<span style={{color:T.orange,fontSize:11}}>⚠️ dup</span>}
                  </div>
                  <div style={{fontFamily:T.sans,fontSize:11,color:T.text2}}>{e.fecha} · {e.horas}h</div>
                </div>
                );
              })}
            </div>
            <Btn onClick={handleSave} style={{width:"100%"}}>Guardar {soloNuevos?numNuevos:parsed.length} entradas</Btn>
          </>
          );
        })()}
      </div>
    </div>
  );
}

// ─── ARCHIVOS SUPABASE ────────────────────────────────────────────────────────
function ArchivosObra({obraName}){
  const key=obraKey(obraName);
  const [files,setFiles]=useState([]);
  const [loading,setLoading]=useState(false);
  const [uploading,setUploading]=useState(false);
  const [err,setErr]=useState("");
  const [cat,setCat]=useState("planos"); // planos | fotos | otros
  const configured=!!(SUPABASE_URL&&SUPABASE_KEY);

  function fileCategory(name){
    if(/\.(jpg|jpeg|png|gif|webp)$/i.test(name))return"fotos";
    if(/\.(pdf)$/i.test(name))return"planos";
    return"otros";
  }

  useEffect(()=>{
    if(!configured)return;
    setLoading(true);
    supa.storage.list(key).then(({data})=>{setFiles(data||[]);setLoading(false);}).catch(()=>setLoading(false));
  },[key]);

  async function handleUpload(e){
    const file=e.target.files[0];if(!file)return;
    setUploading(true);setErr("");
    const {error}=await supa.storage.upload(key,file);
    if(error){setErr("Error al subir: "+error);setUploading(false);return;}
    const {data}=await supa.storage.list(key);
    setFiles(data||[]);setUploading(false);
    // Cambiar a la pestaña correspondiente
    const c=fileCategory(file.name);setCat(c);
  }

  async function handleDelete(path){
    
    await supa.storage.remove(path);
    setFiles(f=>f.filter(x=>x.name!==path.split("/").pop()));
  }

  if(!configured)return(
    <div style={{background:T.bg3,borderRadius:12,padding:"12px 14px",fontFamily:T.sans,fontSize:13,color:T.text2}}>
      Supabase no configurado — los archivos por obra no están disponibles.
    </div>
  );

  const cats=["planos","fotos","otros"];
  const catLabel={"planos":"📐 Planos","fotos":"📷 Fotos","otros":"📁 Otros"};
  const catAccept={"planos":".pdf","fotos":"image/*","otros":"*"};
  const filtered=files.filter(f=>fileCategory(f.name)===cat);

  return(
    <div>
      {/* Pestañas */}
      <div style={{display:"flex",gap:6,marginBottom:14}}>
        {cats.map(c=>{
          const count=files.filter(f=>fileCategory(f.name)===c).length;
          const active=cat===c;
          return(
            <button key={c} onClick={()=>setCat(c)} style={{flex:1,padding:"7px 4px",borderRadius:10,border:`1px solid ${active?T.goldBorder:T.border}`,background:active?T.goldDim:T.bg3,fontFamily:T.sans,fontSize:12,fontWeight:active?700:500,color:active?T.goldDark:T.text2,cursor:"pointer"}}>
              {catLabel[c]}{count>0?` (${count})`:""}</button>
          );
        })}
      </div>
      {/* Botón subir + error */}
      <div style={{display:"flex",justifyContent:"flex-end",marginBottom:10}}>
        <label style={{background:T.goldDim,border:`1px solid ${T.goldBorder}`,borderRadius:10,padding:"6px 14px",fontFamily:T.sans,fontSize:12,fontWeight:700,color:T.goldDark,cursor:"pointer"}}>
          {uploading?"Subiendo...":"+ Subir"}
          <input type="file" style={{display:"none"}} onChange={handleUpload} accept={catAccept[cat]}/>
        </label>
      </div>
      {err&&<div style={{color:T.red,fontFamily:T.sans,fontSize:12,marginBottom:8}}>{err}</div>}
      {loading&&<div style={{fontFamily:T.sans,fontSize:13,color:T.text3}}>Cargando...</div>}
      {!loading&&filtered.length===0&&<div style={{fontFamily:T.sans,fontSize:13,color:T.text3,padding:"12px 0"}}>Sin {catLabel[cat].split(" ")[1].toLowerCase()}</div>}
      <div style={{display:"flex",flexDirection:"column",gap:6}}>
        {filtered.map(f=>{
          const path=`${key}/${f.name}`;
          const url=supa.storage.publicUrl(path);
          const isImg=cat==="fotos";
          return(
            <div key={f.name} style={{background:T.bg3,borderRadius:10,padding:"9px 12px",display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:18}}>{cat==="planos"?"📐":cat==="fotos"?"🖼":"📁"}</span>
              <a href={url} target="_blank" rel="noopener noreferrer" style={{flex:1,fontFamily:T.sans,fontSize:12,color:T.blue,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{f.name}</a>
              <button onClick={()=>handleDelete(path)} style={{background:"none",border:"none",cursor:"pointer",color:T.red,fontSize:16,padding:"0 4px"}}>×</button>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── OBRA MODAL ───────────────────────────────────────────────────────────────
function ObraModal({obraName,data,festivos,adminOverrides,session,onClose,obrasMeta,setObrasMeta}){
  const oData=data.filter(e=>e.obra===obraName);
  const subobras=[...new Set(oData.map(e=>e.subobra||""))];
  const hasSubobras=subobras.some(s=>s!=="");
  const totalH=oData.reduce((s,e)=>s+e.horas,0);
  const workers=[...new Set(oData.map(e=>e.trabajador))];
  const allWorkers=["JCM","Txema","Javi ESE2","Carlos Camacho","Jimmy Jazz S2","Manja","Paco Ortega","Gustavo"];
  const [activeTab,setActiveTab]=useState("resumen");

  const workerStats=workers.map(w=>{
    const we=oData.filter(e=>e.trabajador===w);
    return{name:w,horas:we.reduce((s,e)=>s+e.horas,0),partes:we.length};
  }).sort((a,b)=>b.horas-a.horas);

  const mk=obraKey(obraName);
  const isCerrada=(obrasMeta&&obrasMeta[mk]&&obrasMeta[mk].cerrada)||false;
  function toggleCerrada(){
    const meta=(obrasMeta&&obrasMeta[mk])||{};
    const upd={...obrasMeta,[mk]:{...meta,cerrada:!isCerrada}};
    setObrasMeta(upd);localStorage.setItem("wk_obras_meta",JSON.stringify(upd));
  }
  function generateObraPDF(){
    const {jsPDF}=window.jspdf;
    const doc=new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
    const W=210,PL=15,PR=15,CW=W-PL-PR;
    doc.setFillColor(26,71,184);doc.rect(0,0,W,22,"F");
    doc.setTextColor(255,255,255);doc.setFontSize(14);doc.setFont("helvetica","bold");
    doc.text("RIBASESEDOS · "+obraName,PL,10);
    doc.setFontSize(8);doc.setFont("helvetica","normal");
    doc.text(`${totalH}h totales · ${workers.length} trabajadores · ${oData.length} partes`,PL,16);
    doc.text(new Date().toLocaleDateString("es-ES"),W-PR,16,{align:"right"});
    let y=28;
    workerStats.forEach(w=>{
      const we=oData.filter(e=>e.trabajador===w.name);
      if(y>240){doc.addPage();y=15;}
      doc.setFillColor(224,232,248);doc.rect(PL,y,CW,8,"F");
      doc.setDrawColor(26,71,184);doc.setLineWidth(0.8);doc.line(PL,y,PL,y+8);
      doc.setTextColor(26,22,18);doc.setFontSize(10);doc.setFont("helvetica","bold");
      doc.text(w.name,PL+5,y+5.5);
      doc.setTextColor(26,71,184);doc.text(w.horas+"h",W-PR,y+5.5,{align:"right"});
      y+=8;
      const rows=[...we].sort((a,b)=>a.fecha.localeCompare(b.fecha)).map(e=>[e.fecha,e.subobra||"—",e.horas+"h",getHT(e,festivos)==="n"?"Normal":getHT(e,festivos)==="e"?"Extra":getHT(e,festivos)==="f"?"Festivo":"Sábado",e.notas||""]);
      doc.autoTable({
        startY:y,head:[["Fecha","Subobra","Horas","Tipo","Notas"]],body:rows,
        margin:{left:PL,right:PR},
        styles:{fontSize:8,cellPadding:2,textColor:[26,22,18]},
        headStyles:{fillColor:[224,232,248],textColor:[26,71,184],fontStyle:"bold",fontSize:7},
      });
      y=doc.lastAutoTable.finalY+6;
    });
    mostrarPDF(doc.output("blob"),`Obra_${obraKey(obraName)}.pdf`);
  }
  return(
    <Modal title={obraName} onClose={onClose}>
      <div style={{display:"flex",gap:8,marginBottom:16}}>
        <StatBox label="Total horas" value={`${totalH}h`} color={T.goldDark}/>
        <StatBox label="Trabajadores" value={workers.length}/>
        <StatBox label="Partes" value={oData.length}/>
      </div>
      {session.isAdmin&&(
        <div style={{display:"flex",gap:8,marginBottom:14}}>
          <button onClick={toggleCerrada} style={{flex:1,padding:"9px",borderRadius:10,border:`1px solid ${isCerrada?T.goldBorder:"#ddd"}`,background:isCerrada?T.goldDim:"#f5f5f5",fontFamily:T.sans,fontSize:13,fontWeight:600,color:isCerrada?T.goldDark:"#888",cursor:"pointer"}}>
            {isCerrada?"🔓 Reabrir":"🔒 Cerrar"}
          </button>
          <button onClick={generateObraPDF} style={{flex:1,padding:"9px",borderRadius:10,border:`1px solid ${T.border}`,background:T.bgDark,fontFamily:T.sans,fontSize:13,fontWeight:600,color:"#fff",cursor:"pointer"}}>
            📄 PDF obra
          </button>
        </div>
      )}
      <div style={{display:"flex",gap:6,marginBottom:14,borderBottom:`1px solid ${T.border}`,paddingBottom:10}}>
        {["resumen","subobras","archivos"].map(t=>(
          <button key={t} onClick={()=>setActiveTab(t)} style={{padding:"6px 14px",borderRadius:20,border:`1px solid ${activeTab===t?T.gold:T.border}`,background:activeTab===t?T.goldDim:"transparent",fontFamily:T.sans,fontSize:12,fontWeight:600,color:activeTab===t?T.goldDark:T.text2,cursor:"pointer"}}>
            {t==="resumen"?"Resumen":t==="subobras"?"Subobras":"Archivos"}
          </button>
        ))}
      </div>
      {activeTab==="resumen"&&(
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {workerStats.map(w=>(
            <div key={w.name} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 14px",background:T.bg3,borderRadius:12}}>
              <Avatar name={w.name} size={36} color={WC[workerIdx(w.name)%WC.length]}/>
              <div style={{flex:1}}>
                <div style={{fontFamily:T.sans,fontWeight:700,fontSize:13,color:T.text}}>{w.name}</div>
                <div style={{fontFamily:T.sans,fontSize:11,color:T.text2}}>{w.partes} partes</div>
              </div>
              <div style={{fontFamily:T.display,fontSize:18,fontWeight:900,color:T.goldDark}}>{w.horas}h</div>
            </div>
          ))}
        </div>
      )}
      {activeTab==="subobras"&&(
        hasSubobras
          ? subobras.map(s=><SubobraGroup key={s||"__"} obraName={obraName} subobra={s} entries={oData.filter(e=>(e.subobra||"")===s)} festivos={festivos} adminOverrides={adminOverrides} obrasMeta={obrasMeta} setObrasMeta={setObrasMeta}/>)
          : <SubobraGroup obraName={obraName} subobra="" entries={oData} festivos={festivos} adminOverrides={adminOverrides} obrasMeta={obrasMeta} setObrasMeta={setObrasMeta}/>
      )}
      {activeTab==="archivos"&&<ArchivosObra obraName={obraName}/>}
    </Modal>
  );
}

// ─── WORKER MODAL ─────────────────────────────────────────────────────────────
function WorkerModal({workerName,data,festivos,adminOverrides,session,ausencias,onClose}){
  const allWorkers=["JCM","Txema","Javi ESE2","Carlos Camacho","Jimmy Jazz S2","Manja","Paco Ortega","Gustavo"];
  const wData=data.filter(e=>e.trabajador===workerName);
  const totalH=wData.reduce((s,e)=>s+e.horas,0);
  const now=new Date();const yr=now.getFullYear(),mo=now.getMonth();
  const mesMio=wData.filter(e=>{const d=new Date(e.fecha+"T12:00:00");return d.getFullYear()===yr&&d.getMonth()===mo;});
  const hMes=mesMio.reduce((s,e)=>s+e.horas,0);
  const obras=[...new Set(wData.map(e=>e.obra))];
  const ausW=(ausencias||[]).filter(a=>a.trabajador===workerName).slice(-5).reverse();

  function generatePDF(){
    const {jsPDF}=window.jspdf;
    const doc=new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
    const W=210,PL=15,PR=15,CW=W-PL-PR;
    doc.setFillColor(26,22,18);doc.rect(0,0,W,22,"F");
    doc.setTextColor(255,255,255);doc.setFontSize(14);doc.setFont("helvetica","bold");
    doc.text("RIBASESEDOS · "+workerName,PL,10);
    doc.setFontSize(8);doc.setFont("helvetica","normal");
    doc.text("Informe de horas · "+new Date().toLocaleDateString("es-ES"),PL,16);
    const sorted=[...wData].sort((a,b)=>a.fecha.localeCompare(b.fecha));
    const rows=sorted.map(e=>[e.fecha,e.obra,e.subobra||"",e.horas+"h",getHT(e,festivos)==="n"?"Normal":getHT(e,festivos)==="e"?"Extra":getHT(e,festivos)==="f"?"Festivo":"Sábado",e.notas||"—"]);
    doc.autoTable({
      startY:28,head:[["Fecha","Obra","Subobra","Horas","Tipo","Notas"]],body:rows,
      margin:{left:PL,right:PR},
      styles:{fontSize:8,cellPadding:2,textColor:[26,22,18]},
      headStyles:{fillColor:[245,240,232],textColor:[122,110,95],fontStyle:"bold",fontSize:7},
      foot:[["","","TOTAL",totalH+"h","",""]],footStyles:{fillColor:[245,240,232],fontStyle:"bold",textColor:[168,134,58]},
    });
    mostrarPDF(doc.output("blob"), "Informe "+workerName);
  }

  return(
    <Modal title={workerName} onClose={onClose}>
      <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:16,paddingBottom:14,borderBottom:`1px solid ${T.border}`}}>
        <Avatar name={workerName} size={56} color={WC[workerIdx(workerName)%WC.length]}/>
        <div>
          <div style={{fontFamily:T.display,fontSize:20,fontWeight:900,color:T.text}}>{workerName}</div>
          <div style={{fontFamily:T.sans,fontSize:12,color:T.text2}}>{obras.length} obras · {wData.length} partes totales</div>
        </div>
      </div>
      <div style={{display:"flex",gap:8,marginBottom:14}}>
        <StatBox label="Horas mes" value={`${hMes}h`} color={T.goldDark}/>
        <StatBox label="Total" value={`${totalH}h`}/>
        <StatBox label="Obras mes" value={[...new Set(mesMio.map(e=>e.obra))].length}/>
      </div>
      <Section title="Obras (mes actual)">
        <div style={{display:"flex",flexDirection:"column",gap:6}}>
          {[...new Set(mesMio.map(e=>e.obra))].map(o=>{
            const hO=mesMio.filter(e=>e.obra===o).reduce((s,e)=>s+e.horas,0);
            return(
              <div key={o} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 12px",background:T.bg3,borderRadius:10}}>
                <div style={{width:8,height:8,borderRadius:"50%",background:obraColor(o,[])}}/>
                <span style={{fontFamily:T.sans,fontSize:13,fontWeight:600,color:T.text,flex:1}}>{o}</span>
                <span style={{fontFamily:T.mono,fontSize:13,fontWeight:700,color:T.text}}>{hO}h</span>
              </div>
            );
          })}
        </div>
      </Section>
      {ausW.length>0&&(
        <Section title="Últimas ausencias">
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {ausW.map((a,i)=>(
              <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 12px",background:T.bg3,borderRadius:10}}>
                <span style={{fontFamily:T.sans,fontSize:12,color:T.text,flex:1}}>{a.tipo} · {a.fechaInicio}</span>
                <span style={{fontFamily:T.sans,fontSize:11,fontWeight:700,color:a.estado==="aprobada"?T.green:a.estado==="rechazada"?T.red:T.orange}}>{a.estado}</span>
              </div>
            ))}
          </div>
        </Section>
      )}
      <Btn variant="secondary" style={{width:"100%",marginTop:8}} onClick={generatePDF}>🖨 PDF trabajador</Btn>
    </Modal>
  );
}

// ─── CALENDAR VIEW ────────────────────────────────────────────────────────────
function CalendarView({data,festivos,session,ausencias,setAusencias,onSelectParte,toast}){
  const [cur,setCur]=useState(()=>{const n=new Date();return{y:n.getFullYear(),m:n.getMonth()};});
  const allWorkers=["JCM","Txema","Javi ESE2","Carlos Camacho","Jimmy Jazz S2","Manja","Paco Ortega","Gustavo"];
  const DIAS_VACACIONES=22;
  const [fW,setFW]=useState(session.isAdmin?"todos":session.name);
  const [vistaAus,setVistaAus]=useState(false); // false=calendario, true=ausencias
  const [showFormAus,setShowFormAus]=useState(false);
  const [editandoAus,setEditandoAus]=useState(null);
  const [tipoAus,setTipoAus]=useState("vacaciones");
  const [fechaIniAus,setFechaIniAus]=useState(today());
  const [fechaFinAus,setFechaFinAus]=useState(today());
  const [motivoAus,setMotivoAus]=useState("");

  const firstDay=new Date(cur.y,cur.m,1).getDay();
  const daysInMonth=new Date(cur.y,cur.m+1,0).getDate();
  const offset=(firstDay+6)%7;
  const cells=Array(offset).fill(null).concat([...Array(daysInMonth)].map((_,i)=>i+1));
  while(cells.length%7!==0)cells.push(null);

  const mnArr=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
  const dias=["L","M","X","J","V","S","D"];

  // Ausencias del mes visible
  const mesStr=`${cur.y}-${String(cur.m+1).padStart(2,"0")}`;
  const ausenciasMes=(ausencias||[]).filter(a=>{
    if(!session.isAdmin&&a.trabajador!==session.name)return false;
    return a.fechaInicio.startsWith(mesStr)||(a.fechaFin&&a.fechaFin.startsWith(mesStr));
  });
  const pendientesMes=ausenciasMes.filter(a=>a.estado==="pendiente").length;

  // Contador vacaciones por trabajador (año actual)
  function vacStats(trabajador){
    const yr=cur.y;
    const ausW=(ausencias||[]).filter(a=>a.trabajador===trabajador&&a.tipo==="vacaciones");
    function diasAus(a){
      const ini=new Date(a.fechaInicio+"T12:00:00");
      const fin=new Date((a.fechaFin||a.fechaInicio)+"T12:00:00");
      return Math.round((fin-ini)/86400000)+1;
    }
    const pedidos=ausW.filter(a=>a.fechaInicio.startsWith(yr)).reduce((s,a)=>s+diasAus(a),0);
    const disfrutados=ausW.filter(a=>a.estado==="aprobada"&&a.fechaInicio.startsWith(yr)).reduce((s,a)=>s+diasAus(a),0);
    return{asignados:DIAS_VACACIONES,pedidos,disfrutados,restantes:DIAS_VACACIONES-disfrutados};
  }

  function cellData(d){
    if(!d)return null;
    const f=`${cur.y}-${String(cur.m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const entries=data.filter(e=>e.fecha===f&&(fW==="todos"||e.trabajador===fW));
    const fest=festivos.find(x=>x.fecha===f);
    const isSun=new Date(f+"T12:00:00").getDay()===0;
    const ausDay=(ausencias||[]).filter(a=>a.estado==="aprobada"&&a.fechaInicio<=f&&(a.fechaFin||a.fechaInicio)>=f&&(fW==="todos"||a.trabajador===fW));
    return{f,entries,fest,isSun,ausDay};
  }

  function abrirNuevaAus(){
    setEditandoAus(null);setTipoAus("vacaciones");setFechaIniAus(today());setFechaFinAus(today());setMotivoAus("");setShowFormAus(true);
  }
  function abrirEditarAus(a){
    setEditandoAus(a);setTipoAus(a.tipo);setFechaIniAus(a.fechaInicio);setFechaFinAus(a.fechaFin||a.fechaInicio);setMotivoAus(a.motivo||"");setShowFormAus(true);
  }
  function handleGuardarAus(){
    const fechaFinFinal=fechaFinAus>=fechaIniAus?fechaFinAus:fechaIniAus;
    if(editandoAus){
      const upd=(ausencias||[]).map(a=>a.id===editandoAus.id?{...a,tipo:tipoAus,fechaInicio:fechaIniAus,fechaFin:fechaFinFinal,motivo:motivoAus.trim()}:a);
      setAusencias(upd);localStorage.setItem("wk_ausencias",JSON.stringify(upd));
      if(toast)toast("Ausencia actualizada");
    } else {
      const nueva={id:Date.now(),trabajador:session.name,tipo:tipoAus,fechaInicio:fechaIniAus,fechaFin:fechaFinFinal,motivo:motivoAus.trim(),estado:"pendiente",createdAt:new Date().toISOString()};
      const upd=[...(ausencias||[]),nueva];
      setAusencias(upd);localStorage.setItem("wk_ausencias",JSON.stringify(upd));
      if(toast)toast("Solicitud enviada");
    }
    setShowFormAus(false);setEditandoAus(null);
  }
  function handleEliminarAus(id){
    const upd=(ausencias||[]).filter(a=>a.id!==id);
    setAusencias(upd);localStorage.setItem("wk_ausencias",JSON.stringify(upd));
    if(toast)toast("Ausencia eliminada");
  }
  function handleEstadoAus(id,estado){
    const upd=(ausencias||[]).map(a=>a.id===id?{...a,estado,reviewedAt:new Date().toISOString()}:a);
    setAusencias(upd);localStorage.setItem("wk_ausencias",JSON.stringify(upd));
    if(toast)toast(estado==="aprobada"?"Ausencia aprobada":"Ausencia rechazada",estado==="aprobada"?"ok":"error");
  }

  const lbl={fontFamily:T.sans,fontWeight:700,fontSize:11,color:T.text2,textTransform:"uppercase",letterSpacing:".06em",marginBottom:5,display:"block"};
  const inp={width:"100%",padding:"10px 14px",borderRadius:12,border:`1px solid ${T.border}`,background:T.bg2,fontFamily:T.sans,fontSize:14,color:T.text,outline:"none"};

  return(
    <div style={{paddingBottom:80}}>
      <Header title="Calendario"
        right={
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <button onClick={()=>setCur(c=>{let m=c.m-1,y=c.y;if(m<0){m=11;y--;}return{y,m};})} style={{background:T.bg3,border:"none",borderRadius:8,width:30,height:30,cursor:"pointer",fontSize:16}}>←</button>
            <button onClick={()=>setCur(c=>{let m=c.m+1,y=c.y;if(m>11){m=0;y++;}return{y,m};})} style={{background:T.bg3,border:"none",borderRadius:8,width:30,height:30,cursor:"pointer",fontSize:16}}>→</button>
          </div>
        }
        sub={`${mnArr[cur.m]} ${cur.y}`}
      />

      {/* Toggle calendario / ausencias */}
      <div style={{padding:"10px 14px 0",display:"flex",gap:8}}>
        <button onClick={()=>setVistaAus(false)} style={{flex:1,padding:"8px",borderRadius:10,border:`1px solid ${!vistaAus?T.goldBorder:T.border}`,background:!vistaAus?T.goldDim:T.bg3,fontFamily:T.sans,fontSize:13,fontWeight:!vistaAus?700:500,color:!vistaAus?T.goldDark:T.text2,cursor:"pointer"}}>🗓 Calendario</button>
        <button onClick={()=>setVistaAus(true)} style={{flex:1,padding:"8px",borderRadius:10,border:`1px solid ${vistaAus?T.goldBorder:T.border}`,background:vistaAus?T.goldDim:T.bg3,fontFamily:T.sans,fontSize:13,fontWeight:vistaAus?700:500,color:vistaAus?T.goldDark:T.text2,cursor:"pointer",position:"relative"}}>
          📅 Ausencias{pendientesMes>0&&<span style={{marginLeft:6,background:T.orange,color:"#fff",borderRadius:10,fontSize:10,fontWeight:800,padding:"1px 6px"}}>{pendientesMes}</span>}
        </button>
      </div>

      {!vistaAus&&(
        <>
          {session.isAdmin&&(
            <div style={{padding:"8px 14px 0",display:"flex",gap:6,overflowX:"auto",paddingBottom:6}}>
              <Pill label="Todos" active={fW==="todos"} onClick={()=>setFW("todos")}/>
              {allWorkers.map((w,i)=><Pill key={w} label={w.split(" ")[0]} active={fW===w} onClick={()=>setFW(w)} color={WC[i%WC.length]}/>)}
            </div>
          )}
          <div style={{padding:"8px 10px 0"}}>
            <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3,marginBottom:4}}>
              {dias.map(d=><div key={d} style={{textAlign:"center",fontFamily:T.sans,fontSize:11,fontWeight:700,color:T.text2,padding:"4px 0"}}>{d}</div>)}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3}}>
              {cells.map((d,i)=>{
                const cd=cellData(d);
                if(!cd)return<div key={i}/>;
                const isToday=cd.f===today();
                const totalH=cd.entries.reduce((s,e)=>s+e.horas,0);
                const hasFest=cd.fest||cd.isSun;
                return(
                  <div key={i} style={{minHeight:72,borderRadius:10,padding:"5px 6px",background:isToday?T.goldDim:hasFest?T.redDim:T.bg2,border:`1px solid ${isToday?T.gold:hasFest?"rgba(192,57,43,.15)":T.border}`,cursor:"default",position:"relative"}}>
                    <div style={{fontFamily:T.sans,fontSize:12,fontWeight:isToday?900:600,color:isToday?T.goldDark:hasFest?T.red:T.text}}>{d}</div>
                    {totalH>0&&<div style={{fontFamily:T.mono,fontSize:11,fontWeight:800,color:T.goldDark,marginTop:2}}>{totalH}h</div>}
                    {cd.ausDay.length>0&&<div style={{fontSize:9,color:T.orange,marginTop:1}}>📅×{cd.ausDay.length}</div>}
                    {cd.fest&&<div style={{fontSize:8,color:T.red,marginTop:1,lineHeight:1.2,wordBreak:"break-word"}}>{cd.fest.nombre.slice(0,12)}</div>}
                    {cd.entries.length>0&&(
                      <div style={{display:"flex",flexDirection:"column",gap:1,marginTop:3}}>
                        {cd.entries.slice(0,3).map((e,j)=>(
                          <div key={j} style={{display:"flex",alignItems:"center",gap:3}}>
                            <div style={{width:6,height:6,borderRadius:"50%",background:WC[workerIdx(e.trabajador)%WC.length],flexShrink:0}}/>
                            <div style={{fontFamily:T.sans,fontSize:9,color:T.text2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",lineHeight:1.2}}>{e.trabajador.split(" ")[0]}</div>
                          </div>
                        ))}
                        {cd.entries.length>3&&<div style={{fontFamily:T.sans,fontSize:9,color:T.text3}}>+{cd.entries.length-3}</div>}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        </>
      )}

      {vistaAus&&(
        <div style={{padding:"12px 14px 0"}}>
          {/* Botón solicitar */}
          <div style={{display:"flex",justifyContent:"flex-end",marginBottom:12}}>
            <Btn small onClick={abrirNuevaAus}>+ Solicitar ausencia</Btn>
          </div>

          {/* Contadores vacaciones */}
          <div style={{marginBottom:14}}>
            <div style={{fontFamily:T.sans,fontWeight:700,fontSize:11,color:T.text2,textTransform:"uppercase",letterSpacing:".06em",marginBottom:8}}>Vacaciones {cur.y}</div>
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              {(session.isAdmin?allWorkers:[session.name]).map(w=>{
                const s=vacStats(w);
                const pct=Math.min(100,(s.disfrutados/s.asignados)*100);
                return(
                  <div key={w} style={{background:T.bg2,borderRadius:12,padding:"10px 14px",border:`1px solid ${T.border}`}}>
                    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
                      <span style={{fontFamily:T.sans,fontWeight:700,fontSize:13,color:T.text}}>{w}</span>
                      <span style={{fontFamily:T.mono,fontSize:12,color:T.text2}}>{s.disfrutados}/{s.asignados}d</span>
                    </div>
                    <div style={{height:4,borderRadius:4,background:T.bg3,overflow:"hidden"}}>
                      <div style={{height:"100%",width:`${pct}%`,background:pct>=100?T.red:pct>=80?T.orange:T.green,borderRadius:4,transition:"width .3s"}}/>
                    </div>
                    <div style={{display:"flex",gap:12,marginTop:5}}>
                      <span style={{fontFamily:T.sans,fontSize:10,color:T.text3}}>Pedidos: <b style={{color:T.text}}>{s.pedidos}d</b></span>
                      <span style={{fontFamily:T.sans,fontSize:10,color:T.text3}}>Restantes: <b style={{color:s.restantes<=5?T.red:T.green}}>{s.restantes}d</b></span>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>

          {/* Lista ausencias del mes */}
          <div style={{fontFamily:T.sans,fontWeight:700,fontSize:11,color:T.text2,textTransform:"uppercase",letterSpacing:".06em",marginBottom:8}}>
            Ausencias {mnArr[cur.m]}
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {ausenciasMes.map(a=>{
              const puedeEditar=session.isAdmin||(a.trabajador===session.name&&a.estado==="pendiente");
              const colorE=a.estado==="aprobada"?T.green:a.estado==="rechazada"?T.red:T.orange;
              const bgE=a.estado==="aprobada"?T.greenDim:a.estado==="rechazada"?T.redDim:T.orangeDim;
              return(
                <div key={a.id} style={{background:T.bg2,borderRadius:14,padding:"12px 14px",border:`1px solid ${T.border}`,boxShadow:T.shadow}}>
                  <div style={{display:"flex",alignItems:"flex-start",gap:10,marginBottom:8}}>

// ─── FICHAJE SCREEN ───────────────────────────────────────────────────────────
function FichajeScreen({session,fichajes,setFichajes,toast}){
  const [loading,setLoading]=useState(false);
  const myF=(fichajes||[]).filter(f=>f.trabajador===session.name).slice(-10).reverse();
  const lastEntry=myF[0];
  const isOpen=lastEntry&&!lastEntry.salida;

  async function getLocation(){
    return new Promise((res,rej)=>navigator.geolocation.getCurrentPosition(p=>res({lat:p.coords.latitude,lng:p.coords.longitude,acc:p.coords.accuracy}),rej,{timeout:8000}));
  }

  async function handleFichar(){
    setLoading(true);
    try{
      let loc=null;
      try{loc=await getLocation();}catch(e){loc=null;}
      if(isOpen){
        const upd=(fichajes||[]).map(f=>f.id===lastEntry.id?{...f,salida:new Date().toISOString(),locSalida:loc}:f);
        setFichajes(upd);localStorage.setItem("wk_fichajes",JSON.stringify(upd));
        toast("Salida registrada");
      } else {
        const nuevo={id:Date.now(),trabajador:session.name,entrada:new Date().toISOString(),locEntrada:loc,salida:null};
        const upd=[...fichajes,nuevo];
        setFichajes(upd);localStorage.setItem("wk_fichajes",JSON.stringify(upd));
        toast("Entrada registrada");
      }
    }catch(e){toast("Error al fichar","error");}
    setLoading(false);
  }

  function duracion(entrada,salida){
    const ms=(new Date(salida||new Date())-new Date(entrada));
    const h=Math.floor(ms/3600000);const m=Math.floor((ms%3600000)/60000);
    return`${h}h ${m}m`;
  }

  return(
    <div style={{paddingBottom:80}}>
      <Header title="Fichaje" sub={session.name}/>
      <div style={{padding:"24px 20px",display:"flex",flexDirection:"column",alignItems:"center",gap:20}}>
        <div style={{width:140,height:140,borderRadius:"50%",background:isOpen?T.greenDim:T.bg2,border:`3px solid ${isOpen?T.green:T.border}`,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",boxShadow:T.shadowM}}>
          <div style={{fontSize:36}}>{isOpen?"🟢":"⭕"}</div>
          <div style={{fontFamily:T.sans,fontWeight:700,fontSize:13,color:isOpen?T.green:T.text2,marginTop:4}}>{isOpen?"En obra":"Sin fichar"}</div>
          {isOpen&&<div style={{fontFamily:T.mono,fontSize:11,color:T.green,marginTop:2}}>{duracion(lastEntry.entrada,null)}</div>}
        </div>
        <Btn onClick={handleFichar} disabled={loading} style={{width:"100%",maxWidth:280,background:isOpen?T.red:T.green}}>
          {loading?"Procesando...":(isOpen?"Registrar salida":"Registrar entrada")}
        </Btn>
        <div style={{width:"100%",maxWidth:400}}>
          <div style={{fontFamily:T.sans,fontWeight:700,fontSize:12,color:T.text2,textTransform:"uppercase",letterSpacing:".06em",marginBottom:8}}>Últimos fichajes</div>
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {myF.map(f=>(
              <div key={f.id} style={{background:T.bg2,borderRadius:12,padding:"10px 14px",border:`1px solid ${T.border}`}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span style={{fontFamily:T.sans,fontSize:12,fontWeight:700,color:T.text}}>🟢 {new Date(f.entrada).toLocaleString("es-ES",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"})}</span>
                  {f.locEntrada&&<span style={{fontFamily:T.sans,fontSize:10,color:T.blue}}>📍</span>}
                </div>
                {f.salida&&(
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:4}}>
                    <span style={{fontFamily:T.sans,fontSize:12,color:T.text2}}>🔴 {new Date(f.salida).toLocaleString("es-ES",{hour:"2-digit",minute:"2-digit"})}</span>
                    <span style={{fontFamily:T.mono,fontSize:12,fontWeight:700,color:T.goldDark}}>{duracion(f.entrada,f.salida)}</span>
                  </div>
                )}
                {!f.salida&&<div style={{fontFamily:T.sans,fontSize:11,color:T.green,marginTop:4}}>En curso · {duracion(f.entrada,null)}</div>}
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── CONFIG / ADMIN PANEL ─────────────────────────────────────────────────────
function ConfigScreen({session,festivos,setFestivos,adminOverrides,setAdminOverrides,data,setData,accounts,setAccounts,toast,onLogout}){
  const allWorkers=["JCM","Txema","Javi ESE2","Carlos Camacho","Jimmy Jazz S2","Manja","Paco Ortega","Gustavo"];
  const [tab,setTab]=useState(session.isAdmin?"festivos":"backup");
  const [nuevaFecha,setNuevaFecha]=useState("");
  const [nuevaNombre,setNuevaNombre]=useState("");
  const [showWorkerCfg,setShowWorkerCfg]=useState(false);
  const [selWorker,setSelWorker]=useState(null);
  const [newPin,setNewPin]=useState("");
  const [newPhone,setNewPhone]=useState("");

  function addFestivo(){
    if(!nuevaFecha){toast("Indica la fecha","error");return;}
    if(festivos.some(f=>f.fecha===nuevaFecha)){toast("Ya existe","warning");return;}
    const upd=[...festivos,{fecha:nuevaFecha,nombre:nuevaNombre||"Festivo"}].sort((a,b)=>a.fecha.localeCompare(b.fecha));
    setFestivos(upd);localStorage.setItem("wk_fest",JSON.stringify(upd));
    setNuevaFecha("");setNuevaNombre("");toast("Festivo añadido");
  }
  function removeFestivo(f){
    const upd=festivos.filter(x=>x.fecha!==f.fecha);
    setFestivos(upd);localStorage.setItem("wk_fest",JSON.stringify(upd));
  }
  function exportBackup(){
    const bk={data,festivos,adminOverrides,accounts,ausencias:JSON.parse(localStorage.getItem("wk_ausencias")||"[]"),fichajes:JSON.parse(localStorage.getItem("wk_fichajes")||"[]"),exportedAt:new Date().toISOString(),version:3};
    const blob=new Blob([JSON.stringify(bk,null,2)],{type:"application/json"});
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`workly_backup_${today()}.json`;a.click();
    toast("Backup exportado");
  }
  function importBackup(e){
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const bk=JSON.parse(ev.target.result);
        if(!bk.data||!Array.isArray(bk.data)){toast("Archivo inválido","error");return;}
        
        localStorage.setItem("wk_data",JSON.stringify(bk.data));
        localStorage.setItem("wk_fest",JSON.stringify(bk.festivos||[]));
        localStorage.setItem("wk_adm",JSON.stringify(bk.adminOverrides||{}));
        localStorage.setItem("wk_accounts",JSON.stringify(bk.accounts||[]));
        if(bk.ausencias)localStorage.setItem("wk_ausencias",JSON.stringify(bk.ausencias));
        if(bk.fichajes)localStorage.setItem("wk_fichajes",JSON.stringify(bk.fichajes));
        toast("Backup importado — recarga la página");
        setTimeout(()=>window.location.reload(),1500);
      }catch(err){toast("Error al parsear el backup","error");}
    };
    reader.readAsText(file);
  }
  function saveWorkerCfg(){
    if(!selWorker)return;
    let upd=[...accounts];
    const idx=upd.findIndex(a=>a.name===selWorker);
    if(idx>=0){if(newPin)upd[idx]={...upd[idx],pin:newPin};if(newPhone!==undefined)upd[idx]={...upd[idx],phone:newPhone};}
    else{upd.push({name:selWorker,pin:newPin||"0000",phone:newPhone,deviceId:null});}
    setAccounts(upd);localStorage.setItem("wk_accounts",JSON.stringify(upd));
    toast("Trabajador actualizado");setShowWorkerCfg(false);setNewPin("");setNewPhone("");setSelWorker(null);
  }
  function unbindDevice(w){
    const upd=accounts.map(a=>a.name===w?{...a,deviceId:null}:a);
    setAccounts(upd);localStorage.setItem("wk_accounts",JSON.stringify(upd));
    toast("Dispositivo desvinculado");
  }

  const inp={width:"100%",padding:"10px 14px",borderRadius:12,border:`1px solid ${T.border}`,background:T.bg2,fontFamily:T.sans,fontSize:14,color:T.text,outline:"none"};
  const lbl={fontFamily:T.sans,fontWeight:700,fontSize:12,color:T.text2,textTransform:"uppercase",letterSpacing:".06em",marginBottom:5,display:"block"};

  return(
    <div style={{paddingBottom:80}}>
      <Header title="Configuración"/>
      {session.isAdmin&&(
        <div style={{padding:"10px 14px 0",display:"flex",gap:6,overflowX:"auto",flexWrap:"wrap"}}>
          {["festivos","obras","trabajadores","backup"].map(t=>(
            <Pill key={t} label={t.charAt(0).toUpperCase()+t.slice(1)} active={tab===t} onClick={()=>setTab(t)}/>
          ))}
        </div>
      )}
      <div style={{padding:"14px 14px 0"}}>
        {(tab==="backup"||!session.isAdmin)&&(
          <Section title="Backup de datos">
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              <Btn variant="secondary" style={{width:"100%"}} onClick={exportBackup}>📤 Exportar backup JSON</Btn>
              <label style={{display:"block",width:"100%"}}>
                <div style={{padding:"13px 20px",borderRadius:12,background:T.bg3,border:`1px solid ${T.border}`,fontFamily:T.sans,fontWeight:700,fontSize:15,color:T.text,textAlign:"center",cursor:"pointer"}}>📥 Importar backup JSON</div>
                <input type="file" accept=".json" style={{display:"none"}} onChange={importBackup}/>
              </label>
              <div style={{fontFamily:T.sans,fontSize:12,color:T.text3}}>El backup incluye todos los partes, festivos, cuentas y ausencias. <strong>Importar reemplaza todos los datos actuales.</strong></div>
            </div>
          </Section>
        )}
        {tab==="festivos"&&session.isAdmin&&(
          <Section title="Festivos">
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
              <input type="date" value={nuevaFecha} onChange={e=>setNuevaFecha(e.target.value)} style={inp}/>
              <input value={nuevaNombre} onChange={e=>setNuevaNombre(e.target.value)} placeholder="Nombre" style={inp}/>
            </div>
            <Btn variant="secondary" small style={{width:"100%",marginBottom:12}} onClick={addFestivo}>+ Añadir festivo</Btn>
            <div style={{display:"flex",flexDirection:"column",gap:4}}>
              {festivos.map(f=>(
                <div key={f.fecha} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 12px",background:T.bg2,borderRadius:10,border:`1px solid ${T.border}`}}>
                  <span style={{fontFamily:T.mono,fontSize:12,color:T.text,flex:0,whiteSpace:"nowrap"}}>{f.fecha}</span>
                  <span style={{fontFamily:T.sans,fontSize:12,color:T.text,flex:1}}>{f.nombre}</span>
                  <button onClick={()=>removeFestivo(f)} style={{background:"none",border:"none",cursor:"pointer",color:T.red,fontSize:16,padding:"0 4px"}}>×</button>
                </div>
              ))}
            </div>
          </Section>
        )}
        {tab==="obras"&&session.isAdmin&&(

function loadTrastero(){
  try{return JSON.parse(localStorage.getItem("wk_trastero")||"[]");}catch(e){return[];}
}
