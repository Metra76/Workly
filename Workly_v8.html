function PinPadLarge({onPin,error}){const[val,setVal]=useState("");const add=d=>{if(val.length>=4)return;const nv=val+d;setVal(nv);if(nv.length===4)onPin(nv);};const del=()=>setVal(v=>v.slice(0,-1));const digits=["1","2","3","4","5","6","7","8","9","","0","⌫"];return<div style={{textAlign:"center",width:"100%"}}><div style={{display:"flex",gap:12,justifyContent:"center",marginBottom:20}}>{[0,1,2,3].map(i=><div key={i} style={{width:18,height:18,borderRadius:"50%",background:i<val.length?T.gold:T.bg3,border:`2px solid ${i<val.length?T.gold:T.border}`,transition:"all .15s"}}/>)}</div>{error&&<div style={{color:T.red,fontFamily:T.sans,fontSize:14,marginBottom:12,fontWeight:700}}>{error}</div>}<div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,maxWidth:280,margin:"0 auto"}}>{digits.map((d,i)=><button key={i} onClick={()=>{if(d==="⌫")del();else if(d)add(d);}} disabled={!d} style={{height:68,borderRadius:16,border:`1px solid ${T.border}`,background:d?T.bg2:"transparent",fontFamily:T.sans,fontSize:d==="⌫"?22:26,fontWeight:700,color:d?T.text:"transparent",cursor:d?"pointer":"default",boxShadow:d?T.shadow:"none"}}>{d}</button>)}</div></div>;}

function LoginScreen({accounts,onLogin}){
  const[step,setStep]=useState("select");const[selected,setSelected]=useState(null);const[showPicker,setShowPicker]=useState(false);const[pinErr,setPinErr]=useState("");
  function handleSelect(name){setShowPicker(false);const acc=accounts.find(a=>a.name===name);const devId=getDeviceId();if(acc&&acc.deviceId&&acc.deviceId!==devId){setSelected(name);setStep("blocked");return;}setSelected(name);setPinErr("");setStep("pin");}
  function handlePin(pin){
    const isAdmin1=selected===ADMIN_NAME&&pin===ADMIN_PIN;
    const isAdmin2=selected===ADMIN_NAME2&&pin===ADMIN_PIN2;
    const acc=accounts.find(a=>a.name===selected);
    const accOk=acc?.pin===pin;
    if(isAdmin1||isAdmin2||accOk){onLogin({name:selected,isAdmin:isAdminUser(selected),pin});}
    else{setPinErr("PIN incorrecto");setTimeout(()=>setPinErr(""),1500);}
  }
  if(step==="blocked")return<div style={{minHeight:"100vh",background:T.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24}}><div style={{fontFamily:T.display,fontSize:28,fontWeight:900,color:T.text,marginBottom:20}}>Workly</div><div style={{background:T.redDim,border:`1px solid rgba(192,57,43,.2)`,borderRadius:16,padding:24,textAlign:"center",maxWidth:300}}><div style={{fontSize:36,marginBottom:10}}>🔒</div><div style={{fontFamily:T.sans,fontWeight:700,color:T.red,marginBottom:8,fontSize:15}}>Dispositivo no autorizado</div><div style={{fontFamily:T.sans,fontSize:13,color:T.text2,marginBottom:16}}>Esta cuenta está vinculada a otro dispositivo.</div><Btn variant="secondary" small onClick={()=>setStep("select")}>Volver</Btn></div></div>;
  if(step==="pin")return<div style={{minHeight:"100vh",background:T.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24}}><div style={{fontFamily:T.display,fontSize:30,fontWeight:900,color:T.text,marginBottom:6}}>Workly</div><div style={{fontFamily:T.sans,fontSize:13,color:T.text2,marginBottom:28}}>Introduce tu PIN</div><Avatar name={selected} size={62} color={WC[ALL_WORKERS.indexOf(selected)%WC.length]}/><div style={{fontFamily:T.sans,fontWeight:800,fontSize:18,color:T.text,marginTop:12,marginBottom:28}}>{selected}</div><PinPadLarge onPin={handlePin} error={pinErr}/><button onClick={()=>setStep("select")} style={{marginTop:28,background:"none",border:"none",fontFamily:T.sans,fontSize:13,color:T.text2,cursor:"pointer"}}>← Cambiar usuario</button></div>;
  return(
    <div style={{minHeight:"100vh",background:T.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24}}>
      <div style={{fontFamily:T.display,fontSize:36,fontWeight:900,color:T.text,letterSpacing:"-.02em",marginBottom:6}}>Workly</div>
      <div style={{fontFamily:T.sans,fontSize:14,color:T.text2,marginBottom:48}}>Grup Ese Dos · Ribasesedos</div>
      <div style={{width:"100%",maxWidth:320,position:"relative"}}>
        <button onClick={()=>setShowPicker(p=>!p)} style={{width:"100%",display:"flex",alignItems:"center",gap:14,background:T.bg2,border:`1px solid ${showPicker?T.gold:T.border}`,borderRadius:16,padding:"16px 18px",cursor:"pointer",boxShadow:T.shadowM,textAlign:"left"}}>
          {selected?<><Avatar name={selected} size={40} color={WC[ALL_WORKERS.indexOf(selected)%WC.length]}/><span style={{fontFamily:T.sans,fontWeight:700,fontSize:16,color:T.text,flex:1}}>{selected}</span></>:<><div style={{width:40,height:40,borderRadius:"50%",background:T.bg3,border:`1px dashed ${T.border}`}}/><span style={{fontFamily:T.sans,fontWeight:600,fontSize:15,color:T.text2,flex:1}}>Selecciona tu nombre</span></>}
          <span style={{color:T.text3,fontSize:18,transform:showPicker?"rotate(180deg)":"none",transition:"transform .2s"}}>▼</span>
        </button>
        {showPicker&&<div style={{position:"absolute",top:"calc(100% + 8px)",left:0,right:0,background:T.bg2,border:`1px solid ${T.border}`,borderRadius:16,boxShadow:T.shadowL,zIndex:200,overflow:"hidden"}}>
          {ALL_WORKERS.map((w,i)=><button key={w} onClick={()=>handleSelect(w)} style={{width:"100%",display:"flex",alignItems:"center",gap:12,padding:"13px 16px",background:"none",border:"none",borderBottom:`1px solid ${T.border}`,cursor:"pointer",textAlign:"left"}}>
            <Avatar name={w} size={36} color={WC[i%WC.length]}/><span style={{fontFamily:T.sans,fontWeight:700,fontSize:14,color:T.text,flex:1}}>{w}</span>
            {isAdminUser(w)&&<span style={{fontFamily:T.sans,fontSize:10,color:T.goldDark,fontWeight:700,background:T.goldDim,padding:"2px 7px",borderRadius:8}}>Admin</span>}
          </button>)}
        </div>}
      </div>
      {selected&&<Btn onClick={()=>setStep("pin")} style={{width:"100%",maxWidth:320,marginTop:16}}>Continuar →</Btn>}
    </div>
  );
}

// ── DASHBOARD ─────────────────────────────────────────────────────────────────

  const allObras=[...new Set(data.map(e=>e.obra))].sort();
  const now=new Date();const yr=now.getFullYear(),mo=now.getMonth();
  const mesActual=data.filter(e=>{const d=new Date(e.fecha+"T12:00:00");return d.getFullYear()===yr&&d.getMonth()===mo;});
  const totalH=mesActual.reduce((s,e)=>s+e.horas,0);
  const semana=[];for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);semana.push(d.toISOString().split("T")[0]);}
  const hSemana=data.filter(e=>semana.includes(e.fecha)).reduce((s,e)=>s+e.horas,0);
  const workersActivos=[...new Set(mesActual.map(e=>e.trabajador))];
  const obrasActivas=[...new Set(mesActual.map(e=>e.obra))];
  const allWorkersSorted=[...ALL_WORKERS].sort((a,b)=>mesActual.filter(e=>e.trabajador===b).reduce((s,e)=>s+e.horas,0)-mesActual.filter(e=>e.trabajador===a).reduce((s,e)=>s+e.horas,0));
  const obrasActivasSorted=[...obrasActivas].sort((a,b)=>mesActual.filter(e=>e.obra===b).reduce((s,e)=>s+e.horas,0)-mesActual.filter(e=>e.obra===a).reduce((s,e)=>s+e.horas,0));
  const ultimas=[...data].sort((a,b)=>b.fecha.localeCompare(a.fecha)||b.id-a.id).slice(0,8);

    <div style={{paddingBottom:80}}>
      <div style={{background:T.bgDark,padding:"24px 20px 20px",color:"#fff"}}>
        <div style={{fontFamily:T.sans,fontSize:11,color:"rgba(255,255,255,.4)",marginBottom:2,letterSpacing:".06em",textTransform:"uppercase"}}>Workly · Grup Ese Dos</div>
        <div style={{fontFamily:T.mono,fontSize:10,color:"rgba(255,255,255,.3)",marginBottom:2,letterSpacing:".08em"}}>B64772239</div>
        <div style={{fontFamily:T.display,fontSize:28,fontWeight:900,letterSpacing:"-.02em"}}>{mnArr[mo]} {yr}</div>
        <div style={{display:"flex",gap:10,marginTop:16}}>
          {[{l:"Horas mes",v:totalH+"h",c:T.gold},{l:"Esta semana",v:hSemana+"h",c:"#fff"},{l:"Partes mes",v:mesActual.length,c:"#fff"}].map(x=><div key={x.l} style={{flex:1,background:"rgba(255,255,255,.06)",borderRadius:12,padding:"12px 14px",border:"1px solid rgba(255,255,255,.08)"}}><div style={{fontFamily:T.sans,fontSize:10,color:"rgba(255,255,255,.4)",textTransform:"uppercase",letterSpacing:".06em"}}>{x.l}</div><div style={{fontFamily:T.display,fontSize:24,fontWeight:900,color:x.c,marginTop:2}}>{x.v}</div></div>)}
        </div>
      </div>
      <div style={{padding:"18px 16px 0"}}>
        {pendientes.length>0&&<div onClick={()=>setTab("cal")} style={{background:T.orangeDim,border:`1px solid rgba(201,122,46,.25)`,borderRadius:14,padding:"12px 16px",marginBottom:14,cursor:"pointer",display:"flex",alignItems:"center",gap:10}}><span style={{fontSize:20}}>⚠️</span><div><div style={{fontFamily:T.sans,fontWeight:700,fontSize:13,color:T.orange}}>{pendientes.length} ausencia{pendientes.length>1?"s":""} pendiente{pendientes.length>1?"s":""}</div><div style={{fontFamily:T.sans,fontSize:11,color:T.text2}}>Toca para revisar</div></div></div>}
        <Section title="Equipo activo" action={<button onClick={()=>setTab("equipo")} style={{background:"none",border:"none",fontFamily:T.sans,fontSize:11,color:T.goldDark,cursor:"pointer",fontWeight:700}}>Ver todo →</button>}>
          <div style={{display:"flex",gap:10,overflowX:"auto",paddingBottom:4}}>
            {allWorkersSorted.map((w,i)=>{const activo=workersActivos.includes(w);const hW=mesActual.filter(e=>e.trabajador===w).reduce((s,e)=>s+e.horas,0);return<div key={w} onClick={()=>onSelectWorker(w)} style={{flexShrink:0,display:"flex",flexDirection:"column",alignItems:"center",gap:4,cursor:"pointer",opacity:activo?1:.4}}><Avatar name={w} size={44} color={WC[ALL_WORKERS.indexOf(w)%WC.length]}/><div style={{fontFamily:T.sans,fontSize:10,fontWeight:700,color:T.text,textAlign:"center",width:46,lineHeight:1.2}}>{w.split(" ")[0]}</div>{activo&&<div style={{fontFamily:T.mono,fontSize:9,color:T.goldDark,fontWeight:700}}>{hW}h</div>}</div>;})}</div>

        </Section>
      </div>
    </div>
  );
}

// ── MI PERFIL ─────────────────────────────────────────────────────────────────
function MiPerfil({session,data,festivos,ausencias,onLogout}){
  const myData=data.filter(e=>e.trabajador===session.name);
  const now=new Date();const yr=now.getFullYear(),mo=now.getMonth();
  const mesMio=myData.filter(e=>{const d=new Date(e.fecha+"T12:00:00");return d.getFullYear()===yr&&d.getMonth()===mo;});
  const totalMes=mesMio.reduce((s,e)=>s+e.horas,0);
  const semana=[];for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);semana.push(d.toISOString().split("T")[0]);}
  const hSem=myData.filter(e=>semana.includes(e.fecha)).reduce((s,e)=>s+e.horas,0);
  const totalGlobal=myData.reduce((s,e)=>s+e.horas,0);
  const misObras=[...new Set(mesMio.map(e=>e.obra))];
  const mnArr=["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
  return(
    <div style={{paddingBottom:80}}>
      <div style={{background:T.bgDark,padding:"28px 20px 24px",display:"flex",flexDirection:"column",alignItems:"center"}}><Avatar name={session.name} size={64} color={WC[ALL_WORKERS.indexOf(session.name)%WC.length]}/><div style={{fontFamily:T.display,fontSize:22,fontWeight:900,color:"#fff",marginTop:10}}>{session.name}</div><div style={{fontFamily:T.sans,fontSize:12,color:"rgba(255,255,255,.45)",marginTop:2}}>{session.isAdmin?"Administrador":"Trabajador"} · Grup Ese Dos</div></div>
      <div style={{padding:"16px 16px 0"}}>
        <div style={{display:"flex",gap:8,marginBottom:16}}><StatBox label={`Horas ${mnArr[mo]}`} value={`${totalMes}h`} color={T.goldDark}/><StatBox label="Esta semana" value={`${hSem}h`}/><StatBox label="Total" value={`${totalGlobal}h`}/></div>
        <Section title={`Obras este mes (${misObras.length})`}><div style={{display:"flex",flexDirection:"column",gap:6}}>{misObras.map(o=>{const hO=mesMio.filter(e=>e.obra===o).reduce((s,e)=>s+e.horas,0);return<div key={o} style={{background:T.bg2,borderRadius:10,padding:"9px 14px",border:`1px solid ${T.border}`,display:"flex",alignItems:"center",gap:10}}><div style={{width:8,height:8,borderRadius:"50%",background:obraColor(o,[])}}/><span style={{fontFamily:T.sans,fontSize:13,fontWeight:600,color:T.text,flex:1}}>{o}</span><span style={{fontFamily:T.mono,fontSize:13,fontWeight:700,color:T.text}}>{hO}h</span></div>;})}}</Section>
        <Section title="Últimas entradas"><div style={{display:"flex",flexDirection:"column",gap:6}}>{[...myData].sort((a,b)=>b.fecha.localeCompare(a.fecha)||b.id-a.id).slice(0,6).map(e=><div key={e.id} style={{background:T.bg2,borderRadius:10,padding:"9px 12px",border:`1px solid ${T.border}`,display:"flex",alignItems:"center",gap:10}}><div style={{flex:1}}><div style={{fontFamily:T.sans,fontSize:12,fontWeight:700,color:T.text}}>{e.obra}{e.subobra?` / ${e.subobra}`:""}</div><div style={{fontFamily:T.sans,fontSize:11,color:T.text2}}>{fmtShort(e.fecha)}</div></div><div style={{fontFamily:T.mono,fontSize:13,fontWeight:700,color:T.text}}>{e.horas}h</div><HTBadge type={getHT(e,festivos)}/></div>)}</div></Section>
        <Btn variant="danger" style={{width:"100%",marginTop:8}} onClick={onLogout}>Cerrar sesión</Btn>
      </div>
    </div>
  );
}

// ── PARTES LIST ───────────────────────────────────────────────────────────────
function PartesList({data,festivos,session,onSelectParte}){
  const allObras=[...new Set(data.map(e=>e.obra))].sort();
  const[fW,setFW]=useState("todos");const[fO,setFO]=useState("todas");const[search,setSearch]=useState("");const[soloNuevos,setSoloNuevos]=useState(false);
  const maxId=Math.max(...INITIAL_DATA.map(e=>e.id));
  let filtered=session.isAdmin?data:data.filter(e=>e.trabajador===session.name);
  if(soloNuevos)filtered=filtered.filter(e=>e.id>maxId);
  if(fW!=="todos")filtered=filtered.filter(e=>e.trabajador===fW);
  if(fO!=="todas")filtered=filtered.filter(e=>e.obra===fO);
  if(search.trim())filtered=filtered.filter(e=>(e.obra+e.trabajador+(e.subobra||"")+(e.notas||"")).toLowerCase().includes(search.toLowerCase()));
  filtered=[...filtered].sort((a,b)=>b.fecha.localeCompare(a.fecha)||b.id-a.id);
  const totalH=filtered.reduce((s,e)=>s+e.horas,0);
  const obras=[...new Set((session.isAdmin?data:data.filter(e=>e.trabajador===session.name)).map(e=>e.obra))].sort();
  return(
    <div style={{paddingBottom:80}}>
      <Header title="Partes" sub={`${filtered.length} entradas · ${totalH}h`}/>
      <div style={{padding:"12px 14px 0"}}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Buscar..." style={{width:"100%",padding:"10px 14px",borderRadius:12,border:`1px solid ${T.border}`,background:T.bg2,fontFamily:T.sans,fontSize:14,color:T.text,outline:"none",marginBottom:10}}/>
        {session.isAdmin&&<div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:6,marginBottom:6}}><Pill label="Todos" active={fW==="todos"} onClick={()=>setFW("todos")}/>{ALL_WORKERS.map((w,i)=><Pill key={w} label={w.split(" ")[0]} active={fW===w} onClick={()=>setFW(w)} color={WC[i%WC.length]}/>)}</div>}
        <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:6,marginBottom:6}}><Pill label="Todas" active={fO==="todas"} onClick={()=>setFO("todas")}/>{obras.map(o=><Pill key={o} label={o} active={fO===o} onClick={()=>setFO(o)}/>)}</div>
        {session.isAdmin&&<div style={{marginBottom:10}}><button onClick={()=>setSoloNuevos(s=>!s)} style={{padding:"5px 12px",borderRadius:20,border:`1px solid ${soloNuevos?T.gold:T.border}`,background:soloNuevos?T.goldDim:"transparent",fontFamily:T.sans,fontSize:12,fontWeight:600,color:soloNuevos?T.goldDark:T.text2,cursor:"pointer"}}>Solo nuevos</button></div>}
        <div style={{display:"flex",flexDirection:"column",gap:6}}>

          {filtered.length===0&&<div style={{textAlign:"center",padding:"40px 20px",fontFamily:T.sans,color:T.text3}}>Sin resultados</div>}

function ArchivosObra({obraName}){

  const firstDay=new Date(cur.y,cur.m,1).getDay();const daysInMonth=new Date(cur.y,cur.m+1,0).getDate();const offset=(firstDay+6)%7;
  const cells=Array(offset).fill(null).concat([...Array(daysInMonth)].map((_,i)=>i+1));while(cells.length%7!==0)cells.push(null);

// ── FICHAJE ───────────────────────────────────────────────────────────────────
function FichajeScreen({session,fichajes,setFichajes,toast}){
  const[loading,setLoading]=useState(false);const myF=(fichajes||[]).filter(f=>f.trabajador===session.name).slice(-10).reverse();const lastEntry=myF[0];const isOpen=lastEntry&&!lastEntry.salida;
  async function getLocation(){return new Promise((res,rej)=>navigator.geolocation.getCurrentPosition(p=>res({lat:p.coords.latitude,lng:p.coords.longitude}),rej,{timeout:8000}));}
  async function handleFichar(){setLoading(true);try{let loc=null;try{loc=await getLocation();}catch(e){}if(isOpen){const upd=(fichajes||[]).map(f=>f.id===lastEntry.id?{...f,salida:new Date().toISOString(),locSalida:loc}:f);setFichajes(upd);localStorage.setItem("wk_fichajes",JSON.stringify(upd));toast("Salida registrada");}else{const nuevo={id:Date.now(),trabajador:session.name,entrada:new Date().toISOString(),locEntrada:loc,salida:null};const upd=[...fichajes,nuevo];setFichajes(upd);localStorage.setItem("wk_fichajes",JSON.stringify(upd));toast("Entrada registrada");}}catch(e){toast("Error al fichar","error");}setLoading(false);}
  function duracion(entrada,salida){const ms=(new Date(salida||new Date())-new Date(entrada));const h=Math.floor(ms/3600000);const m=Math.floor((ms%3600000)/60000);return`${h}h ${m}m`;}
  return<div style={{paddingBottom:80}}><Header title="Fichaje" sub={session.name}/><div style={{padding:"24px 20px",display:"flex",flexDirection:"column",alignItems:"center",gap:20}}><div style={{width:140,height:140,borderRadius:"50%",background:isOpen?T.greenDim:T.bg2,border:`3px solid ${isOpen?T.green:T.border}`,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",boxShadow:T.shadowM}}><div style={{fontSize:36}}>{isOpen?"🟢":"⭕"}</div><div style={{fontFamily:T.sans,fontWeight:700,fontSize:13,color:isOpen?T.green:T.text2,marginTop:4}}>{isOpen?"En obra":"Sin fichar"}</div>{isOpen&&<div style={{fontFamily:T.mono,fontSize:11,color:T.green,marginTop:2}}>{duracion(lastEntry.entrada,null)}</div>}</div><Btn onClick={handleFichar} disabled={loading} style={{width:"100%",maxWidth:280,background:isOpen?T.red:T.green}}>{loading?"Procesando...":(isOpen?"Registrar salida":"Registrar entrada")}</Btn><div style={{width:"100%",maxWidth:400}}><div style={{fontFamily:T.sans,fontWeight:700,fontSize:12,color:T.text2,textTransform:"uppercase",letterSpacing:".06em",marginBottom:8}}>Últimos fichajes</div><div style={{display:"flex",flexDirection:"column",gap:6}}>{myF.map(f=><div key={f.id} style={{background:T.bg2,borderRadius:12,padding:"10px 14px",border:`1px solid ${T.border}`}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontFamily:T.sans,fontSize:12,fontWeight:700,color:T.text}}>🟢 {new Date(f.entrada).toLocaleString("es-ES",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"})}</span></div>{f.salida&&<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:4}}><span style={{fontFamily:T.sans,fontSize:12,color:T.text2}}>🔴 {new Date(f.salida).toLocaleString("es-ES",{hour:"2-digit",minute:"2-digit"})}</span><span style={{fontFamily:T.mono,fontSize:12,fontWeight:700,color:T.goldDark}}>{duracion(f.entrada,f.salida)}</span></div>}{!f.salida&&<div style={{fontFamily:T.sans,fontSize:11,color:T.green,marginTop:4}}>En curso · {duracion(f.entrada,null)}</div>}</div>)}</div></div></div></div>;
}

// ── CONFIG ────────────────────────────────────────────────────────────────────
function ConfigScreen({session,festivos,setFestivos,adminOverrides,setAdminOverrides,data,setData,accounts,setAccounts,toast,onLogout}){
  const[tab,setTab]=useState(session.isAdmin?"festivos":"backup");const[nuevaFecha,setNuevaFecha]=useState("");const[nuevaNombre,setNuevaNombre]=useState("");const[showWorkerCfg,setShowWorkerCfg]=useState(false);const[selWorker,setSelWorker]=useState(null);const[newPin,setNewPin]=useState("");const[newPhone,setNewPhone]=useState("");
  function addFestivo(){if(!nuevaFecha){toast("Indica la fecha","error");return;}if(festivos.some(f=>f.fecha===nuevaFecha)){toast("Ya existe","warning");return;}const upd=[...festivos,{fecha:nuevaFecha,nombre:nuevaNombre||"Festivo"}].sort((a,b)=>a.fecha.localeCompare(b.fecha));setFestivos(upd);localStorage.setItem("wk_fest",JSON.stringify(upd));setNuevaFecha("");setNuevaNombre("");toast("Festivo añadido");}
  function removeFestivo(f){const upd=festivos.filter(x=>x.fecha!==f.fecha);setFestivos(upd);localStorage.setItem("wk_fest",JSON.stringify(upd));}
  function exportBackup(){const bk={data,festivos,adminOverrides,accounts,ausencias:JSON.parse(localStorage.getItem("wk_ausencias")||"[]"),fichajes:JSON.parse(localStorage.getItem("wk_fichajes")||"[]"),exportedAt:new Date().toISOString(),version:3};const blob=new Blob([JSON.stringify(bk,null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`workly_backup_${today()}.json`;a.click();toast("Backup exportado");}
  function importBackup(e){const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=ev=>{try{const bk=JSON.parse(ev.target.result);if(!bk.data||!Array.isArray(bk.data)){toast("Archivo inválido","error");return;}localStorage.setItem("wk_data",JSON.stringify(bk.data));localStorage.setItem("wk_fest",JSON.stringify(bk.festivos||[]));localStorage.setItem("wk_adm",JSON.stringify(bk.adminOverrides||{}));localStorage.setItem("wk_accounts",JSON.stringify(bk.accounts||[]));if(bk.ausencias)localStorage.setItem("wk_ausencias",JSON.stringify(bk.ausencias));if(bk.fichajes)localStorage.setItem("wk_fichajes",JSON.stringify(bk.fichajes));toast("Importado — recarga la página");setTimeout(()=>window.location.reload(),1500);}catch(err){toast("Error al parsear","error");}};reader.readAsText(file);}
  function saveWorkerCfg(){if(!selWorker)return;let upd=[...accounts];const idx=upd.findIndex(a=>a.name===selWorker);if(idx>=0){if(newPin)upd[idx]={...upd[idx],pin:newPin};if(newPhone!==undefined)upd[idx]={...upd[idx],phone:newPhone};}else{upd.push({name:selWorker,pin:newPin||"0000",phone:newPhone,deviceId:null});}setAccounts(upd);localStorage.setItem("wk_accounts",JSON.stringify(upd));toast("Actualizado");setShowWorkerCfg(false);setNewPin("");setNewPhone("");setSelWorker(null);}
  function unbindDevice(w){const upd=accounts.map(a=>a.name===w?{...a,deviceId:null}:a);setAccounts(upd);localStorage.setItem("wk_accounts",JSON.stringify(upd));toast("Dispositivo desvinculado");}
  const inp={width:"100%",padding:"10px 14px",borderRadius:12,border:`1px solid ${T.border}`,background:T.bg2,fontFamily:T.sans,fontSize:14,color:T.text,outline:"none"};
  const lbl={fontFamily:T.sans,fontWeight:700,fontSize:12,color:T.text2,textTransform:"uppercase",letterSpacing:".06em",marginBottom:5,display:"block"};
  const nonAdminWorkers=ALL_WORKERS.filter(w=>!isAdminUser(w));
  return(
    <div style={{paddingBottom:80}}>
      <Header title="Configuración"/>
      {session.isAdmin&&<div style={{padding:"10px 14px 0",display:"flex",gap:6,overflowX:"auto",flexWrap:"wrap"}}>{["festivos","obras","trabajadores","backup"].map(t=><Pill key={t} label={t.charAt(0).toUpperCase()+t.slice(1)} active={tab===t} onClick={()=>setTab(t)}/>)}</div>}
      <div style={{padding:"14px 14px 0"}}>
        {(tab==="backup"||!session.isAdmin)&&<Section title="Backup"><div style={{display:"flex",flexDirection:"column",gap:10}}><Btn variant="secondary" style={{width:"100%"}} onClick={exportBackup}>📤 Exportar backup JSON</Btn><label style={{display:"block",width:"100%"}}><div style={{padding:"13px 20px",borderRadius:12,background:T.bg3,border:`1px solid ${T.border}`,fontFamily:T.sans,fontWeight:700,fontSize:15,color:T.text,textAlign:"center",cursor:"pointer"}}>📥 Importar backup JSON</div><input type="file" accept=".json" style={{display:"none"}} onChange={importBackup}/></label><div style={{fontFamily:T.sans,fontSize:12,color:T.text3}}>Importar reemplaza todos los datos.</div></div></Section>}
        {tab==="festivos"&&session.isAdmin&&<Section title="Festivos"><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}><input type="date" value={nuevaFecha} onChange={e=>setNuevaFecha(e.target.value)} style={inp}/><input value={nuevaNombre} onChange={e=>setNuevaNombre(e.target.value)} placeholder="Nombre" style={inp}/></div><Btn variant="secondary" small style={{width:"100%",marginBottom:12}} onClick={addFestivo}>+ Añadir festivo</Btn><div style={{display:"flex",flexDirection:"column",gap:4}}>{festivos.map(f=><div key={f.fecha} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 12px",background:T.bg2,borderRadius:10,border:`1px solid ${T.border}`}}><span style={{fontFamily:T.mono,fontSize:12,color:T.text,flex:0,whiteSpace:"nowrap"}}>{f.fecha}</span><span style={{fontFamily:T.sans,fontSize:12,color:T.text,flex:1}}>{f.nombre}</span><button onClick={()=>removeFestivo(f)} style={{background:"none",border:"none",cursor:"pointer",color:T.red,fontSize:16,padding:"0 4px"}}>×</button></div>)}</div></Section>}
        {tab==="obras"&&session.isAdmin&&<Section title="Override obras"><div style={{display:"flex",flexDirection:"column",gap:6}}>{[...new Set(data.map(e=>e.obra))].sort().map(o=>{const k=normObra(o);const cur=adminOverrides[k];return<div key={o} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",background:T.bg2,borderRadius:10,border:`1px solid ${T.border}`}}><span style={{fontFamily:T.sans,fontSize:12,color:T.text,flex:1}}>{o}</span>{[undefined,true,false].map((v,i)=><button key={i} onClick={()=>{const upd={...adminOverrides};if(v===undefined)delete upd[k];else upd[k]=v;setAdminOverrides(upd);localStorage.setItem("wk_adm",JSON.stringify(upd));}} style={{padding:"3px 8px",borderRadius:8,border:`1px solid ${cur===v?T.gold:T.border}`,background:cur===v?T.goldDim:"transparent",fontFamily:T.sans,fontSize:10,fontWeight:700,color:cur===v?T.goldDark:T.text2,cursor:"pointer"}}>{v===undefined?"Auto":v===true?"Admin":"Trabajo"}</button>)}</div>;})}}</Section>}
        {tab==="trabajadores"&&session.isAdmin&&<Section title="Cuentas trabajadores"><div style={{display:"flex",flexDirection:"column",gap:8}}>{nonAdminWorkers.map((w,i)=>{const acc=accounts.find(a=>a.name===w);return<div key={w} style={{background:T.bg2,borderRadius:12,padding:"12px 14px",border:`1px solid ${T.border}`}}><div style={{display:"flex",alignItems:"center",gap:10,marginBottom:acc?.deviceId?8:0}}><Avatar name={w} size={34} color={WC[ALL_WORKERS.indexOf(w)%WC.length]}/><div style={{flex:1}}><div style={{fontFamily:T.sans,fontWeight:700,fontSize:13,color:T.text}}>{w}</div><div style={{fontFamily:T.sans,fontSize:11,color:T.text2}}>PIN: {acc?.pin||"sin PIN"} {acc?.phone?`· 📱 ${acc.phone}`:""}</div></div><Btn variant="secondary" small onClick={()=>{setSelWorker(w);setNewPin(acc?.pin||"");setNewPhone(acc?.phone||"");setShowWorkerCfg(true);}}>Editar</Btn></div>{acc?.deviceId&&<div style={{display:"flex",alignItems:"center",gap:8,marginTop:6,padding:"6px 10px",background:T.bg3,borderRadius:8}}><span style={{fontFamily:T.sans,fontSize:11,color:T.text2,flex:1}}>🔒 Dispositivo vinculado</span><button onClick={()=>unbindDevice(w)} style={{background:"none",border:"none",cursor:"pointer",fontFamily:T.sans,fontSize:11,color:T.red,fontWeight:700}}>Desvincular</button></div>}</div>;})}}</Section>}
        {!session.isAdmin&&<div style={{marginTop:16}}><Btn variant="danger" style={{width:"100%"}} onClick={onLogout}>Cerrar sesión</Btn></div>}
      </div>
      {showWorkerCfg&&selWorker&&<Modal title={`Editar: ${selWorker}`} onClose={()=>setShowWorkerCfg(false)}><div style={{display:"flex",flexDirection:"column",gap:12}}><div><label style={lbl}>Nuevo PIN (4 dígitos)</label><input value={newPin} onChange={e=>setNewPin(e.target.value.replace(/\D/,"").slice(0,4))} placeholder="0000" style={inp} maxLength={4} type="tel"/></div><div><label style={lbl}>Teléfono</label><input value={newPhone} onChange={e=>setNewPhone(e.target.value)} placeholder="+34 600 000 000" style={inp} type="tel"/></div><Btn onClick={saveWorkerCfg} style={{width:"100%"}}>Guardar</Btn></div></Modal>}
    </div>
  );
}

// ── TRASTERO ──────────────────────────────────────────────────────────────────
const TRASTERO_SECCIONES=["Electricidad","Fontanería","Redes","Tornillería","Herramientas","Otros"];
const TRASTERO_ICONS={"Electricidad":"⚡","Fontanería":"🔧","Redes":"🌐","Tornillería":"🔩","Herramientas":"🛠","Otros":"📦"};
function loadTrastero(){try{return JSON.parse(localStorage.getItem("wk_trastero")||"[]");}catch(e){return[];}}

  const[items,setItemsRaw]=useState(loadTrastero);
  const[seccion,setSeccion]=useState("Electricidad");
  const[filtroAsignado,setFiltroAsignado]=useState("Todos");
  const[showForm,setShowForm]=useState(false);
  const[editItem,setEditItem]=useState(null);
  const[nombre,setNombre]=useState("");const[cantidad,setCantidad]=useState("");const[unidad,setUnidad]=useState("");const[notas,setNotas]=useState("");const[asignado,setAsignado]=useState("Trastero");
  const[confirmDel,setConfirmDel]=useState(null);

  function saveItems(v){setItemsRaw(v);localStorage.setItem("wk_trastero",JSON.stringify(v));}
  function abrirNuevo(){setEditItem(null);setNombre("");setCantidad("");setUnidad("");setNotas("");setAsignado("Trastero");setShowForm(true);}
  function abrirEditar(item){setEditItem(item);setNombre(item.nombre);setCantidad(String(item.cantidad||""));setUnidad(item.unidad||"");setNotas(item.notas||"");setAsignado(item.asignado||"Trastero");setShowForm(true);}
  function handleGuardar(){
    if(!nombre.trim())return;
    if(editItem){saveItems(items.map(i=>i.id===editItem.id?{...i,nombre:nombre.trim(),cantidad,unidad:unidad.trim(),notas:notas.trim(),asignado}:i));}
    else{saveItems([...items,{id:Date.now(),seccion,nombre:nombre.trim(),cantidad,unidad:unidad.trim(),notas:notas.trim(),asignado}]);}
    setShowForm(false);setEditItem(null);
  }
  function handleDelete(id){saveItems(items.filter(i=>i.id!==id));setConfirmDel(null);}

  const filtradosSec=items.filter(i=>i.seccion===seccion);
  const filtrados=filtroAsignado==="Todos"?filtradosSec:filtradosSec.filter(i=>(i.asignado||"Trastero")===filtroAsignado);

  function badgeStyle(a){const esTrastero=!a||a==="Trastero";return{background:esTrastero?T.goldDim:T.greenDim,color:esTrastero?T.goldDark:T.green,border:`1px solid ${esTrastero?T.goldBorder:"rgba(45,125,90,.25)"}`,fontFamily:T.sans,fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:10,whiteSpace:"nowrap",flexShrink:0};}

  const inp={width:"100%",padding:"11px 14px",borderRadius:12,border:`1px solid ${T.border}`,background:T.bg2,fontFamily:T.sans,fontSize:14,color:T.text,outline:"none"};
  const lbl={fontFamily:T.sans,fontWeight:700,fontSize:11,color:T.text2,textTransform:"uppercase",letterSpacing:".06em",marginBottom:5,display:"block"};

  return(

        <div style={{width:1,background:"rgba(255,255,255,.1)"}}/>
        <div style={{flex:1}}><div style={{fontFamily:T.sans,fontSize:10,color:"rgba(255,255,255,.4)",textTransform:"uppercase",letterSpacing:".06em",marginBottom:3}}>Candado</div><div style={{fontFamily:T.mono,fontSize:22,fontWeight:900,color:T.gold,letterSpacing:".1em"}}>5148</div></div>
      </div>

      {/* Secciones */}
      <div style={{padding:"14px 14px 0",display:"flex",gap:6,overflowX:"auto",paddingBottom:6}}>
        {TRASTERO_SECCIONES.map(s=>{const count=items.filter(i=>i.seccion===s).length;const active=seccion===s;return<button key={s} onClick={()=>setSeccion(s)} style={{flexShrink:0,padding:"7px 12px",borderRadius:20,border:`1px solid ${active?T.goldBorder:T.border}`,background:active?T.goldDim:T.bg2,fontFamily:T.sans,fontSize:12,fontWeight:active?700:500,color:active?T.goldDark:T.text2,cursor:"pointer",whiteSpace:"nowrap"}}>{TRASTERO_ICONS[s]} {s}{count>0?` (${count})`:""}</button>;})}
      </div>

          return<button key={a} onClick={()=>setFiltroAsignado(a)} style={{flexShrink:0,padding:"4px 10px",borderRadius:20,border:`1px solid ${active?(esTrastero?T.goldBorder:"rgba(45,125,90,.4)"):T.border}`,background:active?(esTrastero?T.goldDim:T.greenDim):"transparent",fontFamily:T.sans,fontSize:11,fontWeight:active?700:500,color:active?(esTrastero?T.goldDark:T.green):T.text2,cursor:"pointer",whiteSpace:"nowrap"}}>{a==="Todos"?"Todos":a.split(" ")[0]}</button>;
        })}

        </div>

            <div key={item.id} style={{background:T.bg2,borderRadius:14,padding:"12px 14px",border:`1px solid ${T.border}`,boxShadow:T.shadow}}>

                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",marginBottom:4}}>
                    <span style={{fontFamily:T.sans,fontWeight:700,fontSize:14,color:T.text}}>{item.nombre}</span>
                    <span style={badgeStyle(item.asignado)}>{item.asignado||"Trastero"}</span>
                  </div>
                  {(item.cantidad||item.unidad)&&<div style={{fontFamily:T.mono,fontSize:13,color:T.goldDark,fontWeight:700,marginTop:2}}>{item.cantidad}{item.unidad?` ${item.unidad}`:""}</div>}
                  {item.notas&&<div style={{fontFamily:T.sans,fontSize:12,color:T.text3,marginTop:3}}>{item.notas}</div>}
                </div>
                <div style={{display:"flex",gap:6,flexShrink:0}}>
                  <button onClick={()=>abrirEditar(item)} style={{background:T.bg3,border:`1px solid ${T.border}`,borderRadius:8,padding:"5px 10px",fontFamily:T.sans,fontSize:12,fontWeight:600,color:T.text2,cursor:"pointer"}}>✏️</button>
                  {confirmDel===item.id
                    ?<div style={{display:"flex",gap:4}}><button onClick={()=>handleDelete(item.id)} style={{background:T.redDim,border:"none",borderRadius:8,padding:"5px 10px",fontFamily:T.sans,fontSize:12,fontWeight:700,color:T.red,cursor:"pointer"}}>¿Sí?</button><button onClick={()=>setConfirmDel(null)} style={{background:T.bg3,border:"none",borderRadius:8,padding:"5px 8px",fontFamily:T.sans,fontSize:12,color:T.text2,cursor:"pointer"}}>No</button></div>
                    :<button onClick={()=>setConfirmDel(item.id)} style={{background:T.redDim,border:"none",borderRadius:8,padding:"5px 10px",fontFamily:T.sans,fontSize:12,fontWeight:600,color:T.red,cursor:"pointer"}}>🗑</button>
                  }
                </div>
              </div>
            </div>
          ))}
          {filtrados.length===0&&<div style={{textAlign:"center",padding:"40px 20px",fontFamily:T.sans,color:T.text3,fontSize:13}}>Sin artículos{filtroAsignado!=="Todos"?` asignados a ${filtroAsignado}`:` en ${seccion}`}<br/><span style={{fontSize:11}}>Toca "+ Añadir" para agregar</span></div>}
        </div>
      </div>

      {/* Modal formulario */}
      {showForm&&<Modal title={editItem?"Editar artículo":"Nuevo artículo"} onClose={()=>{setShowForm(false);setEditItem(null);}}>
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          <div><label style={lbl}>Nombre *</label><input value={nombre} onChange={e=>setNombre(e.target.value)} placeholder="ej. Cable 2.5mm², Llave inglesa..." style={inp} autoFocus/></div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}><div><label style={lbl}>Cantidad</label><input value={cantidad} onChange={e=>setCantidad(e.target.value)} placeholder="ej. 50" style={inp}/></div><div><label style={lbl}>Unidad</label><input value={unidad} onChange={e=>setUnidad(e.target.value)} placeholder="m, ud, kg..." style={inp}/></div></div>
          <div>
            <label style={lbl}>Asignado a</label>
            <select value={asignado} onChange={e=>setAsignado(e.target.value)} style={inp}>
              {ALL_WORKERS_TRASTERO.map(a=><option key={a} value={a}>{a}</option>)}
            </select>
          </div>
          <div><label style={lbl}>Notas</label><textarea value={notas} onChange={e=>setNotas(e.target.value)} rows={2} placeholder="Ubicación, referencia, estado..." style={{...inp,resize:"vertical"}}/></div>
          {!editItem&&<div><label style={lbl}>Sección</label><select value={seccion} onChange={e=>setSeccion(e.target.value)} style={inp}>{TRASTERO_SECCIONES.map(s=><option key={s} value={s}>{TRASTERO_ICONS[s]} {s}</option>)}</select></div>}
          <Btn onClick={handleGuardar} style={{width:"100%"}} disabled={!nombre.trim()}>{editItem?"Guardar cambios":"Añadir artículo"}</Btn>
        </div>
      </Modal>}
    </div>
  );
}

// ── PARTE FORMAL ──────────────────────────────────────────────────────────────
function ParteFormaScreen({data,festivos,obrasMeta,setObrasMeta,onClose,toast}){
  const allObras=[...new Set(data.map(e=>e.obra))].sort();
  const[modo,setModo]=useState("workly");const[obraInput,setObraInput]=useState("");const[obra,setObra]=useState("");const[showObraSugs,setShowObraSugs]=useState(false);const[subobra,setSubobra]=useState("");const[fechaIni,setFechaIni]=useState("");const[fechaFin,setFechaFin]=useState(today());const[dir,setDir]=useState("");const[trabajos,setTrabajos]=useState("");const[materiales,setMateriales]=useState("");
  const[libWorkers,setLibWorkers]=useState([{trabajador:"JCM",fecha:today(),horas:8,notas:""}]);
  const obraFinal=obra||obraInput.trim();const obraSugs=obraInput.length>0?allObras.filter(o=>o.toLowerCase().includes(obraInput.toLowerCase())).slice(0,6):[];
  function selectObra(o){setObra(o);setObraInput(o);setShowObraSugs(false);const mk=obraKey(o);const meta=(obrasMeta&&obrasMeta[mk])||{};if(meta.direccion)setDir(meta.direccion);const oEntries=data.filter(e=>e.obra===o).sort((a,b)=>a.fecha.localeCompare(b.fecha));if(oEntries.length>0)setFechaIni(oEntries[0].fecha);}
  const entries=data.filter(e=>{if(e.obra!==obraFinal)return false;if(subobra&&e.subobra!==subobra)return false;if(fechaIni&&e.fecha<fechaIni)return false;if(fechaFin&&e.fecha>fechaFin)return false;return true;});
  const total=entries.reduce((s,e)=>s+e.horas,0);const libreTotal=libWorkers.reduce((s,w)=>s+Number(w.horas||0),0);
  function handleGenerar(){if(!obraFinal){toast("Indica la obra","error");return;}if(dir&&setObrasMeta){const mk=obraKey(obraFinal);const meta=(obrasMeta&&obrasMeta[mk])||{};if(dir!==meta.direccion){const upd={...obrasMeta,[mk]:{...meta,direccion:dir}};setObrasMeta(upd);localStorage.setItem("wk_obras_meta",JSON.stringify(upd));}}if(modo==="workly"){if(entries.length===0){toast("No hay partes en ese período","error");return;}const operarios=[...new Set(entries.map(e=>e.trabajador))].map(nombrePDF).join(" / ");const fechasUnicas=[...new Set(entries.map(e=>e.fecha))].sort();const fechasStr=fechasUnicas.map(f=>new Date(f+"T12:00:00").toLocaleDateString("es-ES",{day:"2-digit",month:"2-digit",year:"numeric"})).join(" y ");const horasPorDia=fechasUnicas.map(f=>{const h=entries.filter(e=>e.fecha===f).reduce((s,e)=>s+e.horas,0);const fLabel=new Date(f+"T12:00:00").toLocaleDateString("es-ES",{day:"2-digit",month:"2-digit"});return h+"h ("+fLabel+")";});const horasStr=total+"h totales"+(horasPorDia.length>1?" — "+horasPorDia.join(" + "):"");generarPDFSimple(obraFinal,subobra,dir,operarios,fechasStr,horasStr,trabajos,materiales);}else{if(libWorkers.length===0){toast("Añade trabajadores","error");return;}const operarios=[...new Set(libWorkers.map(w=>w.trabajador))].map(nombrePDF).join(" / ");const fechasUnicas=[...new Set(libWorkers.map(w=>w.fecha))].sort();const fechasStr=fechasUnicas.map(f=>new Date(f+"T12:00:00").toLocaleDateString("es-ES",{day:"2-digit",month:"2-digit",year:"numeric"})).join(" y ");const horasPorDia=fechasUnicas.map(f=>{const h=libWorkers.filter(w=>w.fecha===f).reduce((s,w)=>s+Number(w.horas||0),0);const fLabel=new Date(f+"T12:00:00").toLocaleDateString("es-ES",{day:"2-digit",month:"2-digit"});return h+"h ("+fLabel+")";});const horasStr=libreTotal+"h totales"+(horasPorDia.length>1?" — "+horasPorDia.join(" + "):"");generarPDFSimple(obraFinal,subobra,dir,operarios,fechasStr,horasStr,trabajos,materiales);}toast("PDF generado");}
  const inp={width:"100%",padding:"13px 14px",borderRadius:14,border:`1px solid ${T.border}`,background:T.bg2,fontFamily:T.sans,fontSize:14,color:T.text,outline:"none"};const lbl={fontFamily:T.sans,fontWeight:700,fontSize:11,color:T.text2,textTransform:"uppercase",letterSpacing:".06em",marginBottom:6,display:"block"};
  return<div style={{paddingBottom:100}}><Header title="Parte PDF" sub="Genera PDF para cliente" onBack={onClose}/><div style={{padding:"16px 16px 0",display:"flex",flexDirection:"column",gap:16}}><div style={{display:"flex",gap:8}}>{[["workly","📊 Desde Workly"],["libre","✏️ Parte nuevo"]].map(([m,l])=><button key={m} onClick={()=>setModo(m)} style={{flex:1,padding:"10px 8px",borderRadius:12,border:`1px solid ${modo===m?T.goldBorder:T.border}`,background:modo===m?T.goldDim:T.bg3,fontFamily:T.sans,fontSize:13,fontWeight:modo===m?700:500,color:modo===m?T.goldDark:T.text2,cursor:"pointer"}}>{l}</button>)}</div><div style={{position:"relative"}}><label style={lbl}>Obra</label><input value={obra||obraInput} onChange={e=>{setObraInput(e.target.value);setObra("");setShowObraSugs(true);}} onFocus={()=>setShowObraSugs(true)} placeholder="Nombre de la obra..." style={inp}/>{showObraSugs&&obraSugs.length>0&&<div style={{position:"absolute",top:"100%",left:0,right:0,background:T.bg2,border:`1px solid ${T.border}`,borderRadius:12,zIndex:50,boxShadow:T.shadowM,overflow:"hidden",marginTop:4}}>{obraSugs.map(o=><div key={o} onClick={()=>selectObra(o)} style={{padding:"11px 14px",fontFamily:T.sans,fontSize:14,color:T.text,cursor:"pointer",borderBottom:`1px solid ${T.border}`}}>{o}</div>)}</div>}</div><div><label style={lbl}>Subobra</label><input value={subobra} onChange={e=>setSubobra(e.target.value)} placeholder="Opcional..." style={inp}/></div><div style={{display:"flex",gap:10}}><div style={{flex:1}}><label style={lbl}>Desde</label><input type="date" value={fechaIni} onChange={e=>setFechaIni(e.target.value)} style={inp}/></div><div style={{flex:1}}><label style={lbl}>Hasta</label><input type="date" value={fechaFin} onChange={e=>setFechaFin(e.target.value)} style={inp}/></div></div>{modo==="workly"&&obraFinal&&<div style={{background:entries.length>0?T.goldDim:T.bg3,border:`1px solid ${entries.length>0?T.goldBorder:T.border}`,borderRadius:12,padding:"12px 14px",fontFamily:T.sans,fontSize:13,color:entries.length>0?T.goldDark:T.text3,fontWeight:600}}>{entries.length>0?`${entries.length} partes · ${total}h`:"Sin partes en este período"}</div>}{modo==="libre"&&<div style={{display:"flex",flexDirection:"column",gap:8}}><div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}><label style={{...lbl,marginBottom:0}}>Trabajadores</label><button onClick={()=>setLibWorkers(w=>[...w,{trabajador:"JCM",fecha:today(),horas:8,notas:""}])} style={{background:T.goldDim,border:`1px solid ${T.goldBorder}`,borderRadius:8,padding:"4px 12px",fontFamily:T.sans,fontSize:12,fontWeight:700,color:T.goldDark,cursor:"pointer"}}>+ Añadir</button></div>{libWorkers.map((w,i)=><div key={i} style={{background:T.bg3,borderRadius:12,padding:"10px 12px",border:`1px solid ${T.border}`,display:"flex",flexDirection:"column",gap:8}}><div style={{display:"flex",gap:8}}><select value={w.trabajador} onChange={e=>{const u=[...libWorkers];u[i]={...u[i],trabajador:e.target.value};setLibWorkers(u);}} style={{...inp,flex:2,padding:"8px 10px",fontSize:13}}>{ALL_WORKERS.map(aw=><option key={aw} value={aw}>{aw}</option>)}</select><input type="date" value={w.fecha} onChange={e=>{const u=[...libWorkers];u[i]={...u[i],fecha:e.target.value};setLibWorkers(u);}} style={{...inp,flex:2,padding:"8px 10px",fontSize:13}}/><input type="number" value={w.horas} onChange={e=>{const u=[...libWorkers];u[i]={...u[i],horas:+e.target.value};setLibWorkers(u);}} style={{...inp,flex:1,padding:"8px 6px",fontSize:13,textAlign:"center"}} min="0.5" max="24" step="0.5"/><button onClick={()=>setLibWorkers(w=>w.filter((_,j)=>j!==i))} style={{background:"none",border:"none",color:T.red,fontSize:18,cursor:"pointer",flexShrink:0}}>×</button></div><input value={w.notas} onChange={e=>{const u=[...libWorkers];u[i]={...u[i],notas:e.target.value};setLibWorkers(u);}} placeholder="Notas..." style={{...inp,padding:"8px 10px",fontSize:13}}/></div>)}{libWorkers.length>0&&<div style={{fontFamily:T.sans,fontSize:13,color:T.goldDark,fontWeight:700,textAlign:"right"}}>Total: {libreTotal}h</div>}</div>}<div><label style={lbl}>Dirección</label><input value={dir} onChange={e=>setDir(e.target.value)} placeholder="Av. de la Llum 12, Barcelona..." style={inp}/></div><div><label style={lbl}>Trabajos realizados</label><textarea value={trabajos} onChange={e=>setTrabajos(e.target.value)} rows={3} placeholder="Descripción..." style={{...inp,resize:"vertical"}}/></div><div><label style={lbl}>Materiales</label><textarea value={materiales} onChange={e=>setMateriales(e.target.value)} rows={3} placeholder="Lista de materiales..." style={{...inp,resize:"vertical"}}/></div><Btn onClick={handleGenerar} style={{width:"100%",padding:"16px",fontSize:16,marginTop:4}}>🖨 Generar PDF parte</Btn></div></div>;
}

// ── APP ROOT ──────────────────────────────────────────────────────────────────
function App(){
  const init=loadState();
  const[data,setDataRaw]=useState(init.data);const[festivos,setFestivosRaw]=useState(init.festivos);const[adminOverrides,setAdminOverridesRaw]=useState(init.adminOverrides);const[fichajes,setFichajesRaw]=useState(init.fichajes);const[accounts,setAccountsRaw]=useState(init.accounts);const[ausencias,setAusenciasRaw]=useState(init.ausencias);
  const[obrasMeta,setObrasMetaRaw]=useState(()=>{try{return JSON.parse(localStorage.getItem("wk_obras_meta")||"{}");}catch(e){return{};}});
  const[session,setSession]=useState(init.session);const[tab,setTab]=useState("dashboard");
  const[modalObra,setModalObra]=useState(null);const[modalWorker,setModalWorker]=useState(null);const[modalParte,setModalParte]=useState(null);const[editParte,setEditParte]=useState(null);const[prefillNuevo,setPrefillNuevo]=useState(null);
  const[showParteFormal,setShowParteFormal]=useState(false);const[showCfg,setShowCfg]=useState(false);
  const[toastShow,toastEl]=useToast();

  function setData(v){setDataRaw(v);localStorage.setItem("wk_data",JSON.stringify(v));}
  function setFestivos(v){setFestivosRaw(v);localStorage.setItem("wk_fest",JSON.stringify(v));}
  function setAdminOverrides(v){setAdminOverridesRaw(v);localStorage.setItem("wk_adm",JSON.stringify(v));}
  function setFichajes(v){setFichajesRaw(v);localStorage.setItem("wk_fichajes",JSON.stringify(v));}
  function setAccounts(v){setAccountsRaw(v);localStorage.setItem("wk_accounts",JSON.stringify(v));}
  function setAusencias(v){setAusenciasRaw(v);localStorage.setItem("wk_ausencias",JSON.stringify(v));}
  function setObrasMeta(v){setObrasMetaRaw(v);localStorage.setItem("wk_obras_meta",JSON.stringify(v));}

  function handleLogin(s){setSession(s);localStorage.setItem("wk_session",JSON.stringify(s));setTab(s.isAdmin?"dashboard":"miperfil");}
  function handleLogout(){setSession(null);localStorage.removeItem("wk_session");setTab("dashboard");}

  function handleSaveParte(e){if(editParte){const upd=data.map(x=>x.id===editParte.id?{...editParte,...e}:x);setData(upd);toastShow("Parte actualizado");setEditParte(null);setModalParte(null);}else{const newId=Math.max(0,...data.map(x=>x.id))+1;const upd=[...data,{...e,id:newId}];setData(upd);toastShow("Parte guardado");}setTab("partes");setPrefillNuevo(null);}
  function handleDeleteParte(id){setData(data.filter(e=>e.id!==id));toastShow("Parte eliminado","warning");setModalParte(null);}

  function generateResumenPDF(){const now=new Date();const yr=now.getFullYear(),mo=now.getMonth();const mesData=data.filter(e=>{const d=new Date(e.fecha+"T12:00:00");return d.getFullYear()===yr&&d.getMonth()===mo;});const mnArr=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];const{jsPDF}=window.jspdf;const doc=new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});const W=210,PL=15,PR=15,CW=W-PL-PR;doc.setFillColor(26,22,18);doc.rect(0,0,W,22,"F");doc.setTextColor(255,255,255);doc.setFontSize(14);doc.setFont("helvetica","bold");doc.text("RIBASESEDOS · Resumen mensual",PL,10);doc.setFontSize(9);doc.setFont("helvetica","normal");doc.text(mnArr[mo]+" "+now.getFullYear(),PL,16);doc.text(new Date().toLocaleDateString("es-ES"),W-PR,16,{align:"right"});let y=28;ALL_WORKERS.forEach(w=>{const we=mesData.filter(e=>e.trabajador===w);if(we.length===0)return;const th=we.reduce((s,e)=>s+e.horas,0);if(y>240){doc.addPage();y=15;}doc.setFillColor(238,233,223);doc.rect(PL,y,CW,8,"F");doc.setDrawColor(201,168,76);doc.setLineWidth(0.8);doc.line(PL,y,PL,y+8);doc.setTextColor(26,22,18);doc.setFontSize(10);doc.setFont("helvetica","bold");doc.text(nombrePDF(w),PL+5,y+5.5);doc.setTextColor(168,134,58);doc.text(th+"h",W-PR,y+5.5,{align:"right"});y+=8;const rows=[...we].sort((a,b)=>a.fecha.localeCompare(b.fecha)).map(e=>[e.fecha,e.obra,e.subobra||"",e.horas+"h",getHT(e,festivos)==="n"?"Normal":getHT(e,festivos)==="e"?"Extra":getHT(e,festivos)==="f"?"Festivo":"Sábado"]);doc.autoTable({startY:y,head:[["Fecha","Obra","Subobra","Horas","Tipo"]],body:rows,margin:{left:PL,right:PR},styles:{fontSize:8,cellPadding:2,textColor:[26,22,18]},headStyles:{fillColor:[245,240,232],textColor:[122,110,95],fontStyle:"bold",fontSize:7}});y=doc.lastAutoTable.finalY+6;});mostrarPDF(doc.output("blob"),"Resumen mensual");}

  if(!session)return<><LoginScreen accounts={accounts} onLogin={handleLogin}/>{toastEl}</>;

  const sortedData=[...data].sort((a,b)=>b.fecha.localeCompare(a.fecha)||b.id-a.id);
  const commonProps={data:sortedData,festivos,session,adminOverrides,ausencias,fichajes,accounts};

  function renderTab(){
    if(showParteFormal)return<ParteFormaScreen data={sortedData} festivos={festivos} obrasMeta={obrasMeta} setObrasMeta={setObrasMeta} onClose={()=>setShowParteFormal(false)} toast={toastShow}/>;
    switch(tab){
      case"dashboard":return<Dashboard {...commonProps} setTab={t=>{setShowParteFormal(false);setTab(t);}} onSelectWorker={w=>setModalWorker(w)} onSelectObra={o=>setModalObra(o)}/>;
      case"miperfil":return<MiPerfil {...commonProps} onLogout={handleLogout}/>;
      case"partes":return<PartesList {...commonProps} onSelectParte={p=>{setModalParte(p);setEditParte(null);}}/>;
      case"nuevo":return<NuevoParte obrasMeta={obrasMeta} {...commonProps} onSave={handleSaveParte} prefill={prefillNuevo} toast={toastShow}/>;
      case"fichar":return<FicharScreen {...commonProps} onSave={handleSaveParte} toast={toastShow} obrasMeta={obrasMeta}/>;
      case"equipo":return<EquipoList {...commonProps} onSelectWorker={w=>setModalWorker(w)}/>;
      case"obras":return<ObrasList obrasMeta={obrasMeta} data={sortedData} session={session} onSelectObra={o=>setModalObra(o)}/>;
      case"cal":return<CalendarView {...commonProps} ausencias={ausencias} setAusencias={setAusencias} toast={toastShow}/>;
      case"trastero":return<TrasteroScreen session={session}/>;
      default:return null;
    }
  }

  return(
    <div style={{maxWidth:520,margin:"0 auto",minHeight:"100vh",background:T.bg,position:"relative"}}>
      {renderTab()}
      {session.isAdmin&&tab==="partes"&&!showParteFormal&&(
        <div style={{position:"fixed",bottom:70,right:16,display:"flex",flexDirection:"column",gap:8,zIndex:90}}>
          <button onClick={()=>setShowParteFormal(true)} style={{background:T.bg2,border:`1px solid ${T.border}`,borderRadius:12,padding:"8px 14px",fontFamily:T.sans,fontSize:12,fontWeight:700,color:T.text,cursor:"pointer",boxShadow:T.shadowM}}>📄 Parte PDF</button>
          <button onClick={generateResumenPDF} style={{background:T.bg2,border:`1px solid ${T.border}`,borderRadius:12,padding:"8px 14px",fontFamily:T.sans,fontSize:12,fontWeight:700,color:T.text,cursor:"pointer",boxShadow:T.shadowM}}>🖨 PDF Mes</button>
        </div>
      )}
      <NavBar tab={tab} setTab={t=>{setShowParteFormal(false);setTab(t);}} isAdmin={session.isAdmin} onOpenCfg={()=>setShowCfg(true)}/>
      {showCfg&&(
        <div style={{position:"fixed",inset:0,background:"rgba(26,22,18,0.55)",zIndex:1000,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={e=>{if(e.target===e.currentTarget)setShowCfg(false);}}>
          <div style={{background:T.bg2,borderRadius:"20px 20px 0 0",width:"100%",maxWidth:520,maxHeight:"92vh",overflowY:"auto",boxShadow:T.shadowL,paddingBottom:"env(safe-area-inset-bottom,16px)"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"18px 20px 12px",borderBottom:`1px solid ${T.border}`,position:"sticky",top:0,background:T.bg2,zIndex:1}}><span style={{fontFamily:T.display,fontWeight:900,fontSize:18,color:T.text}}>Configuración</span><button onClick={()=>setShowCfg(false)} style={{background:T.bg3,border:"none",borderRadius:8,width:30,height:30,cursor:"pointer",fontSize:16,color:T.text2}}>✕</button></div>
            <div style={{padding:"0 0 16px"}}><ConfigScreen {...commonProps} setFestivos={setFestivos} setAdminOverrides={setAdminOverrides} setData={setData} setAccounts={setAccounts} toast={toastShow} onLogout={()=>{handleLogout();setShowCfg(false);}}/></div>
          </div>
        </div>
      )}
      {modalObra&&<ObraModal obraName={modalObra} data={sortedData} festivos={festivos} adminOverrides={adminOverrides} session={session} onClose={()=>setModalObra(null)} obrasMeta={obrasMeta} setObrasMeta={setObrasMeta}/>}
      {modalWorker&&<WorkerModal workerName={modalWorker} data={sortedData} festivos={festivos} session={session} ausencias={ausencias} onClose={()=>setModalWorker(null)}/>}
      {modalParte&&!editParte&&<ParteModal parte={modalParte} data={sortedData} festivos={festivos} session={session} onClose={()=>setModalParte(null)} onDelete={handleDeleteParte} onEdit={p=>{setEditParte(p);setModalParte(null);setTab("nuevo");setPrefillNuevo(p);}}/>}
      {toastEl}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
