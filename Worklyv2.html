function CalendarView({data,festivos,allWorkers,currentUser,isAdmin,onDayClick}){
  const [calDate,setCalDate]=useState(new Date());
  const [wFilter,setWFilter]=useState(isAdmin?"":currentUser.name);
  const [festivoInfo,setFestivoInfo]=useState(null); // {nombre,fecha}
  const MONS=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
  const DAYS=["L","M","X","J","V","S","D"];
  const todayStr=today();const y=calDate.getFullYear(),m=calDate.getMonth();
  const dow=new Date(y,m,1).getDay()-1<0?6:new Date(y,m,1).getDay()-1;
  const days=new Date(y,m+1,0).getDate();
  const getFestivoNombre=fecha=>{
    if(isSunday(fecha))return"Domingo";
    const f=festivos.find(x=>x.fecha===fecha);
    return f?.nombre||"Festivo";
  };
  const cells=[];for(let i=0;i<dow;i++)cells.push(null);
  for(let d=1;d<=days;d++){
    const fecha=`${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const entries=data.filter(e=>e.fecha===fecha&&(!wFilter||e.trabajador===wFilter));
    const totalH=entries.reduce((s,e)=>s+e.horas,0);
    const ws=[...new Set(entries.map(e=>e.trabajador))].slice(0,6);
    const fest=isFestivo(fecha,festivos);
    const festNombre=fest?getFestivoNombre(fecha):"";
    cells.push({d,fecha,entries,totalH,ws,isToday:fecha===todayStr,isFest:fest,festNombre});
  }
  return(
    <div style={{padding:"0 0 80px",fontFamily:T.sans}}>
      <div style={{padding:"22px 18px 4px"}}><h2 style={{fontSize:"2rem",fontWeight:700,textTransform:"uppercase",letterSpacing:"-.02em",margin:0}}>CALENDARIO</h2></div>

      {/* Modal nombre festivo */}
      {festivoInfo&&(
        <div onClick={()=>setFestivoInfo(null)} style={{position:"fixed",inset:0,zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(0,0,0,.6)"}}>
          <div onClick={e=>e.stopPropagation()} style={{background:T.bg2,border:`1px solid rgba(168,85,247,.4)`,borderRadius:16,padding:"24px 28px",textAlign:"center",maxWidth:280,width:"90%"}}>
            <div style={{fontSize:"2rem",marginBottom:8}}>🎉</div>
            <div style={{fontWeight:700,fontSize:"1.1rem",color:"#c084fc",marginBottom:6}}>{festivoInfo.nombre}</div>
            <div style={{fontSize:".75rem",color:T.text2,marginBottom:18}}>{festivoInfo.fecha.split("-").reverse().join("/")}</div>
            <button onClick={()=>setFestivoInfo(null)} style={{background:T.bg3,border:`1px solid ${T.border}`,color:T.text,borderRadius:9,padding:"8px 24px",fontSize:".85rem",cursor:"pointer",fontFamily:T.sans}}>Cerrar</button>
          </div>
        </div>
      )}

      <div style={{padding:"14px 18px"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
          <button onClick={()=>setCalDate(new Date(y,m-1,1))} style={{background:T.bg3,border:`1px solid ${T.border}`,color:T.text,borderRadius:9,padding:"6px 14px",cursor:"pointer",fontFamily:T.sans,fontSize:".8rem"}}>Ant</button>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            {isAdmin&&<select value={wFilter} onChange={e=>setWFilter(e.target.value)} style={{background:T.bg3,border:`1px solid ${T.border}`,color:wFilter?T.text:T.text2,fontFamily:T.sans,fontSize:".75rem",padding:"6px 10px",borderRadius:8,outline:"none"}}>
              <option value="">Todos</option>{allWorkers.map(w=><option key={w} value={w}>{w}</option>)}
            </select>}
            <strong style={{fontSize:"1.1rem",fontWeight:700,textTransform:"uppercase",letterSpacing:"-.02em"}}>{MONS[m]} {y}</strong>
          </div>
          <button onClick={()=>setCalDate(new Date(y,m+1,1))} style={{background:T.bg3,border:`1px solid ${T.border}`,color:T.text,borderRadius:9,padding:"6px 14px",cursor:"pointer",fontFamily:T.sans,fontSize:".8rem"}}>Sig</button>
        </div>
        {/* Leyenda */}
        <div style={{display:"flex",gap:12,marginBottom:10,fontSize:".6rem",color:T.text2}}>
          <span style={{display:"flex",alignItems:"center",gap:4}}><span style={{width:10,height:10,borderRadius:3,background:"rgba(168,85,247,.35)",display:"inline-block"}}/>Festivo</span>
          <span style={{display:"flex",alignItems:"center",gap:4}}><span style={{width:10,height:10,borderRadius:3,border:`1px solid ${T.yellow}`,display:"inline-block"}}/>Hoy</span>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:2}}>
          {DAYS.map(d=><div key={d} style={{textAlign:"center",fontSize:".56rem",fontWeight:700,textTransform:"uppercase",color:T.text3,padding:"3px 0"}}>{d}</div>)}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2}}>
          {cells.map((c,i)=>c===null?<div key={i} style={{minHeight:52}}/>:(
            <div key={i} onClick={()=>{
              if(c.isFest)setFestivoInfo({nombre:c.festNombre,fecha:c.fecha});
              else if(c.entries.length>0)onDayClick(c.fecha,c.entries);
            }} style={{minHeight:52,padding:4,background:c.isFest?"rgba(168,85,247,.18)":T.bg2,border:`2px solid ${c.isToday?T.yellow:c.isFest?"rgba(168,85,247,.6)":T.border}`,borderRadius:7,cursor:(c.isFest||c.entries.length>0)?"pointer":"default",position:"relative"}}>
              <div style={{fontSize:".7rem",fontWeight:700,color:c.isFest?"#c084fc":c.isToday?T.yellow:T.text2}}>{c.d}</div>
              {c.isFest&&<div style={{fontSize:".42rem",color:"#c084fc",lineHeight:1.1,marginTop:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.festNombre}</div>}
              <div style={{display:"flex",gap:2,flexWrap:"wrap",marginTop:2}}>{c.ws.map(w=><div key={w} style={{width:4,height:4,borderRadius:"50%",background:workerColor(w,allWorkers)}}/>)}</div>
              {c.totalH>0&&<div style={{fontFamily:T.mono,fontSize:".54rem",color:T.yellow,position:"absolute",bottom:2,right:4}}>{c.totalH.toFixed(0)}h</div>}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ─── AUSENCIAS ────────────────────────────────────────────────────────────────
const AUSENCIA_TIPOS={
  vacaciones:{label:"Vacaciones",icon:"🏖",color:"#4da6ff"},
  fiesta:{label:"Día festivo",icon:"🎉",color:"#a855f7"},
  permiso:{label:"Permiso",icon:"⏱",color:"#ff8800"},
};

function AusenciasScreen({currentUser,isAdmin,ausencias,setAusencias,allWorkers,toast}){
  const [vista,setVista]=useState(isAdmin?"pendientes":"mis");
  const [form,setForm]=useState(null);
  const [mes,setMes]=useState(()=>{const n=new Date();return{y:n.getFullYear(),m:n.getMonth()};});

  // ── Alertas próximas para admin ───────────────────────────────────────────
  const alertasProximas=React.useMemo(()=>{
    if(!isAdmin)return[];
    const hoy=new Date();hoy.setHours(0,0,0,0);
    const diaSemana=hoy.getDay(); // 0=dom,5=vie
    const alerts=[];
    const aprobadas=ausencias.filter(a=>a.estado==="aprobada");
    aprobadas.forEach(a=>{
      const inicio=new Date(a.fechaInicio+"T00:00:00");
      const diffDias=Math.round((inicio-hoy)/(1000*60*60*24));
      const tipo=AUSENCIA_TIPOS[a.tipo]||{};
      if(a.tipo==="permiso"){
        // Alerta el día anterior
        if(diffDias===1){
          alerts.push({nivel:"rojo",msg:`Mañana · ${a.trabajador} tiene permiso${a.hora?" ("+a.hora+")":""}`,a});
        }
        if(diffDias===0){
          alerts.push({nivel:"rojo",msg:`HOY · ${a.trabajador} tiene permiso${a.hora?" ("+a.hora+")":""}`,a});
        }
      } else {
        // vacaciones o fiesta: avisar 7 días antes
        if(diffDias>0&&diffDias<=7){
          alerts.push({nivel:diffDias<=2?"rojo":"amarillo",msg:`En ${diffDias} día${diffDias===1?"":"s"} · ${a.trabajador} — ${tipo.label}${a.tipo==="vacaciones"?" hasta "+a.fechaFin:""}`,a});
        }
        // Viernes antes de que empiece (aunque falten más de 7 días)
        if(diaSemana===5&&diffDias>0&&diffDias<=3){
          // ya lo cubre el bloque anterior, no duplicar
        }
        if(diffDias===0){
          alerts.push({nivel:"rojo",msg:`HOY empieza · ${a.trabajador} — ${tipo.label}`,a});
        }
      }
    });
    // Ordenar: rojo primero
    return alerts.sort((a,b)=>a.nivel==="rojo"&&b.nivel!=="rojo"?-1:1);
  },[ausencias,isAdmin]);

  const saveAusencia=()=>{
    if(!form?.tipo){toast("Selecciona tipo");return;}
    if(!form.fechaInicio){toast("Indica la fecha");return;}
    if(!form.motivo?.trim()){toast("Añade un motivo");return;}
    const nueva={
      id:Date.now(),trabajador:currentUser.name,tipo:form.tipo,
      fechaInicio:form.fechaInicio,
      fechaFin:form.tipo==="vacaciones"?(form.fechaFin||form.fechaInicio):form.fechaInicio,
      hora:form.hora||"",motivo:form.motivo.trim(),
      estado:"pendiente",creadoEn:new Date().toISOString(),
    };
    const upd=[...ausencias,nueva];
    setAusencias(upd);localStorage.setItem("wk_ausencias",JSON.stringify(upd));
    setForm(null);setVista("mis");toast("Solicitud enviada ✓");
  };

  const responder=(id,estado)=>{
    const upd=ausencias.map(a=>a.id===id?{...a,estado,respondidoEn:new Date().toISOString()}:a);
    setAusencias(upd);localStorage.setItem("wk_ausencias",JSON.stringify(upd));
    toast(estado==="aprobada"?"✓ Aprobada":"✗ Rechazada");
  };

  const eliminar=id=>{
    if(!confirm("¿Cancelar solicitud?"))return;
    const upd=ausencias.filter(a=>a.id!==id);
    setAusencias(upd);localStorage.setItem("wk_ausencias",JSON.stringify(upd));
    toast("Cancelada");
  };

  const misAusencias=ausencias.filter(a=>a.trabajador===currentUser.name).sort((a,b)=>b.creadoEn.localeCompare(a.creadoEn));
  const pendientes=ausencias.filter(a=>a.estado==="pendiente").sort((a,b)=>a.creadoEn.localeCompare(b.creadoEn));
  const fmtF=f=>{if(!f)return"";const p=f.split("-");const mn=["","Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];return`${+p[2]} ${mn[+p[1]]}`;};
  const fmtRango=a=>a.fechaInicio===a.fechaFin?fmtF(a.fechaInicio):`${fmtF(a.fechaInicio)} → ${fmtF(a.fechaFin)}`;

  const wColors={};
  allWorkers.forEach((w,i)=>{const cols=["#4da6ff","#00d68f","#ff8800","#a855f7","#ff5555","#f5c518","#ff88cc","#44ffdd"];wColors[w]=cols[i%cols.length];});

  const renderCalendario=()=>{
    const {y,m}=mes;
    const firstDay=new Date(y,m,1).getDay();
    const daysInMonth=new Date(y,m+1,0).getDate();
    const offset=(firstDay+6)%7;
    const mNames=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
    const aprobadas=ausencias.filter(a=>a.estado==="aprobada");
    const getDayAus=day=>{
      const ds=`${y}-${String(m+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
      return aprobadas.filter(a=>ds>=a.fechaInicio&&ds<=a.fechaFin);
    };
    const cells=[];
    for(let i=0;i<offset;i++)cells.push(null);
    for(let d=1;d<=daysInMonth;d++)cells.push(d);
    const today=new Date();
    return(
      <div>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
          <button onClick={()=>setMes(({y,m})=>m===0?{y:y-1,m:11}:{y,m:m-1})} style={{background:T.bg3,border:`1px solid ${T.border}`,color:T.text,borderRadius:7,padding:"5px 14px",cursor:"pointer",fontSize:"1rem"}}>‹</button>
          <div style={{fontWeight:700,fontSize:"1rem"}}>{mNames[m]} {y}</div>
          <button onClick={()=>setMes(({y,m})=>m===11?{y:y+1,m:0}:{y,m:m+1})} style={{background:T.bg3,border:`1px solid ${T.border}`,color:T.text,borderRadius:7,padding:"5px 14px",cursor:"pointer",fontSize:"1rem"}}>›</button>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:8}}>
          {["L","M","X","J","V","S","D"].map(d=><div key={d} style={{textAlign:"center",fontSize:".55rem",color:T.text3,fontWeight:700,padding:"3px 0"}}>{d}</div>)}
          {cells.map((day,i)=>{
            if(!day)return<div key={"e"+i}/>;
            const da=getDayAus(day);
            const isHoy=today.getDate()===day&&today.getMonth()===m&&today.getFullYear()===y;
            return(
              <div key={day} style={{minHeight:38,background:isHoy?"rgba(245,197,24,.08)":T.bg3,border:isHoy?`1px solid ${T.yellowBorder}`:`1px solid ${T.border}`,borderRadius:5,padding:"3px 2px",display:"flex",flexDirection:"column",alignItems:"center",gap:1}}>
                <span style={{fontSize:".6rem",color:isHoy?T.yellow:T.text2,fontWeight:isHoy?700:400}}>{day}</span>
                {da.slice(0,3).map(a=><div key={a.id} title={`${a.trabajador} · ${AUSENCIA_TIPOS[a.tipo]?.label}`} style={{width:"90%",height:4,borderRadius:2,background:wColors[a.trabajador]||T.text2}}/>)}
                {da.length>3&&<div style={{fontSize:".45rem",color:T.text3}}>+{da.length-3}</div>}
              </div>
            );
          })}
        </div>
        <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:8}}>
          {allWorkers.filter(w=>aprobadas.some(a=>a.trabajador===w)).map(w=>(
            <div key={w} style={{display:"flex",alignItems:"center",gap:4,fontSize:".62rem",color:T.text2}}>
              <div style={{width:10,height:10,borderRadius:2,background:wColors[w]}}/>
              <span>{w.split(" ")[0]}</span>
            </div>
          ))}
        </div>
        {aprobadas.length===0&&<div style={{textAlign:"center",padding:"20px 0",color:T.text3,fontSize:".8rem"}}>No hay ausencias aprobadas este mes</div>}
      </div>
    );
  };

  const estadoStyles={
    pendiente:{bg:"rgba(245,197,24,.1)",color:T.yellow,label:"Pendiente"},
    aprobada:{bg:"rgba(0,214,143,.1)",color:T.green,label:"Aprobada ✓"},
    rechazada:{bg:"rgba(255,85,85,.1)",color:T.red,label:"Rechazada ✗"},
  };

  const renderTarjeta=(a,showWorker=false)=>{
    const tipo=AUSENCIA_TIPOS[a.tipo]||{icon:"❓",label:a.tipo};
    const est=estadoStyles[a.estado]||estadoStyles.pendiente;
    return(
      <div key={a.id} style={{background:T.bg3,border:`1px solid ${T.border}`,borderRadius:11,padding:14,marginBottom:8}}>
        <div style={{display:"flex",alignItems:"flex-start",gap:10,marginBottom:8}}>
          <span style={{fontSize:"1.3rem",flexShrink:0}}>{tipo.icon}</span>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontWeight:700,fontSize:".88rem"}}>{tipo.label}</div>
            {showWorker&&<div style={{fontSize:".7rem",color:T.text2,marginTop:1}}>{a.trabajador}</div>}
            <div style={{fontSize:".72rem",color:T.text2,marginTop:2}}>{fmtRango(a)}{a.hora?` · ${a.hora}`:""}</div>
            <div style={{fontSize:".78rem",color:T.text,marginTop:5,fontStyle:"italic"}}>"{a.motivo}"</div>
          </div>
          <span style={{background:est.bg,color:est.color,borderRadius:20,fontSize:".58rem",fontWeight:700,padding:"3px 8px",whiteSpace:"nowrap",flexShrink:0}}>{est.label}</span>
        </div>
        {isAdmin&&a.estado==="pendiente"&&(
          <div style={{display:"flex",gap:7}}>
            <button onClick={()=>responder(a.id,"aprobada")} style={{flex:1,background:"rgba(0,214,143,.12)",border:"1px solid rgba(0,214,143,.3)",color:T.green,borderRadius:8,padding:"8px 0",fontSize:".8rem",fontWeight:700,cursor:"pointer",fontFamily:T.sans}}>✓ Aprobar</button>
            <button onClick={()=>responder(a.id,"rechazada")} style={{flex:1,background:"rgba(255,85,85,.08)",border:"1px solid rgba(255,85,85,.25)",color:T.red,borderRadius:8,padding:"8px 0",fontSize:".8rem",fontWeight:700,cursor:"pointer",fontFamily:T.sans}}>✗ Rechazar</button>
          </div>
        )}
        {!isAdmin&&a.estado==="pendiente"&&(
          <button onClick={()=>eliminar(a.id)} style={{background:"none",border:"none",color:T.text3,fontSize:".68rem",cursor:"pointer",fontFamily:T.sans,padding:"4px 0"}}>Cancelar solicitud</button>
        )}
      </div>
    );
  };

  const vistasTabs=isAdmin?[
    {id:"pendientes",label:`Pendientes${pendientes.length>0?" ("+pendientes.length+")":""}` },
    {id:"calendario",label:"Calendario"},
    {id:"historial",label:"Historial"},
    {id:"mis",label:"Mis aus."},
    {id:"nueva",label:"＋ Nueva"},
  ]:[
    {id:"mis",label:"Mis solicitudes"},
    {id:"nueva",label:"＋ Nueva"},
  ];

  return(
    <div style={{padding:"0 0 80px",fontFamily:T.sans}}>
      <div style={{padding:"22px 18px 4px"}}>
        <h2 style={{fontSize:"2rem",fontWeight:700,textTransform:"uppercase",letterSpacing:"-.02em",margin:0}}>AUSENCIAS</h2>
        <div style={{fontSize:".72rem",color:T.text2,marginTop:3}}>{isAdmin?"Gestión del equipo · aprueba o rechaza solicitudes":"Solicita vacaciones, permisos y festivos"}</div>
      </div>

      {isAdmin&&alertasProximas.length>0&&(
        <div style={{margin:"12px 18px 0"}}>
          {alertasProximas.map((al,i)=>{
            const esRojo=al.nivel==="rojo";
            return(
              <div key={i} style={{display:"flex",alignItems:"center",gap:10,background:esRojo?"rgba(255,85,85,.08)":"rgba(245,197,24,.07)",border:`1px solid ${esRojo?"rgba(255,85,85,.3)":"rgba(245,197,24,.25)"}`,borderRadius:10,padding:"10px 14px",marginBottom:6}}>
                <span style={{fontSize:"1.1rem",flexShrink:0}}>{esRojo?"🔴":"🟡"}</span>
                <div style={{flex:1,fontSize:".78rem",color:esRojo?T.red:T.yellow,fontWeight:600}}>{al.msg}</div>
              </div>
            );
          })}
        </div>
      )}
      <div style={{display:"flex",margin:"14px 18px 0",background:T.bg2,border:`1px solid ${T.border}`,borderRadius:10,padding:3,gap:2,overflowX:"auto"}}>
        {vistasTabs.map(v=>(
          <button key={v.id} onClick={()=>setVista(v.id)} style={{flexShrink:0,background:vista===v.id?T.bg4:"none",border:vista===v.id?`1px solid ${T.border}`:"1px solid transparent",color:vista===v.id?T.yellow:T.text2,borderRadius:8,padding:"7px 10px",fontSize:".68rem",fontWeight:700,cursor:"pointer",fontFamily:T.sans,whiteSpace:"nowrap"}}>{v.label}</button>
        ))}
      </div>
      <div style={{padding:"14px 18px"}}>
        {isAdmin&&vista==="pendientes"&&(pendientes.length===0?<div style={{textAlign:"center",padding:"40px 0",color:T.text3,fontSize:".85rem"}}>🎉 No hay solicitudes pendientes</div>:pendientes.map(a=>renderTarjeta(a,true)))}
        {isAdmin&&vista==="calendario"&&renderCalendario()}
        {isAdmin&&vista==="historial"&&([...ausencias].sort((a,b)=>b.creadoEn.localeCompare(a.creadoEn)).map(a=>renderTarjeta(a,true)))}
        {vista==="mis"&&(misAusencias.length===0?<div style={{textAlign:"center",padding:"40px 0",color:T.text3,fontSize:".85rem"}}>No tienes solicitudes aún.<br/><span style={{fontSize:".75rem",color:T.text3}}>Pulsa "＋ Nueva" para crear una.</span></div>:misAusencias.map(a=>renderTarjeta(a,false)))}
        {vista==="nueva"&&(
          <div style={{background:T.bg2,border:`1px solid ${T.border}`,borderRadius:13,padding:18}}>
            <div style={{marginBottom:14}}>
              <label style={{display:"block",fontSize:".6rem",fontWeight:700,textTransform:"uppercase",color:T.text3,marginBottom:8}}>Tipo de solicitud</label>
              <div style={{display:"flex",flexDirection:"column",gap:7}}>
                {Object.entries(AUSENCIA_TIPOS).map(([k,v])=>(
                  <button key={k} onClick={()=>setForm(f=>({...(f||{fechaInicio:"",fechaFin:"",hora:"",motivo:""}),tipo:k}))} style={{display:"flex",alignItems:"center",gap:12,background:form?.tipo===k?"rgba(245,197,24,.07)":T.bg3,border:`1px solid ${form?.tipo===k?T.yellowBorder:T.border}`,borderRadius:9,padding:"11px 14px",cursor:"pointer",fontFamily:T.sans,textAlign:"left"}}>
                    <span style={{fontSize:"1.4rem"}}>{v.icon}</span>
                    <div><div style={{fontWeight:700,fontSize:".88rem",color:form?.tipo===k?T.yellow:T.text}}>{v.label}</div><div style={{fontSize:".65rem",color:T.text2,marginTop:2}}>{k==="vacaciones"?"Rango de días":k==="fiesta"?"Día libre puntual":"Entrada tarde o salida antes"}</div></div>
                  </button>
                ))}
              </div>
            </div>
            {form?.tipo&&<>
              <div style={{marginBottom:10}}>
                <label style={{display:"block",fontSize:".6rem",fontWeight:700,textTransform:"uppercase",color:T.text3,marginBottom:4}}>{form.tipo==="vacaciones"?"Fecha inicio":"Fecha"}</label>
                <input type="date" value={form.fechaInicio||""} onChange={e=>setForm(f=>({...f,fechaInicio:e.target.value}))} style={{width:"100%",background:T.bg3,border:`1px solid ${T.border}`,color:T.text,fontFamily:T.sans,fontSize:".83rem",padding:"9px 11px",borderRadius:9,outline:"none"}}/>
              </div>
              {form.tipo==="vacaciones"&&<div style={{marginBottom:10}}>
                <label style={{display:"block",fontSize:".6rem",fontWeight:700,textTransform:"uppercase",color:T.text3,marginBottom:4}}>Fecha fin</label>
                <input type="date" value={form.fechaFin||""} onChange={e=>setForm(f=>({...f,fechaFin:e.target.value}))} style={{width:"100%",background:T.bg3,border:`1px solid ${T.border}`,color:T.text,fontFamily:T.sans,fontSize:".83rem",padding:"9px 11px",borderRadius:9,outline:"none"}}/>
              </div>}
              {form.tipo==="permiso"&&<div style={{marginBottom:10}}>
                <label style={{display:"block",fontSize:".6rem",fontWeight:700,textTransform:"uppercase",color:T.text3,marginBottom:4}}>Horario especial</label>
                <input value={form.hora||""} onChange={e=>setForm(f=>({...f,hora:e.target.value}))} placeholder="Ej: Entrada a las 10:00 / Salida a las 15:00" style={{width:"100%",background:T.bg3,border:`1px solid ${T.border}`,color:T.text,fontFamily:T.sans,fontSize:".83rem",padding:"9px 11px",borderRadius:9,outline:"none"}}/>
              </div>}
              <div style={{marginBottom:14}}>
                <label style={{display:"block",fontSize:".6rem",fontWeight:700,textTransform:"uppercase",color:T.text3,marginBottom:4}}>Motivo</label>
                <textarea value={form.motivo||""} onChange={e=>setForm(f=>({...f,motivo:e.target.value}))} placeholder="Explica brevemente el motivo..." rows={3} style={{width:"100%",background:T.bg3,border:`1px solid ${T.border}`,color:T.text,fontFamily:T.sans,fontSize:".83rem",padding:"9px 11px",borderRadius:9,outline:"none",resize:"vertical",boxSizing:"border-box"}}/>
              </div>
              <div style={{display:"flex",gap:8}}>
                <button onClick={saveAusencia} style={{background:T.yellow,color:"#000",border:"none",borderRadius:9,padding:"10px 22px",fontSize:".85rem",fontWeight:700,cursor:"pointer",fontFamily:T.sans}}>Enviar solicitud</button>
                <button onClick={()=>setForm(null)} style={{background:T.bg3,border:`1px solid ${T.border}`,color:T.text,borderRadius:9,padding:"10px 16px",fontSize:".85rem",cursor:"pointer",fontFamily:T.sans}}>Cancelar</button>
              </div>
            </>}
          </div>
        )}
      </div>
    </div>
  );
}

function NavBar({tab,setTab,isAdmin,pendientes}){
  const adminTabs=[
    {id:"dashboard",icon:"📊",label:"Dash"},
    {id:"partes",icon:"📋",label:"Partes"},
    {id:"nuevo",icon:"＋",label:"Nuevo"},
    {id:"ausencias",icon:"🏖",label:"Aus.",badge:pendientes>0?pendientes:0},
    {id:"obras",icon:"🏗",label:"Obras"},
    {id:"cal",icon:"📅",label:"Cal"},
    {id:"cfg",icon:"⚙",label:"Admin"},
  ];
  const workerTabs=[
    {id:"miperfil",icon:"👤",label:"Perfil"},
    {id:"partes",icon:"📋",label:"Partes"},
    {id:"nuevo",icon:"＋",label:"Nuevo"},
    {id:"ausencias",icon:"🏖",label:"Aus."},
    {id:"cal",icon:"📅",label:"Cal"},
    {id:"cfg",icon:"⚙",label:"Config"},
  ];
  const tabs=isAdmin?adminTabs:workerTabs;
  return(
    <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:520,background:T.bg2,borderTop:`1px solid ${T.border}`,display:"flex",zIndex:100}}>
      {tabs.map(t=>(
        <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,background:"none",border:"none",cursor:"pointer",padding:"8px 0 10px",display:"flex",flexDirection:"column",alignItems:"center",gap:2,fontFamily:T.sans,position:"relative"}}>
          <span style={{fontSize:"1rem"}}>{t.icon}</span>
          {t.badge>0&&<span style={{position:"absolute",top:4,right:"calc(50% - 14px)",background:T.red,color:"#fff",borderRadius:99,fontSize:".45rem",fontWeight:700,padding:"1px 4px",minWidth:14,textAlign:"center"}}>{t.badge}</span>}
          <span style={{fontSize:".42rem",fontWeight:700,textTransform:"uppercase",letterSpacing:".05em",color:tab===t.id?T.yellow:T.text3}}>{t.label}</span>
          {tab===t.id&&<div style={{width:16,height:2,background:T.yellow,borderRadius:1,marginTop:1}}/>}
        </button>
      ))}
    </div>
  );
}

// ─── ROOT ─────────────────────────────────────────────────────────────────────
function App(){
  const [state,setState]=useState(()=>loadState());
  const {data,festivos,adminOverrides,fichajes,accounts,ausencias,session}=state;
  const setAusencias=a=>setState(s=>({...s,ausencias:a}));
  const [tab,setTab]=useState("dashboard");
  const [toastMsg,setToastMsg]=useState("");
  const [toastShow,setToastShow]=useState(false);
  const toastTimer=useRef(null);
  const [obraModal,setObraModal]=useState(null);
  const [workerModal,setWorkerModal]=useState(null);
  const [parteModal,setParteModal]=useState(null);
  // ── NUEVO: estado para pre-rellenar NuevoParte desde modal de obra ──────────
  const [nuevoInit,setNuevoInit]=useState(null);
  _okeys=null;

  const toast=useCallback(msg=>{
    clearTimeout(toastTimer.current);setToastMsg(msg);setToastShow(true);
    toastTimer.current=setTimeout(()=>setToastShow(false),2400);
  },[]);

  const allObras=[...new Set(data.map(e=>e.obra))].sort();
  const allWorkers=[...new Set(data.map(e=>e.trabajador))].sort();
  const isAdmin=session?.isAdmin||session?.name===ADMIN_NAME||false;

  const saveData=d=>{localStorage.setItem("wk_data",JSON.stringify(d));setState(s=>({...s,data:d}));};
  const setFichajes=f=>{localStorage.setItem("wk_fichajes",JSON.stringify(f));setState(s=>({...s,fichajes:f}));};
  const setFestivos=f=>{setState(s=>({...s,festivos:f}));};
  const setAdminOverrides=a=>{setState(s=>({...s,adminOverrides:a}));};
  const setAccounts=a=>{localStorage.setItem("wk_accounts",JSON.stringify(a));setState(s=>({...s,accounts:a}));};

  const handleSaveParte=e=>{const newId=Math.max(0,...data.map(x=>x.id))+1;_okeys=null;saveData([...data,{id:newId,...e}]);};
  const handleDeleteParte=id=>{saveData(data.filter(e=>e.id!==id));toast("Eliminado");};
  const handleLogin=user=>{localStorage.setItem("wk_session",JSON.stringify(user));setState(s=>({...s,session:user}));setTab("fichaje");};
  const handleRegister=({name,pin,deviceId})=>{setAccounts([...accounts,{name,pin,deviceId}]);};
  const handleLogout=()=>{localStorage.removeItem("wk_session");setState(s=>({...s,session:null}));};

  // ── Callback para el botón + del ObraModal ───────────────────────────────
  const handleAddParteFromObra=(obra,subobra)=>{
    setNuevoInit({obra,subobra});
    setTab("nuevo");
  };

  const deviceId=getDeviceId();
  const isBlocked=()=>{
    if(!session||isAdmin)return false;
    const acc=accounts.find(a=>a.name===session.name);
    return acc&&acc.deviceId&&acc.deviceId!==deviceId;
  };

  const CSS=`@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap'); *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent} body{font-family:'DM Sans',sans-serif;background:#080810;color:#fff;} select option{background:#0f0f1a;} ::-webkit-scrollbar{width:4px} ::-webkit-scrollbar-track{background:transparent} ::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:4px} input[type=date]::-webkit-calendar-picker-indicator{filter:invert(1) opacity(.4)}`;

  if(!session) return(<><style>{CSS}</style><LoginScreen accounts={accounts} onLogin={handleLogin} onRegister={handleRegister}/></>);
  if(isBlocked()) return(<><style>{CSS}</style><BlockedScreen name={session.name}/></>);

  return(
    <>
      <style>{CSS}</style>
      <div style={{maxWidth:520,margin:"0 auto",minHeight:"100vh",background:T.bg,position:"relative"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 18px 10px",borderBottom:`1px solid ${T.border}`,position:"sticky",top:0,zIndex:99,background:T.bg}}>
          <div>
            <div style={{fontSize:"1.4rem",fontWeight:800,letterSpacing:".12em",color:T.yellow,fontFamily:T.mono}}>WORKLY</div>
            <div style={{fontSize:".55rem",color:T.text2,letterSpacing:".1em",textTransform:"uppercase",marginTop:1}}>Control · 2026{isAdmin?" · 🔐 Admin":""}</div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            {isAdmin&&(()=>{
              const hoy=new Date();hoy.setHours(0,0,0,0);
              const nAlertas=ausencias.filter(a=>{
                if(a.estado!=="aprobada")return false;
                const inicio=new Date(a.fechaInicio+"T00:00:00");
                const diff=Math.round((inicio-hoy)/(1000*60*60*24));
                return a.tipo==="permiso"?(diff>=0&&diff<=1):(diff>=0&&diff<=7);
              }).length;
              return nAlertas>0?(
                <button onClick={()=>setTab("ausencias")} style={{background:"rgba(255,85,85,.12)",border:"1px solid rgba(255,85,85,.3)",color:T.red,borderRadius:8,padding:"4px 10px",fontSize:".65rem",fontWeight:700,cursor:"pointer",fontFamily:T.sans,display:"flex",alignItems:"center",gap:5}}>
                  🔔 {nAlertas} aviso{nAlertas>1?"s":""}
                </button>
              ):null;
            })()}
            <div style={{textAlign:"right"}}>
              <div style={{fontFamily:T.mono,fontSize:".88rem",fontWeight:700,color:T.yellow}}>{data.filter(e=>e.fecha?.startsWith("2026")).reduce((s,e)=>s+e.horas,0).toFixed(0)}h</div>
              <div style={{fontSize:".58rem",color:T.text3}}>{data.length} partes</div>
            </div>
          </div>
        </div>

        <main>
          {tab==="dashboard"&&isAdmin&&<Dashboard data={data} festivos={festivos} adminOverrides={adminOverrides} allObras={allObras} allWorkers={allWorkers} onObraClick={l=>setObraModal(l)} onWorkerClick={n=>setWorkerModal(n)}/>}
          {tab==="miperfil"&&!isAdmin&&<MiPerfil currentUser={session} data={data} festivos={festivos} adminOverrides={adminOverrides} allObras={allObras} allWorkers={allWorkers} onParteClick={(id,ctx)=>setParteModal({id,ctx})}/>}
          {tab==="partes"&&<PartesList data={data} festivos={festivos} adminOverrides={adminOverrides} allWorkers={allWorkers} allObras={allObras} onDelete={handleDeleteParte} onParteClick={(id,ctx)=>setParteModal({id,ctx})} isAdmin={isAdmin} currentUser={session}/>}
          {tab==="nuevo"&&<NuevoParte
            key={nuevoInit?JSON.stringify(nuevoInit):"nuevo"}
            allWorkers={allWorkers}
            allObras={allObras}
            onSave={e=>{handleSaveParte(e);}}
            currentUser={session}
            isAdmin={isAdmin}
            toast={toast}
            obraInit={nuevoInit?.obra||""}
            subobraInit={nuevoInit?.subobra||""}
          />}
          {tab==="equipo"&&isAdmin&&<EquipoList data={data} festivos={festivos} adminOverrides={adminOverrides} allWorkers={allWorkers} allObras={allObras} onWorkerClick={n=>setWorkerModal(n)}/>}
          {tab==="obras"&&isAdmin&&<ObrasList data={data} festivos={festivos} adminOverrides={adminOverrides} allObras={allObras} onObraClick={l=>setObraModal(l)}/>}
          {tab==="cal"&&<CalendarView data={data} festivos={festivos} allWorkers={allWorkers} currentUser={session} isAdmin={isAdmin} onDayClick={(fecha,entries)=>{const ids=entries.map(e=>e.id);setParteModal({id:ids[0],ctx:ids});}}/>}
          {tab==="ausencias"&&<AusenciasScreen currentUser={session} isAdmin={isAdmin} ausencias={ausencias} setAusencias={setAusencias} allWorkers={allWorkers} toast={toast}/>}
          {tab==="cfg"&&(isAdmin?<AdminPanel accounts={accounts} setAccounts={setAccounts} festivos={festivos} setFestivos={setFestivos} adminOverrides={adminOverrides} setAdminOverrides={setAdminOverrides} allObras={allObras} toast={toast} onLogout={handleLogout}/>:<WorkerConfig currentUser={session} allWorkers={allWorkers} onLogout={handleLogout}/>)}
        </main>

        <Modal open={!!obraModal} onClose={()=>setObraModal(null)}>
          {obraModal&&<ObraModal
            obraLabel={obraModal}
            data={data}
            festivos={festivos}
            adminOverrides={adminOverrides}
            allObras={allObras}
            allWorkers={allWorkers}
            onWorkerClick={w=>{setObraModal(null);setWorkerModal(w);}}
            onParteClick={(id,ctx)=>{setObraModal(null);setParteModal({id,ctx});}}
            onClose={()=>setObraModal(null)}
            onAddParte={handleAddParteFromObra}
            isAdmin={isAdmin}
            obrasMeta={null}
            onSaveParte={e=>{handleSaveParte(e);toast("Parte guardado ✓");}}
          />}
        </Modal>
        <Modal open={!!workerModal} onClose={()=>setWorkerModal(null)}>
          {workerModal&&<WorkerModal worker={workerModal} data={data} festivos={festivos} adminOverrides={adminOverrides} allObras={allObras} allWorkers={allWorkers} onParteClick={(id,ctx)=>{setWorkerModal(null);setParteModal({id,ctx});}}/>}
        </Modal>
        <Modal open={!!parteModal} onClose={()=>setParteModal(null)}>
          {parteModal&&<ParteModal id={parteModal.id} ctx={parteModal.ctx} data={data} festivos={festivos} adminOverrides={adminOverrides} allObras={allObras} allWorkers={allWorkers} onDelete={handleDeleteParte} onClose={()=>setParteModal(null)} onObraClick={l=>{setParteModal(null);setObraModal(l);}} onWorkerClick={n=>{setParteModal(null);setWorkerModal(n);}} onNav={id=>setParteModal(p=>({...p,id}))} isAdmin={isAdmin}/>}
        </Modal>

        <NavBar tab={tab} setTab={t=>{if(t!=="nuevo")setNuevoInit(null);setTab(t);}} isAdmin={isAdmin} pendientes={ausencias.filter(a=>a.estado==="pendiente").length}/>
        <Toast msg={toastMsg} show={toastShow}/>
      </div>
    </>
  );
}

const container = document.getElementById('root');
const root = ReactDOM.createRoot(container);
root.render(React.createElement(App));
</script>
</body>
</html>
