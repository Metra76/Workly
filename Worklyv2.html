function getDeviceId(){
  let id=localStorage.getItem("wk_device_id");
  if(!id){id="dev_"+Math.random().toString(36).slice(2)+Date.now().toString(36);localStorage.setItem("wk_device_id",id);}

}

const normObra=o=>(o||"").toLowerCase().replace(/[^a-z0-9]/g,"").trim();
const workerInitials=w=>w.split(/\s+/).map(p=>p[0]||"").join("").toUpperCase().slice(0,2);
const pc=(v,t)=>t>0?((v/t)*100).toFixed(1):0;
const fmtShort=f=>{if(!f)return"";const p=f.split("-");const mn=["","Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];return`${p[2]} ${mn[+p[1]]||""}`};
const today=()=>new Date().toISOString().split("T")[0];
const isSunday=f=>new Date(f+"T12:00:00").getDay()===0;
const isSat=f=>new Date(f+"T12:00:00").getDay()===6;
const isFri=f=>new Date(f+"T12:00:00").getDay()===5;
function isFestivo(f,festivos){if(isSunday(f))return true;return festivos.some(x=>x.fecha===f);}
function getHT(e,festivos){
  if(e.tipoOverride)return e.tipoOverride;
  if(isFestivo(e.fecha,festivos))return"f";
  if(isSat(e.fecha))return"s";
  return e.horas<=(isFri(e.fecha)?6:9)?"n":"e";
}

let _okeys=null;
function obraColor(obra,allObras){
  if(!_okeys||_okeys.length===0){_okeys=[...new Set((allObras||[]).map(o=>normObra(o)))].sort();}
  const i=_okeys.indexOf(normObra(obra));
  return OC[i<0?0:i%OC.length];
}
function workerColor(w,workers){return WC[workers.indexOf(w)%WC.length]||WC[0];}
const ADM_RULES=[/isdin/i,/lurdes/i,/monja/i];
function isAdminObra(obra,overrides){const k=normObra(obra);if(overrides[k]===true)return true;if(overrides[k]===false)return false;return ADM_RULES.some(r=>r.test(obra));}
function isAdminEntry(e,overrides){if(e.subobra)return true;return isAdminObra(e.obra,overrides);}

function loadState(){
  try{
    let data=JSON.parse(localStorage.getItem("wk_data")||"null");
    if(!data){const old=JSON.parse(localStorage.getItem("pt_data")||"null");data=old||[...INITIAL_DATA];}
    let festivos=JSON.parse(localStorage.getItem("wk_fest")||"null");
    if(!festivos){festivos=JSON.parse(localStorage.getItem("pt_fest")||"[]");}
    // Fusionar festivos del Gremio del Metal sin duplicar
    FESTIVOS_METAL_2026.forEach(f=>{
      if(!festivos.some(x=>x.fecha===f.fecha)){festivos.push(f);}
    });
    festivos.sort((a,b)=>a.fecha.localeCompare(b.fecha));
    let adminOverrides=JSON.parse(localStorage.getItem("wk_adm")||"null");
    if(!adminOverrides){adminOverrides=JSON.parse(localStorage.getItem("pt_adm")||"{}") ;}
    let session=JSON.parse(localStorage.getItem("wk_session")||"null");
    if(session&&session.name===ADMIN_NAME&&!session.isAdmin){
      session={...session,isAdmin:true};
      localStorage.setItem("wk_session",JSON.stringify(session));
    }
    return {
      data,festivos,adminOverrides,
      fichajes:JSON.parse(localStorage.getItem("wk_fichajes")||"[]"),
      accounts:JSON.parse(localStorage.getItem("wk_accounts")||"[]"),
      ausencias:JSON.parse(localStorage.getItem("wk_ausencias")||"[]"),
      session,
    };
  }catch(e){return{data:[...INITIAL_DATA],festivos:[],adminOverrides:{},fichajes:[],accounts:[],ausencias:[],session:null};}
}

function HTBadge({type}){
  const map={n:["Normal","#7bc4ff","rgba(77,166,255,.15)"],e:["Extra","#ff8888","rgba(255,85,85,.15)"],s:["Sabado","#ffaa44","rgba(255,136,0,.15)"],f:["Festivo","#c084fc","rgba(168,85,247,.15)"]};
  const [label,color,bg]=map[type]||map.n;
  return <span style={{display:"inline-block",padding:"2px 7px",borderRadius:20,fontSize:".6rem",fontWeight:700,fontFamily:T.mono,background:bg,color,whiteSpace:"nowrap"}}>{label}</span>;
}

function Toast({msg,show}){
  return <div style={{position:"fixed",bottom:80,left:"50%",transform:`translateX(-50%) translateY(${show?0:60}px)`,background:T.green,color:"#000",padding:"10px 20px",borderRadius:11,fontWeight:700,fontSize:".83rem",zIndex:400,opacity:show?1:0,transition:"all .28s",pointerEvents:"none",whiteSpace:"nowrap"}}>{msg}</div>;
}

function Modal({open,onClose,children}){
  if(!open)return null;
  return(
    <div onClick={e=>{if(e.target===e.currentTarget)onClose();}} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.85)",zIndex:200,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
      <div style={{background:T.bg2,border:`1px solid ${T.border}`,borderRadius:"18px 18px 0 0",padding:22,width:"100%",maxWidth:520,maxHeight:"88vh",overflowY:"auto"}}>
        <button onClick={onClose} style={{float:"right",background:T.bg3,border:`1px solid ${T.border}`,color:T.text2,cursor:"pointer",borderRadius:7,width:27,height:27,display:"inline-flex",alignItems:"center",justifyContent:"center",marginTop:-2,fontSize:".88rem"}}>✕</button>
        {children}
      </div>
    </div>
  );
}

function StatBox({color,val,label}){
  return(
    <div style={{background:T.bg3,borderRadius:9,padding:11,textAlign:"center"}}>
      <div style={{fontFamily:T.mono,fontSize:"1.2rem",fontWeight:700,color}}>{val}</div>
      <div style={{fontSize:".58rem",textTransform:"uppercase",color:T.text2,marginTop:2}}>{label}</div>
    </div>
  );
}

function PinPad({value,onChange,label,error}){
  const digits=[1,2,3,4,5,6,7,8,9,"⌫",0,"OK"];
  return(
    <div style={{textAlign:"center"}}>
      {label&&<div style={{fontSize:".65rem",fontWeight:700,textTransform:"uppercase",letterSpacing:".1em",color:T.text2,marginBottom:18,lineHeight:1.5}}>{label}</div>}
      <div style={{display:"flex",justifyContent:"center",gap:14,marginBottom:28}}>
        {[0,1,2,3].map(i=>(
          <div key={i} style={{width:14,height:14,borderRadius:"50%",background:i<value.length?(error?T.red:T.yellow):"transparent",border:`2px solid ${i<value.length?(error?T.red:T.yellow):T.text3}`,transition:"all .15s"}}/>
        ))}
      </div>
      {error&&<div style={{fontSize:".75rem",color:T.red,marginBottom:14,minHeight:18}}>{error}</div>}
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,maxWidth:220,margin:"0 auto"}}>
        {digits.map((d,i)=>(
          <button key={i} onClick={()=>{
            if(d==="⌫")onChange(value.slice(0,-1),"");
            else if(d==="OK"){}
            else if(value.length<4)onChange(value+d,"");
          }} style={{aspectRatio:"1",background:d==="OK"?T.yellowDim:T.bg3,border:`1px solid ${d==="OK"?T.yellowBorder:T.border}`,color:d==="OK"?T.yellow:T.text,borderRadius:12,fontSize:d==="⌫"||d==="OK"?"1rem":"1.3rem",fontWeight:700,cursor:"pointer",fontFamily:T.mono}}>
            {d}
          </button>
        ))}
      </div>
    </div>
  );
}

function LogoPress({onLongPress,children}){
  const t=useRef(null);
  const start=()=>{t.current=setTimeout(()=>{onLongPress();},1500);};
  const cancel=()=>{clearTimeout(t.current);};
  return(
    <div onMouseDown={start} onMouseUp={cancel} onMouseLeave={cancel}
      onTouchStart={start} onTouchEnd={cancel} onTouchCancel={cancel}
      style={{cursor:"default"}}>
      {children}
    </div>
  );
}

function LoginScreen({accounts,onLogin,onRegister}){
  const deviceId=getDeviceId();
  const linked=accounts.find(a=>a.deviceId===deviceId);
  const [step,setStep]=useState(linked?"pin_return":"choose");
  const [name,setName]=useState(linked?.name||"");
  const [pin,setPin]=useState("");
  const [pin2,setPin2]=useState("");
  const [adminPin,setAdminPin]=useState("");
  const [error,setError]=useState("");

  const tryPin=(val,setVal,expected,onOk)=>{
    if(val.length<4)return;
    if(val===expected){setError("");onOk();}
    else{setError("PIN incorrecto");setTimeout(()=>{setVal("");setError("");},1000);}
  };

  useEffect(()=>{if(step==="pin_return"&&pin.length===4){const acc=accounts.find(a=>a.name===linked?.name);const isAdm=acc?.name===ADMIN_NAME;tryPin(pin,setPin,acc?.pin||"",()=>onLogin({name:acc.name,isAdmin:isAdm}));}},[ pin,step]);
  useEffect(()=>{if(step==="admin_pin"&&adminPin.length===4){tryPin(adminPin,setAdminPin,ADMIN_PIN,()=>onLogin({name:ADMIN_NAME,isAdmin:true}));}},[ adminPin,step]);
  useEffect(()=>{
    if(step==="new_pin2"&&pin2.length===4){
      if(pin2!==pin){setError("Los PINs no coinciden");setTimeout(()=>{setPin2("");setPin("");setStep("new_pin");setError("");},1200);}
      else{onRegister({name,pin,deviceId});onLogin({name,isAdmin:false});}
    }
  },[pin2,step]);

  const btn=(label,onClick,style={})=><button onClick={onClick} style={{width:"100%",padding:"11px 0",borderRadius:10,fontSize:".9rem",fontWeight:700,cursor:"pointer",fontFamily:T.sans,...style}}>{label}</button>;

  return(
    <div style={{minHeight:"100vh",background:T.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24,fontFamily:T.sans}}>
      <LogoPress onLongPress={()=>{setStep("admin_pin");setAdminPin("");setError("");}}>
        <div style={{marginBottom:36,textAlign:"center",userSelect:"none"}}>
          <div style={{fontSize:"2.8rem",fontWeight:800,color:T.yellow,letterSpacing:".12em",fontFamily:T.mono}}>WORKLY</div>
          <div style={{fontSize:".7rem",color:T.text2,letterSpacing:".15em",textTransform:"uppercase",marginTop:4}}>Ribasesedos · 2026</div>
        </div>
      </LogoPress>
      <div style={{width:"100%",maxWidth:340,background:T.bg2,border:`1px solid ${T.border}`,borderRadius:18,padding:28}}>
        {step==="choose"&&(
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            <div style={{fontSize:".6rem",fontWeight:700,textTransform:"uppercase",letterSpacing:".12em",color:T.text3,marginBottom:10,textAlign:"center"}}>Identificarte</div>
            {btn("Soy nuevo en la app",()=>setStep("new_name"),{background:T.yellow,color:"#000",border:"none"})}
            {accounts.length>0&&<>
              <div style={{fontSize:".6rem",textTransform:"uppercase",color:T.text3,textAlign:"center",margin:"4px 0"}}>— o acceder como —</div>
              {accounts.map(a=>(
                <button key={a.name} onClick={()=>{setName(a.name);setStep("select_pin");}} style={{width:"100%",padding:"10px 0",borderRadius:10,fontSize:".85rem",fontWeight:600,cursor:"pointer",fontFamily:T.sans,background:T.bg3,border:`1px solid ${T.border}`,color:T.text}}>{a.name}</button>
              ))}
            </>}
            <button onClick={()=>{
              const demoName="Txema";
              const existing=accounts.find(a=>a.name===demoName);
              if(existing){onLogin({name:demoName,isAdmin:false});}
              else{onRegister({name:demoName,pin:"1234",deviceId:"demo_"+demoName});onLogin({name:demoName,isAdmin:false});}
            }} style={{width:"100%",padding:"9px 0",borderRadius:10,fontSize:".78rem",fontWeight:600,cursor:"pointer",fontFamily:T.sans,background:"rgba(255,255,255,.04)",border:`1px dashed ${T.border}`,color:T.text3,marginTop:4}}>🧪 Entrar como Txema (demo)</button>
          </div>
        )}
        {step==="select_pin"&&(
          <>
            <div style={{textAlign:"center",marginBottom:22}}>
              <div style={{width:52,height:52,borderRadius:"50%",background:"rgba(255,255,255,.12)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:".9rem",fontWeight:800,color:"#fff",margin:"0 auto 10px",fontFamily:T.mono}}>{workerInitials(name)}</div>
              <div style={{fontWeight:700,fontSize:"1rem"}}>{name}</div>
              <div style={{fontSize:".7rem",color:T.text2,marginTop:2}}>Introduce tu PIN</div>
            </div>
            <PinPad value={pin} onChange={(v,e)=>{setPin(v);setError(e);
              if(v.length===4){const acc=accounts.find(a=>a.name===name);tryPin(v,setPin,acc?.pin||"",()=>onLogin({name,isAdmin:false}));}
            }} label="" error={error}/>
            <button onClick={()=>{setPin("");setStep("choose");}} style={{width:"100%",background:"transparent",color:T.text2,border:`1px solid ${T.border}`,borderRadius:10,padding:"10px 0",fontSize:".88rem",cursor:"pointer",fontFamily:T.sans,marginTop:18}}>← Atrás</button>
          </>
        )}
        {step==="new_name"&&(
          <>
            <div style={{fontSize:".6rem",fontWeight:700,textTransform:"uppercase",color:T.text3,marginBottom:14,textAlign:"center"}}>Tu nombre</div>
            <input value={name} onChange={e=>setName(e.target.value)} placeholder="Nombre completo..." autoFocus
              style={{width:"100%",background:T.bg3,border:`1px solid ${T.border}`,color:T.text,fontFamily:T.sans,fontSize:"1rem",padding:"11px 14px",borderRadius:10,outline:"none",boxSizing:"border-box",marginBottom:12}}/>
            {error&&<div style={{color:T.red,fontSize:".75rem",marginBottom:10,textAlign:"center"}}>{error}</div>}
            {btn("Continuar →",()=>{if(name.trim().length<2){setError("Escribe tu nombre");return;}setError("");setStep("new_pin");},{background:T.yellow,color:"#000",border:"none",marginBottom:8})}
            {btn("← Atrás",()=>setStep("choose"),{background:"transparent",color:T.text2,border:`1px solid ${T.border}`})}
          </>
        )}
        {step==="new_pin"&&(
          <>
            <PinPad value={pin} onChange={(v,e)=>{setPin(v);setError(e);}} label={`${name} · Elige tu PIN de 4 dígitos`} error={error}/>
            {pin.length===4&&(
              <button onClick={()=>{setPin2("");setError("");setStep("new_pin2");}} style={{width:"100%",background:T.yellow,color:"#000",border:"none",borderRadius:10,padding:"11px 0",fontSize:".9rem",fontWeight:700,cursor:"pointer",fontFamily:T.sans,marginTop:18}}>Confirmar PIN →</button>
            )}
            <button onClick={()=>{setPin("");setStep("new_name");}} style={{width:"100%",background:"transparent",color:T.text2,border:`1px solid ${T.border}`,borderRadius:10,padding:"10px 0",fontSize:".88rem",cursor:"pointer",fontFamily:T.sans,marginTop:10}}>← Atrás</button>
          </>
        )}
        {step==="new_pin2"&&(
          <>
            <PinPad value={pin2} onChange={(v,e)=>{setPin2(v);setError(e);}} label="Repite el PIN para confirmar" error={error}/>
            <button onClick={()=>{setPin2("");setPin("");setStep("new_pin");setError("");}} style={{width:"100%",background:"transparent",color:T.text2,border:`1px solid ${T.border}`,borderRadius:10,padding:"10px 0",fontSize:".88rem",cursor:"pointer",fontFamily:T.sans,marginTop:18}}>← Atrás</button>
          </>
        )}
        {step==="pin_return"&&linked&&(
          <>
            <div style={{textAlign:"center",marginBottom:22}}>
              <div style={{width:52,height:52,borderRadius:"50%",background:linked.name===ADMIN_NAME?T.yellow:"rgba(255,255,255,.12)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:".9rem",fontWeight:800,color:"#000",margin:"0 auto 10px",fontFamily:T.mono}}>{workerInitials(linked.name)}</div>
              <div style={{fontWeight:700,fontSize:"1rem"}}>{linked.name}</div>
              <div style={{fontSize:".7rem",color:linked.name===ADMIN_NAME?T.yellow:T.text2,marginTop:2}}>{linked.name===ADMIN_NAME?"🔐 Administrador · Introduce tu PIN":"Introduce tu PIN"}</div>
            </div>
            <PinPad value={pin} onChange={(v,e)=>{setPin(v);setError(e);}} label="" error={error}/>
          </>
        )}
        {step==="admin_pin"&&(
          <>
            <div style={{textAlign:"center",marginBottom:22}}>
              <div style={{fontSize:"2rem",marginBottom:8}}>🔐</div>
              <div style={{fontWeight:700,fontSize:"1rem"}}>{ADMIN_NAME}</div>
              <div style={{fontSize:".7rem",color:T.text2,marginTop:2}}>PIN de administrador</div>
            </div>
            <PinPad value={adminPin} onChange={(v,e)=>{setAdminPin(v);setError(e);}} label="" error={error}/>
            <button onClick={()=>{setStep(linked?"pin_return":"choose");setAdminPin("");setError("");}} style={{width:"100%",background:"transparent",color:T.text2,border:`1px solid ${T.border}`,borderRadius:10,padding:"10px 0",fontSize:".88rem",cursor:"pointer",fontFamily:T.sans,marginTop:18}}>← Atrás</button>
          </>
        )}
      </div>
      <div style={{marginTop:16,fontSize:".62rem",color:T.text3,textAlign:"center"}}>Acceso protegido · Solo personal autorizado</div>
    </div>
  );
}

function FichajeScreen({currentUser,fichajes,setFichajes,allData,setData,festivos,allObras,toast}){
  const [status,setStatus]=useState("idle");
  const [active,setActive]=useState(null);
  const [obra,setObra]=useState("");
  const [notas,setNotas]=useState("");
  const [error,setError]=useState("");
  const [elapsed,setElapsed]=useState(0);
  const timer=useRef(null);

  useEffect(()=>{
    const a=fichajes.find(f=>f.trabajador===currentUser.name&&!f.horaFin);
    if(a){setActive(a);setStatus("active");}
  },[]);

  useEffect(()=>{
    if(status==="active"&&active){
      const tick=()=>setElapsed(Math.floor((Date.now()-new Date(active.horaInicio).getTime())/1000));
      tick();timer.current=setInterval(tick,1000);
      return()=>clearInterval(timer.current);
    }
  },[status,active]);

  const fmtE=s=>`${String(Math.floor(s/3600)).padStart(2,"0")}:${String(Math.floor((s%3600)/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;
  const getGPS=()=>new Promise(res=>{
    if(!navigator.geolocation){res(null);return;}
    navigator.geolocation.getCurrentPosition(p=>res({lat:p.coords.latitude,lng:p.coords.longitude,acc:Math.round(p.coords.accuracy)}),()=>res(null),{enableHighAccuracy:true,timeout:12000});
  });

  const checkIn=async()=>{
    if(!obra.trim()){setError("Indica la obra");return;}
    setError("");setStatus("locating");
    const gps=await getGPS();
    const now=new Date().toISOString();
    const f={id:Date.now(),trabajador:currentUser.name,obra:obra.trim(),notas,horaInicio:now,horaFin:null,gpsInicio:gps,gpsFin:null,fecha:today()};
    const nf=[...fichajes,f];
    setFichajes(nf);localStorage.setItem("wk_fichajes",JSON.stringify(nf));
    setActive(f);setStatus("active");toast(`▶ Fichado en ${obra.trim()}`);
  };

  const checkOut=async()=>{
    setStatus("checking_out");
    const gps=await getGPS();
    const now=new Date().toISOString();
    const horas=Math.round(((Date.now()-new Date(active.horaInicio).getTime())/(1000*3600))*2)/2;
    const upd=fichajes.map(f=>f.id===active.id?{...f,horaFin:now,gpsFin:gps,horasCalculadas:horas}:f);
    setFichajes(upd);localStorage.setItem("wk_fichajes",JSON.stringify(upd));
    const newId=Math.max(0,...allData.map(e=>e.id))+1;
    const parte={id:newId,fecha:active.fecha,trabajador:currentUser.name,horas,obra:active.obra,notas:active.notas||"",fromFichaje:active.id};
    const nd=[...allData,parte];setData(nd);localStorage.setItem("wk_data",JSON.stringify(nd));
    clearInterval(timer.current);setActive(null);setStatus("idle");setObra("");setNotas("");
    toast(`⏹ ${horas}h registradas`);
  };

  const myF=fichajes.filter(f=>f.trabajador===currentUser.name).slice(-8).reverse();

  return(
    <div style={{padding:"0 0 80px",fontFamily:T.sans}}>
      <div style={{padding:"22px 18px 8px"}}>
        <h2 style={{fontSize:"2rem",fontWeight:700,textTransform:"uppercase",letterSpacing:"-.02em",margin:0}}>FICHAJE</h2>
        <div style={{fontSize:".75rem",color:T.text2,marginTop:4}}>Hola, <strong style={{color:T.yellow}}>{currentUser.name}</strong> · GPS automático</div>
      </div>
      {status==="active"&&active?(
        <div style={{margin:"12px 18px",background:"rgba(0,214,143,.06)",border:"1px solid rgba(0,214,143,.3)",borderRadius:16,padding:20}}>
          <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:14}}>
            <div>
              <div style={{fontSize:".6rem",fontWeight:700,textTransform:"uppercase",color:T.green,marginBottom:4}}>● EN OBRA AHORA</div>
              <div style={{fontSize:"1.1rem",fontWeight:700}}>{active.obra}</div>
              <div style={{fontSize:".72rem",color:T.text2,marginTop:2}}>{new Date(active.horaInicio).toLocaleTimeString("es",{hour:"2-digit",minute:"2-digit"})} → ahora</div>
            </div>
            <div style={{textAlign:"right"}}>
              <div style={{fontFamily:T.mono,fontSize:"1.6rem",fontWeight:700,color:T.green}}>{fmtE(elapsed)}</div>
              <div style={{fontSize:".6rem",color:T.text2}}>tiempo en obra</div>
            </div>
          </div>
          {active.gpsInicio&&<div style={{fontSize:".65rem",color:T.text2,background:"rgba(0,0,0,.3)",borderRadius:8,padding:"6px 10px",marginBottom:12,fontFamily:T.mono}}>📍 {active.gpsInicio.lat.toFixed(4)}, {active.gpsInicio.lng.toFixed(4)} ±{active.gpsInicio.acc}m</div>}
          <button onClick={checkOut} disabled={status==="checking_out"} style={{width:"100%",background:T.red,color:"#fff",border:"none",borderRadius:10,padding:"13px 0",fontSize:".95rem",fontWeight:700,cursor:"pointer",fontFamily:T.sans}}>
            {status==="checking_out"?"📍 Ubicando...":"⏹ Fichar salida"}
          </button>
        </div>
      ):(
        <div style={{margin:"12px 18px",background:T.bg2,border:`1px solid ${T.border}`,borderRadius:16,padding:20}}>
          <div style={{fontSize:".6rem",fontWeight:700,textTransform:"uppercase",color:T.text3,marginBottom:12}}>Nueva entrada</div>
          <div style={{marginBottom:10}}>
            <label style={{display:"block",fontSize:".58rem",fontWeight:700,textTransform:"uppercase",color:T.text3,marginBottom:4}}>Obra</label>
            <input value={obra} onChange={e=>setObra(e.target.value)} list="dl-f" placeholder="¿En qué obra estás?"
              style={{width:"100%",background:T.bg3,border:`1px solid ${error?T.red:T.border}`,color:T.text,fontFamily:T.sans,fontSize:".9rem",padding:"10px 12px",borderRadius:10,outline:"none",boxSizing:"border-box"}}/>
            <datalist id="dl-f">{allObras.map(o=><option key={o} value={o}/>)}</datalist>
          </div>
          <div style={{marginBottom:14}}>
            <label style={{display:"block",fontSize:".58rem",fontWeight:700,textTransform:"uppercase",color:T.text3,marginBottom:4}}>Notas (opcional)</label>
            <input value={notas} onChange={e=>setNotas(e.target.value)} placeholder="Descripción..."
              style={{width:"100%",background:T.bg3,border:`1px solid ${T.border}`,color:T.text,fontFamily:T.sans,fontSize:".9rem",padding:"10px 12px",borderRadius:10,outline:"none",boxSizing:"border-box"}}/>
          </div>
          {error&&<div style={{color:T.red,fontSize:".75rem",marginBottom:10}}>{error}</div>}
          <button onClick={checkIn} disabled={status==="locating"} style={{width:"100%",background:T.yellow,color:"#000",border:"none",borderRadius:10,padding:"13px 0",fontSize:".95rem",fontWeight:700,cursor:"pointer",fontFamily:T.sans,opacity:status==="locating"?.7:1}}>
            {status==="locating"?"📍 Obteniendo ubicación...":"▶ Fichar entrada"}
          </button>
        </div>
      )}
      {myF.length>0&&(
        <div style={{padding:"8px 18px 0"}}>
          <div style={{fontSize:".58rem",fontWeight:700,textTransform:"uppercase",letterSpacing:".1em",color:T.text3,marginBottom:10}}>Mis fichajes recientes</div>
          {myF.map(f=>{
            const closed=!!f.horaFin;
            return(
              <div key={f.id} style={{background:T.bg2,border:`1px solid ${closed?T.border:"rgba(0,214,143,.3)"}`,borderRadius:12,padding:"12px 14px",marginBottom:7,display:"flex",alignItems:"center",gap:10}}>
                <div style={{width:8,height:8,borderRadius:"50%",background:closed?T.text3:T.green,flexShrink:0}}/>
                <div style={{flex:1}}>
                  <div style={{fontSize:".85rem",fontWeight:700,color:closed?T.text:T.green}}>{f.obra}</div>
                  <div style={{fontSize:".65rem",color:T.text2}}>{new Date(f.horaInicio).toLocaleTimeString("es",{hour:"2-digit",minute:"2-digit"})}{f.horaFin?` → ${new Date(f.horaFin).toLocaleTimeString("es",{hour:"2-digit",minute:"2-digit"})}`:" → ahora"} · {fmtShort(f.fecha)}</div>
                </div>
                {f.horasCalculadas&&<div style={{fontFamily:T.mono,fontSize:".9rem",fontWeight:700,color:T.yellow}}>{f.horasCalculadas}h</div>}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function Dashboard({data,festivos,adminOverrides,allObras,allWorkers,onObraClick,onWorkerClick}){
  const d26=data.filter(e=>e.fecha?.startsWith("2026"));
  const totalH=d26.reduce((s,e)=>s+e.horas,0);
  const ht={n:0,e:0,s:0,f:0};
  const omap={};let adminH=0;const wset=new Set();
  d26.forEach(e=>{
    const t=getHT(e,festivos);ht[t]=(ht[t]||0)+e.horas;
    if(isAdminEntry(e,adminOverrides))adminH+=e.horas;
    wset.add(e.trabajador);
    const k=normObra(e.obra);
    if(!omap[k]){omap[k]={label:e.obra,h:0,ws:new Set()};}
    omap[k].h+=e.horas;omap[k].ws.add(e.trabajador);
    if(e.obra.length>(omap[k].label||"").length)omap[k].label=e.obra;
  });
  const top=Object.values(omap).sort((a,b)=>b.h-a.h).slice(0,12);
  const cards=[
    {col:T.yellow,val:totalH>=1000?(totalH/1000).toFixed(1)+"k":totalH.toFixed(0),label:"Horas 2026",sub:"todas las obras"},
    {col:T.red,val:(ht.e+ht.s+ht.f).toFixed(0),label:"Horas extra",sub:"extra+sab+fest"},
    {col:T.green,val:wset.size,label:"Equipo activo",sub:"trabajadores"},
    {col:T.purple,val:Object.keys(omap).length,label:"Obras activas",sub:"en 2026"},
    {col:T.blue,val:adminH.toFixed(0),label:"Horas Admin",sub:totalH>0?pc(adminH,totalH)+"% del total":"0%"},
    {col:T.orange,val:d26.length,label:"Partes",sub:"2026 registros"},
  ];
  return(
    <div style={{paddingBottom:80,fontFamily:T.sans}}>
      <div style={{padding:"22px 18px 4px"}}><h2 style={{fontSize:"2rem",fontWeight:700,textTransform:"uppercase",letterSpacing:"-.02em",margin:0}}>DASHBOARD</h2><div style={{fontSize:".75rem",color:T.text2,marginTop:5}}>2026 · {Object.keys(omap).length} obras · {allWorkers.length} trabajadores</div></div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9,padding:"14px 18px 8px"}}>
        {cards.map((c,i)=>(
          <div key={i} style={{background:T.bg2,border:`1px solid ${T.border}`,borderRadius:13,padding:"16px 14px 14px",borderTop:`2px solid ${c.col}`}}>
            <div style={{fontSize:".58rem",fontWeight:700,textTransform:"uppercase",letterSpacing:".1em",color:T.text2,marginBottom:7}}>{c.label}</div>
            <div style={{fontFamily:T.mono,fontSize:"1.9rem",fontWeight:700,color:c.col,lineHeight:1,marginBottom:5}}>{c.val}</div>
            <div style={{fontSize:".68rem",color:T.text2}}>{c.sub}</div>
          </div>
        ))}
      </div>
      <div style={{padding:"4px 18px",fontSize:".6rem",fontWeight:700,textTransform:"uppercase",letterSpacing:".12em",color:T.text2}}>OBRAS 2026</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9,padding:"0 18px"}}>
        {top.map((o,i)=>{
          const col=obraColor(o.label,allObras);const ws=[...o.ws].slice(0,5);
          return(
            <div key={i} onClick={()=>onObraClick(o.label)} style={{background:T.bg2,border:`1px solid ${T.border}`,borderRadius:13,overflow:"hidden",cursor:"pointer"}}>
              <div style={{height:3,background:col}}/>
              <div style={{padding:"11px 12px 13px"}}>
                <div style={{fontSize:".85rem",fontWeight:700,marginBottom:5,lineHeight:1.2,minHeight:"2.1em"}}>{o.label}</div>
                <div style={{fontFamily:T.mono,fontSize:"1.45rem",fontWeight:700,color:col,lineHeight:1,marginBottom:6}}>{o.h.toFixed(0)}h</div>
                <div style={{display:"flex",gap:3,flexWrap:"wrap"}}>
                  {ws.map(w=><div key={w} title={w} onClick={e=>{e.stopPropagation();onWorkerClick(w);}} style={{width:26,height:26,borderRadius:"50%",background:workerColor(w,allWorkers),display:"flex",alignItems:"center",justifyContent:"center",fontSize:".52rem",fontWeight:700,color:"#000",cursor:"pointer"}}>{workerInitials(w)}</div>)}
                  {o.ws.size>5&&<div style={{width:26,height:26,borderRadius:"50%",background:"rgba(255,255,255,.12)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:".5rem",color:T.text}}>+{o.ws.size-5}</div>}
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function PartesList({data,festivos,adminOverrides,allWorkers,allObras,onDelete,onParteClick,isAdmin,currentUser}){

    if(search&&!e.trabajador.toLowerCase().includes(search.toLowerCase())&&!e.obra.toLowerCase().includes(search.toLowerCase()))return false;

        <HTBadge type="f"/><span style={{fontSize:".7rem",color:T.text2}}>{ht.f.toFixed(0)}h</span>

function QuickInput({allWorkers,onSaveMany}){
  const [txt,setTxt]=useState("");const [preview,setPreview]=useState(null);
  const parse=()=>{
    const lines=txt.split("\n").map(l=>l.trim()).filter(Boolean);
    let cur=null,curDate=null;const entries=[];
    lines.forEach(line=>{
      const wMatch=allWorkers.find(w=>line.toLowerCase()===w.toLowerCase());
      if(wMatch){cur=wMatch;return;}
      const dMatch=line.match(/^(\d{1,2})[\/\-](\d{1,2})(?:[\/\-](\d{2,4}))?/);
      if(dMatch&&!line.match(/[hH]/)){const dd=String(dMatch[1]).padStart(2,"0"),mm=String(dMatch[2]).padStart(2,"0");const yy=dMatch[3]?(dMatch[3].length===2?"20"+dMatch[3]:dMatch[3]):"2026";curDate=`${yy}-${mm}-${dd}`;return;}
      const hMatch=line.match(/^(\d+(?:[.,]\d+)?)\s*[hH]\s+(.+)/);
      if(hMatch&&cur&&curDate)entries.push({trabajador:cur,fecha:curDate,horas:parseFloat(hMatch[1].replace(",",".")),obra:hMatch[2].trim(),notas:""});
    });
    setPreview(entries.length?entries:"error");
  };
  return(
    <div style={{margin:"0 18px",background:T.bg2,border:`1px solid ${T.border}`,borderRadius:13,padding:18}}>
      <div style={{fontSize:".6rem",fontWeight:700,textTransform:"uppercase",color:T.text3,marginBottom:10}}>Entrada rápida WhatsApp</div>
      <textarea value={txt} onChange={e=>setTxt(e.target.value)} rows={5} placeholder={"Juan\n25/2\n9H Exea\n\nManja\n25/2\n4h Hotel"}
        style={{width:"100%",background:T.bg3,border:`1px solid ${T.border}`,color:T.text,fontFamily:T.mono,fontSize:".76rem",padding:"9px 11px",borderRadius:9,outline:"none",resize:"vertical",boxSizing:"border-box",marginBottom:10}}/>
      <button onClick={parse} style={{background:T.yellowDim,border:`1px solid ${T.yellowBorder}`,color:T.yellow,borderRadius:9,padding:"7px 14px",fontSize:".78rem",fontWeight:700,cursor:"pointer",fontFamily:T.sans}}>Parsear</button>
      {preview==="error"&&<div style={{color:T.red,fontSize:".75rem",marginTop:8}}>No se reconocieron entradas</div>}
      {Array.isArray(preview)&&(
        <div style={{marginTop:10}}>
          <div style={{fontSize:".72rem",color:T.text2,marginBottom:8}}>{preview.length} partes:</div>
          {preview.map((e,i)=>(
            <div key={i} style={{display:"flex",gap:8,alignItems:"center",padding:"6px 0",borderBottom:`1px solid ${T.border}`,fontSize:".76rem"}}>
              <span style={{color:T.text2,fontFamily:T.mono,fontSize:".63rem"}}>{fmtShort(e.fecha)}</span>
              <span style={{fontWeight:600}}>{e.trabajador}</span>
              <span style={{flex:1,color:T.yellow,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{e.obra}</span>
              <span style={{fontFamily:T.mono,color:T.yellow}}>{e.horas}h</span>
            </div>
          ))}
          <button onClick={()=>{onSaveMany(preview);setPreview(null);setTxt("");}} style={{background:T.yellow,color:"#000",border:"none",borderRadius:9,padding:"8px 16px",fontSize:".8rem",fontWeight:700,cursor:"pointer",marginTop:10,fontFamily:T.sans}}>Confirmar todos</button>
        </div>
      )}
    </div>
  );
}

function EquipoList({data,festivos,adminOverrides,allWorkers,allObras,onWorkerClick}){
  const workers=allWorkers.filter(w=>data.some(e=>e.trabajador===w));
  return(
    <div style={{padding:"0 0 80px",fontFamily:T.sans}}>
      <div style={{padding:"22px 18px 4px"}}><h2 style={{fontSize:"2rem",fontWeight:700,textTransform:"uppercase",letterSpacing:"-.02em",margin:0}}>EQUIPO</h2></div>
      <div style={{padding:"12px 18px 0"}}>
        {workers.map(w=>{
          const we=data.filter(e=>e.trabajador===w);
          const totalH=we.reduce((s,e)=>s+e.horas,0);
          const dias=new Set(we.map(e=>e.fecha)).size;
          const adminH=we.filter(e=>isAdminEntry(e,adminOverrides)).reduce((s,e)=>s+e.horas,0);

function ObrasList({data,festivos,adminOverrides,allObras,onObraClick}){

    const t=getHT(e,festivos);omap[k].ht[t]=(omap[k].ht[t]||0)+e.horas;

function groupBySubobra(entries){
  const map={};
  entries.forEach(e=>{
    const key=e.subobra||"";
    if(!map[key])map[key]=[];
    map[key].push(e);
  });
  return Object.entries(map).sort((a,b)=>{
    if(a[0]===""&&b[0]!=="")return-1;
    if(a[0]!==""&&b[0]==="")return 1;
    return a[0].localeCompare(b[0]);
  });
}

  const [pSubobra,setPSubobra]=useState("");

            <label style={labelStyle}>Fecha</label>
            <select value={pFecha} onChange={e=>setPFecha(e.target.value)} style={inputStyle}>

              <option value={today()}>{today().split("-").reverse().join("/")} (hoy)</option>

          {/* Operarios: pre-rellenados, editables */}

            <label style={labelStyle}>Operarios</label>
            <input value={pOperarios} onChange={e=>setPOperarios(e.target.value)} style={inputStyle}/>
            <div style={{fontSize:".6rem",color:T.text3,marginTop:3}}>Puedes editar si no estuvieron todos</div>

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
            <div><label style={labelStyle}>Horas totales</label><input type="number" min=".5" max="999" step=".5" value={pHoras} onChange={e=>setPHoras(e.target.value)} placeholder="0" style={inputStyle}/></div>
            <div><label style={labelStyle}>Tipo</label>
              <select value={pTipo} onChange={e=>setPTipo(e.target.value)} style={inputStyle}>
                <option value="">Auto</option><option value="n">Normal</option><option value="e">Extra</option><option value="s">Sábado</option><option value="f">Festivo</option>
              </select>
            </div>
          </div>
          <div style={{marginBottom:8}}><label style={labelStyle}>Subobra (opcional)</label><input value={pSubobra} onChange={e=>setPSubobra(e.target.value)} placeholder="Ej: Vestíbulo, Leds..." style={inputStyle}/></div>
          <div style={{marginBottom:8}}><label style={labelStyle}>Trabajos realizados</label><textarea value={pTrabajos} onChange={e=>setPTrabajos(e.target.value)} placeholder="Un trabajo por línea..." rows={2} style={{...inputStyle,resize:"vertical"}}/></div>
          <div style={{marginBottom:8}}><label style={labelStyle}>Materiales utilizados</label><textarea value={pMateriales} onChange={e=>setPMateriales(e.target.value)} placeholder="Un material por línea..." rows={2} style={{...inputStyle,resize:"vertical"}}/></div>
          <div style={{marginBottom:10}}><label style={labelStyle}>Notas</label><input value={pNotas} onChange={e=>setPNotas(e.target.value)} placeholder="Opcional" style={inputStyle}/></div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={saveParte} disabled={!pOperarios.trim()||!pHoras} style={{background:(!pOperarios.trim()||!pHoras)?"rgba(0,214,143,.2)":T.green,color:"#000",border:"none",borderRadius:9,padding:"9px 20px",fontSize:".85rem",fontWeight:700,cursor:(!pOperarios.trim()||!pHoras)?"not-allowed":"pointer",fontFamily:T.sans,opacity:(!pOperarios.trim()||!pHoras)?.6:1}}>Guardar parte</button>
            <button onClick={()=>{setPHoras("");setPTrabajos("");setPMateriales("");setPNotas("");setPTipo("");setPSubobra("");setPOperarios(operariosObra);setPFecha(fechaReciente);}} style={{background:T.bg3,border:`1px solid ${T.border}`,color:T.text2,borderRadius:9,padding:"9px 14px",fontSize:".85rem",cursor:"pointer",fontFamily:T.sans}}>Limpiar</button>
          </div>
        </div>
      )}
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:7,marginBottom:14}}>
        <StatBox color={col} val={totalH.toFixed(0)+"h"} label="Total"/>
        <StatBox color={T.orange} val={trabH.toFixed(0)+"h"} label="Trabajo"/>
        <StatBox color={T.green} val={admH.toFixed(0)+"h"} label="Admin"/>
        <StatBox color={T.text2} val={entries.length} label="Partes"/>
      </div>
      <div style={{marginBottom:12}}>
        <div style={{fontSize:".58rem",textTransform:"uppercase",color:T.text2,marginBottom:7}}>Equipo</div>
        <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
          {workers.map(w=>(
            <div key={w} onClick={()=>{onClose();onWorkerClick(w);}} style={{display:"inline-flex",alignItems:"center",gap:5,background:T.bg3,borderRadius:7,padding:"5px 9px",cursor:"pointer"}}>
              <div style={{width:22,height:22,borderRadius:"50%",background:workerColor(w,allWorkers),display:"flex",alignItems:"center",justifyContent:"center",fontSize:".5rem",fontWeight:700,color:"#000"}}>{workerInitials(w)}</div>
              <span style={{fontSize:".76rem"}}>{w}</span>

      </div>
      <div style={{height:5,borderRadius:5,overflow:"hidden",display:"flex",background:T.bg3,marginBottom:5}}>

      </div>
      <div style={{display:"flex",gap:8,fontSize:".63rem",marginBottom:14}}>
        <span style={{color:"#7bc4ff"}}>N {ht.n.toFixed(0)}h</span><span style={{color:"#ff8888"}}>E {ht.e.toFixed(0)}h</span><span style={{color:"#ffaa44"}}>S {ht.s.toFixed(0)}h</span><span style={{color:"#c084fc"}}>F {ht.f.toFixed(0)}h</span>
      </div>
      {trabH>0&&<div style={{background:"rgba(255,136,0,.05)",border:"1px solid rgba(255,136,0,.2)",borderRadius:10,overflow:"hidden",marginBottom:8}}>
        <div onClick={()=>setShowT(v=>!v)} style={{padding:"12px 14px",display:"flex",alignItems:"center",gap:10,cursor:"pointer"}}>
          <div style={{flex:1}}>
            <div style={{fontSize:".6rem",fontWeight:700,textTransform:"uppercase",color:T.orange}}>Trabajo</div>
            <div style={{fontSize:".65rem",color:T.text2}}>{trabE.length} partes · {trabGroups.length} {trabGroups.length===1?"subobra":"subobras"}</div>
          </div>
          <div style={{fontFamily:T.mono,fontSize:"1.5rem",fontWeight:700,color:T.orange}}>{trabH.toFixed(0)}h</div>
          <div style={{color:T.text3}}>{showT?"▲":"▼"}</div>
        </div>
        {showT&&<div style={{borderTop:"1px solid rgba(255,136,0,.2)",padding:"8px 10px"}}>
          {trabGroups.map(([sub,ents])=>(
            <SubobraGroup key={sub||"__sin__"} label={sub} entries={ents} col={T.orange} festivos={festivos} onParteClick={onParteClick} onAddParte={isAdmin?((s)=>{onClose();onAddParte(obraLabel,s);}):null} isAdmin={isAdmin} obraLabel={obraLabel} obrasMeta={obrasMeta}/>
          ))}
        </div>}
      </div>}
      {admH>0&&<div style={{background:"rgba(0,214,143,.05)",border:"1px solid rgba(0,214,143,.2)",borderRadius:10,overflow:"hidden",marginBottom:8}}>
        <div onClick={()=>setShowA(v=>!v)} style={{padding:"12px 14px",display:"flex",alignItems:"center",gap:10,cursor:"pointer"}}>
          <div style={{flex:1}}>
            <div style={{fontSize:".6rem",fontWeight:700,textTransform:"uppercase",color:T.green}}>Admin</div>
            <div style={{fontSize:".65rem",color:T.text2}}>{admE.length} partes · {admGroups.length} {admGroups.length===1?"subobra":"subobras"}</div>
          </div>

function WorkerModal({worker,data,festivos,adminOverrides,allObras,allWorkers,onParteClick}){
  const entries=data.filter(e=>e.trabajador===worker);
  const totalH=entries.reduce((s,e)=>s+e.horas,0);
  const adminH=entries.filter(e=>isAdminEntry(e,adminOverrides)).reduce((s,e)=>s+e.horas,0);
  const dias=new Set(entries.map(e=>e.fecha)).size;
  const col=workerColor(worker,allWorkers);
  const ht={n:0,e:0,s:0,f:0};entries.forEach(e=>{const t=getHT(e,festivos);ht[t]=(ht[t]||0)+e.horas;});
  const omap={};entries.forEach(e=>{const k=normObra(e.obra);if(!omap[k]){omap[k]={h:0,label:e.obra,entries:[]};}omap[k].h+=e.horas;omap[k].entries.push(e);});
  const allObrasW=Object.values(omap).sort((a,b)=>b.h-a.h);
  const [openObra,setOpenObra]=useState(null);
  return(
    <>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
        <div style={{width:40,height:40,borderRadius:"50%",background:col,display:"flex",alignItems:"center",justifyContent:"center",fontSize:".7rem",fontWeight:700,color:"#000"}}>{workerInitials(worker)}</div>
        <div><h3 style={{marginBottom:1,fontSize:"1.05rem"}}>{worker}</h3><div style={{fontSize:".68rem",color:T.text2}}>{dias} días · {entries.length} partes</div></div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:7,marginBottom:12}}>
        <StatBox color={col} val={totalH.toFixed(0)+"h"} label="Total"/>
        <StatBox color={T.red} val={(ht.e+ht.s+ht.f).toFixed(0)+"h"} label="Extra+"/>
        <StatBox color={T.green} val={adminH.toFixed(0)+"h"} label="Admin"/>
      </div>
      <div style={{height:5,borderRadius:5,overflow:"hidden",display:"flex",background:T.bg3,marginBottom:14}}>
        <div style={{width:pc(ht.n,totalH)+"%",background:"#7bc4ff"}}/><div style={{width:pc(ht.e,totalH)+"%",background:"#ff8888"}}/><div style={{width:pc(ht.s,totalH)+"%",background:"#ffaa44"}}/><div style={{width:pc(ht.f,totalH)+"%",background:"#c084fc"}}/>
      </div>
      {allObrasW.map((o,i)=>{
        const oCol=obraColor(o.label,allObras);const isOpen=openObra===i;
        const sorted=o.entries.sort((a,b)=>b.fecha.localeCompare(a.fecha));
        return(
          <div key={i} style={{border:`1px solid ${T.border}`,borderRadius:10,overflow:"hidden",marginBottom:7}}>
            <div onClick={()=>setOpenObra(isOpen?null:i)} style={{background:T.bg3,padding:"10px 12px",display:"flex",alignItems:"center",gap:8,cursor:"pointer"}}>
              <div style={{width:3,height:32,borderRadius:2,background:oCol,flexShrink:0}}/>
              <div style={{flex:1,minWidth:0}}><div style={{fontSize:".86rem",fontWeight:700,color:oCol,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{o.label}</div><div style={{fontSize:".6rem",color:T.text2}}>{o.entries.length} partes</div></div>
              <div style={{fontFamily:T.mono,fontSize:"1.1rem",fontWeight:700,color:oCol}}>{o.h.toFixed(0)}h</div>
              <div style={{color:T.text3,fontSize:".8rem"}}>{isOpen?"▲":"▼"}</div>
            </div>
            {isOpen&&<div>{sorted.map(e=>(
              <div key={e.id} onClick={()=>onParteClick(e.id,sorted.map(x=>x.id))} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",borderBottom:`1px solid ${T.border}`,cursor:"pointer"}}>
                <div style={{fontFamily:T.mono,fontSize:".6rem",color:T.text2,width:48,flexShrink:0}}>{fmtShort(e.fecha)}</div>
                <div style={{flex:1,fontSize:".72rem",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{e.trabajador}{e.subobra?<span style={{opacity:.6}}> ({e.subobra})</span>:""}</div>
                <div style={{fontFamily:T.mono,fontSize:".78rem",fontWeight:700,color:oCol}}>{e.horas}h</div>
                <HTBadge type={getHT(e,festivos)}/>
              </div>
            ))}</div>}
          </div>
        );
      })}
    </>
  );
}

        <span style={{fontWeight:600,fontSize:".88rem"}}>{e.trabajador}</span><span style={{color:T.text3}}>›</span>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9,marginBottom:16}}>

          <HTBadge type={getHT(e,festivos)}/>

        </div>

      {e.trabajos&&<div style={{background:T.bg3,borderRadius:9,padding:12,marginBottom:10}}>
        <div style={{fontSize:".55rem",fontWeight:700,textTransform:"uppercase",color:T.text3,marginBottom:7}}>Trabajos realizados</div>
        {e.trabajos.split("\n").filter(Boolean).map((t,i)=><div key={i} style={{fontSize:".8rem",color:T.text,marginBottom:3}}>{i+1}. {t}</div>)}
      </div>}

        <div style={{fontSize:".75rem",color:T.text2,marginBottom:12}}>Exporta todos los datos a un archivo JSON. Guárdalo para poder restaurar si se pierde el localStorage.</div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          <button onClick={()=>{
            const backup={
              wk_data:JSON.parse(localStorage.getItem("wk_data")||"null"),
              wk_fest:JSON.parse(localStorage.getItem("wk_fest")||"null"),
              wk_adm:JSON.parse(localStorage.getItem("wk_adm")||"null"),
              wk_accounts:JSON.parse(localStorage.getItem("wk_accounts")||"null"),
              wk_ausencias:JSON.parse(localStorage.getItem("wk_ausencias")||"null"),
              exportado:new Date().toISOString()
            };
            const json=JSON.stringify(backup,null,2);
            const blob=new Blob([json],{type:"application/json"});
            const url=URL.createObjectURL(blob);
            const a=document.createElement("a");
            a.href=url;
            a.download="workly-backup-"+new Date().toISOString().slice(0,10)+".json";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
          }} style={{background:"rgba(0,214,143,.12)",border:"1px solid rgba(0,214,143,.3)",color:T.green,borderRadius:9,padding:"8px 16px",fontSize:".8rem",fontWeight:700,cursor:"pointer",fontFamily:T.sans}}>
            ⬇️ Exportar backup
          </button>
          <label style={{background:"rgba(245,197,24,.1)",border:`1px solid ${T.yellowBorder}`,color:T.yellow,borderRadius:9,padding:"8px 16px",fontSize:".8rem",fontWeight:700,cursor:"pointer",fontFamily:T.sans}}>
            ⬆️ Importar backup
            <input type="file" accept=".json" style={{display:"none"}} onChange={e=>{
              const file=e.target.files[0];
              if(!file)return;
              const reader=new FileReader();
              reader.onload=ev=>{
                try{
                  const backup=JSON.parse(ev.target.result);
                  if(!backup.wk_data&&!backup.wk_accounts){alert("Archivo no válido");return;}
                  if(!confirm("¿Importar backup? Esto sobreescribirá todos los datos actuales."))return;
                  if(backup.wk_data)localStorage.setItem("wk_data",JSON.stringify(backup.wk_data));
                  if(backup.wk_fest)localStorage.setItem("wk_fest",JSON.stringify(backup.wk_fest));
                  if(backup.wk_adm)localStorage.setItem("wk_adm",JSON.stringify(backup.wk_adm));
                  if(backup.wk_accounts)localStorage.setItem("wk_accounts",JSON.stringify(backup.wk_accounts));
                  if(backup.wk_ausencias)localStorage.setItem("wk_ausencias",JSON.stringify(backup.wk_ausencias));
                  alert("Backup importado correctamente. La app se recargará.");
                  window.location.reload();
                }catch(err){alert("Error al leer el archivo: "+err.message);}
              };
              reader.readAsText(file);
              e.target.value="";
            }}/>
          </label>
        </div>
      </div>
      <div style={{margin:"12px 18px",background:T.bg2,border:"1px solid rgba(255,85,85,.2)",borderRadius:13,padding:18}}>
        <div style={{fontSize:".6rem",fontWeight:700,textTransform:"uppercase",color:T.red,marginBottom:8}}>Zona peligrosa</div>
        <div style={{fontSize:".75rem",color:T.text2,marginBottom:12}}>Resetea todos los partes y vuelve a cargar los datos originales. Las cuentas de trabajadores se mantienen.</div>

          🗑 Resetear todos los datos
        </button>
      </div>
    </div>
  );
}
